<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pet Hub 3D — 设计稿</title>
  <style id="theme-vars">
/*
 * Pet Hub 3D design tokens
 * Brand: MOYUYO / #007AFF
 * Domain: 3D pet interaction interface
 * Style: Restrained, elegant, Apple-inspired with frosted glass
 * Theme mode: light-dark
 */

:root {
  /* ===== PRIMITIVE PALETTE ===== */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff;
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  --state-success: #34c759;
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  --state-error: #ff3b30;
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* scene accent colors */
  --scene-grass: #4cd964;
  --scene-living: #ff9500;
  --scene-training: #5856d6;
  --scene-studio: #ff2d55;

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12);

  /* SPACING */
  --spacing: 0.24rem;
}

.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style type="text/tailwindcss">
    @theme inline {
      --color-foreground: var(--card-foreground);
    }
    @layer base {
      body { background: var(--background); color: var(--foreground); }
    }
  </style>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 3D 视口占位动画 */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotateX(0deg); }
      25% { transform: translateY(-4px) rotateX(1deg); }
      75% { transform: translateY(2px) rotateX(-1deg); }
    }
    @keyframes spin-slow {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes badge-pop {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes fill-bar {
      from { width: 0%; }
      to { width: var(--target-width); }
    }

    .scene-float { animation: float 6s ease-in-out infinite; }
    .spin-slow { animation: spin-slow 20s linear infinite; }

    /* 毛玻璃面板 */
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
    }
    .dark .glass {
      background: rgba(28, 28, 30, 0.75);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(32px) saturate(1.4);
      -webkit-backdrop-filter: blur(32px) saturate(1.4);
    }
    .dark .glass-strong {
      background: rgba(28, 28, 30, 0.88);
    }

    /* 场景过渡 */
    .scene-transition {
      transition: background-color 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* 标签选中指示器 */
    .pet-tab::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .pet-tab.active::after {
      opacity: 1;
    }

    /* 控制按钮悬停 */
    .ctrl-btn {
      transition: all 0.2s ease;
    }
    .ctrl-btn:hover {
      background: var(--primary);
      color: var(--primary-foreground);
      transform: scale(1.05);
    }
    .ctrl-btn:active {
      transform: scale(0.92);
    }

    /* 场景卡片选中 */
    .scene-chip {
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .scene-chip.active {
      background: var(--primary);
      color: var(--primary-foreground);
      border-color: var(--primary);
    }

    /* 模型占位渐变 */
    .model-placeholder {
      background:
        radial-gradient(ellipse at 50% 80%, rgba(0, 122, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 20%, rgba(0, 122, 255, 0.04) 0%, transparent 40%),
        linear-gradient(180deg, var(--background-50) 0%, var(--background-200) 100%);
    }
    .dark .model-placeholder {
      background:
        radial-gradient(ellipse at 50% 80%, rgba(0, 122, 255, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 20%, rgba(0, 122, 255, 0.06) 0%, transparent 40%),
        linear-gradient(180deg, var(--background-800) 0%, var(--background-900) 100%);
    }

    /* 属性条填充 */
    .stat-fill {
      animation: fill-bar 1s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <main class="pb-24">
    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-30 flex h-14 items-center justify-between px-4 border-b glass-strong" style="border-color: var(--border);">
      <div class="flex items-center gap-3">
        <button class="inline-flex h-9 w-9 items-center justify-center rounded-xl transition-colors duration-150 hover:bg-[var(--background-200)]" aria-label="返回" id="backBtn">
          <i data-lucide="arrow-left" class="w-5 h-5" style="color: var(--icon);"></i>
        </button>
        <h1 class="text-lg font-semibold tracking-tight" style="color: var(--text-800);">Pet Hub 3D</h1>
      </div>
      <div class="flex items-center gap-1">
        <button class="inline-flex h-9 w-9 items-center justify-center rounded-xl transition-colors duration-150 hover:bg-[var(--background-200)]" aria-label="分享" id="shareBtn">
          <i data-lucide="share-2" class="w-4.5 h-4.5" style="color: var(--icon);"></i>
        </button>
        <button class="inline-flex h-9 w-9 items-center justify-center rounded-xl transition-colors duration-150 hover:bg-[var(--background-200)]" aria-label="更多" id="moreBtn">
          <i data-lucide="ellipsis" class="w-4.5 h-4.5" style="color: var(--icon);"></i>
        </button>
      </div>
    </header>

    <div class="px-4 pt-4 space-y-5">
      <!-- ===== 3D 模型展示区域 ===== -->
      <section class="relative overflow-hidden rounded-3xl model-placeholder" style="border: 1px solid var(--border); box-shadow: var(--shadow-lg);" id="modelViewport">
        <!-- 场景装饰光效 -->
        <div class="absolute inset-0 pointer-events-none">
          <div class="absolute top-1/4 left-1/3 w-32 h-32 rounded-full" style="background: radial-gradient(circle, rgba(0,122,255,0.10) 0%, transparent 70%);"></div>
          <div class="absolute bottom-1/4 right-1/4 w-24 h-24 rounded-full" style="background: radial-gradient(circle, rgba(0,122,255,0.06) 0%, transparent 70%);"></div>
        </div>

        <!-- 3D 模型占位 -->
        <div class="relative flex items-center justify-center h-[420px]">
          <!-- 模型渐变示意 -->
          <div class="relative scene-float" style="perspective: 800px;">
            <!-- 线框网格（示意 3D 模型） -->
            <div class="spin-slow" style="transform-style: preserve-3d;">
              <!-- 外层环 -->
              <div class="absolute inset-0 rounded-full" style="border: 1.5px dashed rgba(0,122,255,0.15); width: 180px; height: 180px; transform: translate(-90px, -90px) rotateX(60deg);"></div>
              <div class="absolute inset-0 rounded-full" style="border: 1px dashed rgba(0,122,255,0.10); width: 240px; height: 240px; transform: translate(-120px, -120px) rotateX(75deg);"></div>
              <!-- 轴向辅助线 -->
              <div class="absolute top-1/2 left-1/2 w-40 h-px" style="background: linear-gradient(90deg, transparent, rgba(0,122,255,0.12), transparent); transform: translate(-50%, -50%);"></div>
              <div class="absolute top-1/2 left-1/2 h-40 w-px" style="background: linear-gradient(180deg, transparent, rgba(0,122,255,0.12), transparent); transform: translate(-50%, -50%);"></div>
            </div>

            <!-- 主体轮廓（宠物剪影示意） -->
            <div class="relative flex items-center justify-center" style="width: 140px; height: 160px;">
              <!-- 身体 -->
              <div class="absolute w-28 h-24 rounded-[40%] bottom-0" style="background: linear-gradient(145deg, var(--brand-300), var(--brand-500)); opacity: 0.25; box-shadow: 0 8px 32px rgba(0,122,255,0.15);"></div>
              <!-- 头部 -->
              <div class="absolute w-16 h-16 rounded-full top-1" style="background: linear-gradient(145deg, var(--brand-200), var(--brand-400)); opacity: 0.30;"></div>
              <!-- 耳朵左 -->
              <div class="absolute w-6 h-8 rounded-t-full top-0 left-3" style="background: var(--brand-300); opacity: 0.20; transform: rotate(-15deg);"></div>
              <!-- 耳朵右 -->
              <div class="absolute w-6 h-8 rounded-t-full top-0 right-3" style="background: var(--brand-300); opacity: 0.20; transform: rotate(15deg);"></div>
              <!-- 眼睛发光点 -->
              <div class="absolute w-2 h-2 rounded-full top-7 left-8" style="background: var(--brand-500); opacity: 0.5; animation: pulse-glow 2s ease-in-out infinite;"></div>
              <div class="absolute w-2 h-2 rounded-full top-7 right-8" style="background: var(--brand-500); opacity: 0.5; animation: pulse-glow 2s ease-in-out infinite 0.5s;"></div>
              <!-- 尾巴 -->
              <div class="absolute -right-6 bottom-4 w-10 h-2 rounded-full" style="background: var(--brand-300); opacity: 0.20; transform: rotate(20deg);"></div>
            </div>

            <!-- 底部光环 -->
            <div class="absolute -bottom-4 left-1/2 w-32 h-3 rounded-full" style="background: radial-gradient(ellipse, rgba(0,122,255,0.12) 0%, transparent 70%); transform: translateX(-50%);"></div>
          </div>

          <!-- 3D 标签 -->
          <div class="absolute top-3 left-3 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-semibold glass" style="color: var(--text-500); border: 0.5px solid var(--border);">
            <i data-lucide="box" class="w-3 h-3"></i>
            3D 预览
          </div>

          <!-- 旋转/缩放控制组 -->
          <div class="absolute bottom-4 right-4 flex flex-col gap-2">
            <button class="ctrl-btn w-9 h-9 rounded-full glass inline-flex items-center justify-center text-sm" style="border: 0.5px solid var(--border); color: var(--icon);" aria-label="旋转" id="rotateBtn">
              <i data-lucide="rotate-3d" class="w-4 h-4"></i>
            </button>
            <button class="ctrl-btn w-9 h-9 rounded-full glass inline-flex items-center justify-center text-sm" style="border: 0.5px solid var(--border); color: var(--icon);" aria-label="缩放" id="zoomInBtn">
              <i data-lucide="zoom-in" class="w-4 h-4"></i>
            </button>
            <button class="ctrl-btn w-9 h-9 rounded-full glass inline-flex items-center justify-center text-sm" style="border: 0.5px solid var(--border); color: var(--icon);" aria-label="缩小" id="zoomOutBtn">
              <i data-lucide="zoom-out" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- AR 模式切换 -->
          <button class="absolute top-3 right-3 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold glass transition-all duration-200 hover:bg-[var(--primary)] hover:text-[var(--primary-foreground)]" style="border: 0.5px solid var(--border); color: var(--text-600);" id="arToggle">
            <i data-lucide="scan" class="w-3.5 h-3.5"></i>
            AR
          </button>
        </div>

        <!-- 底部信息卡片（叠加在 3D 区域底部） -->
        <div class="absolute bottom-0 left-0 right-0 p-4" style="background: linear-gradient(transparent, rgba(0,0,0,0.03));">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm font-semibold" style="color: var(--text-800);" id="petNameDisplay">MILO</p>
              <p class="text-xs" style="color: var(--text-400);">金毛寻回犬 · 3岁</p>
            </div>
            <div class="flex items-center gap-2">
              <span class="inline-flex items-center gap-1 text-xs" style="color: var(--text-400);">
                <i data-lucide="map-pin" class="w-3 h-3"></i>
                <span id="sceneLabel">草地</span>
              </span>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== IP 场景切换（横向滚动） ===== -->
      <section>
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold tracking-tight" style="color: var(--text-800);">场景切换</h2>
          <span class="text-xs" style="color: var(--muted-foreground);">IP 环境</span>
        </div>
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="sceneList">
          <!-- 草地 -->
          <button class="scene-chip active inline-flex items-center gap-2 px-3.5 py-2 rounded-xl text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--border); background: var(--card); color: var(--text-700);" data-scene="grass">
            <span class="w-3.5 h-3.5 rounded-full" style="background: var(--scene-grass);"></span>
            草地
          </button>
          <!-- 起居室 -->
          <button class="scene-chip inline-flex items-center gap-2 px-3.5 py-2 rounded-xl text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--border); background: var(--card); color: var(--text-700);" data-scene="living">
            <span class="w-3.5 h-3.5 rounded-full" style="background: var(--scene-living);"></span>
            起居室
          </button>
          <!-- 训练场 -->
          <button class="scene-chip inline-flex items-center gap-2 px-3.5 py-2 rounded-xl text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--border); background: var(--card); color: var(--text-700);" data-scene="training">
            <span class="w-3.5 h-3.5 rounded-full" style="background: var(--scene-training);"></span>
            训练场
          </button>
          <!-- 工作室 -->
          <button class="scene-chip inline-flex items-center gap-2 px-3.5 py-2 rounded-xl text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--border); background: var(--card); color: var(--text-700);" data-scene="studio">
            <span class="w-3.5 h-3.5 rounded-full" style="background: var(--scene-studio);"></span>
            工作室
          </button>
        </div>
      </section>

      <!-- ===== 多宠物切换 ===== -->
      <section>
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold tracking-tight" style="color: var(--text-800);">我的宠物</h2>
          <button class="inline-flex items-center gap-1 text-xs font-medium" style="color: var(--primary);">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
            添加
          </button>
        </div>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1" id="petList">
          <!-- MILO -->
          <button class="pet-tab active relative flex flex-col items-center gap-2 shrink-0 px-3 py-3 rounded-2xl transition-all duration-200" style="border: 1px solid var(--border); background: var(--card); min-width: 80px;" data-pet="MILO">
            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xs font-bold" style="background: linear-gradient(135deg, var(--brand-100), var(--brand-200)); color: var(--brand-500);">
              M
            </div>
            <div class="text-center">
              <p class="text-xs font-semibold" style="color: var(--text-800);">MILO</p>
              <p class="text-[10px]" style="color: var(--text-400);">金毛</p>
            </div>
          </button>
          <!-- LUNA -->
          <button class="pet-tab relative flex flex-col items-center gap-2 shrink-0 px-3 py-3 rounded-2xl transition-all duration-200" style="border: 1px solid var(--border); background: var(--card); min-width: 80px;" data-pet="LUNA">
            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xs font-bold" style="background: linear-gradient(135deg, var(--state-success-surface), #d4f5dc); color: var(--state-success);">
              L
            </div>
            <div class="text-center">
              <p class="text-xs font-semibold" style="color: var(--text-800);">LUNA</p>
              <p class="text-[10px]" style="color: var(--text-400);">布偶猫</p>
            </div>
          </button>

  <!-- ===== Toast 提示容器 ===== -->
  <div id="toastContainer" class="fixed top-20 left-1/2 z-50 pointer-events-none" style="transform: translateX(-50%);"></div>

  <script>
    lucide.createIcons();

    // ===== 交互逻辑 =====

    // Toast 提示
    function showToast(message) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'glass-strong px-4 py-2 rounded-full text-xs font-medium shadow-lg';
      toast.style.cssText = 'color: var(--text-700); border: 0.5px solid var(--border); animation: slide-up 0.3s ease-out; margin-bottom: 8px;';
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(function () { toast.remove(); }, 300);
      }, 1800);
    }

    // AR 切换
    var arBtn = document.getElementById('arToggle');
    var arActive = false;
    arBtn.addEventListener('click', function () {
      arActive = !arActive;
      arBtn.style.background = arActive ? 'var(--primary)' : '';
      arBtn.style.color = arActive ? 'var(--primary-foreground)' : '';
      arBtn.style.borderColor = arActive ? 'var(--primary)' : '';
      showToast(arActive ? 'AR 模式已开启' : 'AR 模式已关闭');
    });

    // 场景切换
    var scenes = document.querySelectorAll('.scene-chip');
    var currentScene = 'grass';
    var sceneColors = {
      grass: 'var(--scene-grass)',
      living: 'var(--scene-living)',
      training: 'var(--scene-training)',
      studio: 'var(--scene-studio)'
    };
    var sceneLabels = {
      grass: '草地',
      living: '起居室',
      training: '训练场',
      studio: '工作室'
    };

    scenes.forEach(function (chip) {
      chip.addEventListener('click', function () {
        scenes.forEach(function (s) { s.classList.remove('active'); s.style.background = 'var(--card)'; s.style.color = ''; });
        chip.classList.add('active');
        chip.style.background = 'var(--primary)';
        chip.style.color = 'var(--primary-foreground)';
        currentScene = chip.getAttribute('data-scene');
        document.getElementById('sceneLabel').textContent = sceneLabels[currentScene];
        showToast('已切换到 ' + sceneLabels[currentScene]);
      });
    });

    // 宠物切换（仅 UI 演示）
    var pets = document.querySelectorAll('.pet-tab');
    var petNames = { MILO: 'MILO', LUNA: 'LUNA', ATLAS: 'ATLAS', OLIVE: 'OLIVE' };
    var petBreeds = { MILO: '金毛寻回犬', LUNA: '布偶猫', ATLAS: '哈士奇', OLIVE: '柯基' };
    var petAges = { MILO: '3岁', LUNA: '2岁', ATLAS: '4岁', OLIVE: '1岁' };

    pets.forEach(function (tab) {
      tab.addEventListener('click', function () {
        pets.forEach(function (p) { p.classList.remove('active'); p.style.borderColor = 'var(--border)'; p.style.transform = 'scale(1)'; });
        tab.classList.add('active');
        tab.style.borderColor = 'var(--primary)';
        tab.style.transform = 'scale(1.02)';
        var name = tab.getAttribute('data-pet');
        document.getElementById('petNameDisplay').textContent = name;
        document.getElementById('sceneLabel').textContent = sceneLabels[currentScene];
        showToast('已切换至 ' + name);
      });
    });

    // 3D 控制按钮
    document.getElementById('rotateBtn').addEventListener('click', function () {
      var vp = document.getElementById('modelViewport');
      var placeholder = vp.querySelector('.scene-float');
      placeholder.style.transition = 'transform 0.8s cubic-bezier(0.22, 1, 0.36, 1)';
      placeholder.style.transform = 'rotateY(180deg)';
      setTimeout(function () {
        placeholder.style.transform = 'rotateY(360deg)';
        setTimeout(function () { placeholder.style.transform = ''; }, 800);
      }, 800);
      showToast('360° 旋转展示');
    });

    document.getElementById('zoomInBtn').addEventListener('click', function () {
      var el = document.querySelector('#modelViewport .scene-float');
      var current = el.style.transform || '';
      el.style.transition = 'transform 0.3s ease';
      el.style.transform = current + ' scale(1.15)';
      showToast('已放大');
    });

    document.getElementById('zoomOutBtn').addEventListener('click', function () {
      var el = document.querySelector('#modelViewport .scene-float');
      el.style.transition = 'transform 0.3s ease';
      el.style.transform = 'scale(1)';
      showToast('已还原');
    });

    // 互动按钮
    document.getElementById('playBtn').addEventListener('click', function () {
      showToast('🎾 正在和 ' + document.getElementById('petNameDisplay').textContent + ' 玩耍...');
    });
    document.getElementById('feedBtn').addEventListener('click', function () {
      showToast('🍗 正在喂食 ' + document.getElementById('petNameDisplay').textContent);
    });
    document.getElementById('groomBtn').addEventListener('click', function () {
      showToast('🛁 正在为 ' + document.getElementById('petNameDisplay').textContent + ' 护理');
    });

    // 分享按钮
    document.getElementById('shareBtn').addEventListener('click', function () {
      showToast('📤 分享链接已复制');
    });

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', function () {
      showToast('⬅ 返回上一页');
    });

    // 更多按钮
    document.getElementById('moreBtn').addEventListener('click', function () {
      showToast('更多选项');
    });

    // 添加宠物
    document.querySelector('[data-pet]').parentElement.querySelector('[data-pet]').closest('section').querySelector('button:last-child').addEventListener('click', function () {
      showToast('🐾 添加新宠物');
    });
  </script>
