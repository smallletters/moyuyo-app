<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区笔记详情 - MOYUYO</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen antialiased" style="font-family: 'DM Sans', -apple-system, sans-serif;">

    <!-- 全屏图片查看器 -->
    <div class="image-viewer-overlay" id="imageViewer">
      <button class="absolute top-12 right-4 w-10 h-10 flex items-center justify-center rounded-full" style="background: rgba(255,255,255,0.15); color: #fff;" id="closeViewer" aria-label="关闭图片查看">
        <span data-icon class="w-6 h-6" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/x.svg'); mask-image: url('../assets/icons/dl-builtin-apple/x.svg');"></span>
      </button>
      <img id="viewerImage" src="" alt="查看大图">
      <p class="mt-3 text-sm" style="color: rgba(255,255,255,0.6);" id="viewerCounter"></p>
    </div>

    <main class="pb-6" style="max-width: 393px; margin: 0 auto;">

      <!-- iOS 状态栏模拟 -->
      <div class="sticky top-0 z-30" style="background: var(--background);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--foreground);">9:41</span>
          <div class="flex items-center gap-1.5">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg');"></span>
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            <span class="w-6 h-3 rounded-sm" style="background: var(--foreground);"></span>
          </div>
        </div>
      </div>

      <!-- 顶部导航栏 -->
      <nav class="sticky top-11 z-30 flex items-center justify-between h-12 px-4" style="background: var(--background); border-bottom: 1px solid var(--border);" aria-label="笔记详情导航">
        <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--secondary);" data-dom-id="cta-back" aria-label="返回">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); color: var(--foreground);"></span>
        </button>
        <h1 class="text-base font-semibold truncate" style="color: var(--foreground);">笔记详情</h1>
        <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--secondary);" id="moreBtn" aria-label="更多操作">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/gear.svg'); mask-image: url('../assets/icons/dl-builtin-apple/gear.svg'); color: var(--foreground);"></span>
        </button>
      </nav>

      <!-- 笔记内容主体 -->
      <article class="px-4 pt-4">

        <!-- 作者信息栏 -->
        <div class="flex items-center gap-3 mb-4">
          <!-- 头像占位 -->
          <div class="w-10 h-10 rounded-full shrink-0" style="background: linear-gradient(135deg, var(--brand-100), var(--brand-200));"></div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="text-sm font-semibold truncate" style="color: var(--foreground);" id="authorName">养猫的小确幸</span>
              <!-- 会员标签 -->
              <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold" style="background: var(--state-warning); color: #fff;" id="authorVIP">PRIME</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs" style="color: var(--text-400);" id="postTime">3 小时前</span>
              <span class="text-xs" style="color: var(--text-400);" id="authorFollowers">1,280 关注者</span>
            </div>
          </div>
          <!-- 关注按钮 -->
          <button class="h-8 px-4 rounded-full text-xs font-semibold shrink-0" style="background: var(--primary); color: var(--primary-foreground);" id="followBtn" aria-label="关注作者">
            关注
          </button>
        </div>

        <!-- 标题 -->
        <h2 class="text-lg font-bold leading-snug mb-3" style="color: var(--text-800);" id="postTitle">
          第一次带猫猫去宠物医院，这些准备你一定要做好
        </h2>

        <!-- 正文内容 -->
        <div class="text-sm leading-relaxed space-y-3 mb-4" style="color: var(--text-600);" id="postContent">
        </div>

        <!-- 关联标签 -->
        <div class="flex flex-wrap gap-2 mb-3" id="tagsContainer">
        </div>

        <!-- 图片网格（3列展示） -->
        <div class="image-grid cols-3 mb-4" id="imageGrid">
          <div class="grid-img" style="background: linear-gradient(135deg, var(--brand-50), var(--brand-200));" data-index="0" role="button" tabindex="0" aria-label="查看图片 1"></div>
          <div class="grid-img" style="background: linear-gradient(135deg, var(--state-success-surface), var(--brand-100));" data-index="1" role="button" tabindex="0" aria-label="查看图片 2"></div>
          <div class="grid-img" style="background: linear-gradient(135deg, var(--brand-100), var(--background-200));" data-index="2" role="button" tabindex="0" aria-label="查看图片 3"></div>
          <div class="grid-img" style="background: linear-gradient(225deg, var(--brand-200), var(--brand-50));" data-index="3" role="button" tabindex="0" aria-label="查看图片 4"></div>
          <div class="grid-img" style="background: linear-gradient(180deg, var(--secondary), var(--accent));" data-index="4" role="button" tabindex="0" aria-label="查看图片 5"></div>
          <div class="grid-img" style="background: linear-gradient(135deg, var(--brand-50), var(--secondary));" data-index="5" role="button" tabindex="0" aria-label="查看图片 6"></div>
        </div>

        <!-- 互动数据栏 -->
        <div class="flex items-center justify-between py-3 mb-1" style="border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
          <!-- 数据展示 -->
          <div class="flex items-center gap-4">
            <span class="text-xs" style="color: var(--text-400);">
              <span data-icon class="w-3.5 h-3.5 inline-block align-text-bottom" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg'); mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg');"></span>
              <span id="likeCount">328</span>
            </span>
            <span class="text-xs" style="color: var(--text-400);">
              <span data-icon class="w-3.5 h-3.5 inline-block align-text-bottom" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg'); mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg');"></span>
              <span id="commentCount">56</span>
            </span>
            <span class="text-xs" style="color: var(--text-400);">
              <span data-icon class="w-3.5 h-3.5 inline-block align-text-bottom" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              <span id="starCount">142</span>
            </span>
            <span class="text-xs" style="color: var(--text-400);">
              <span data-icon class="w-3.5 h-3.5 inline-block align-text-bottom" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); mask-image: url('../assets/icons/dl-builtin-apple/share.svg');"></span>
              <span id="shareCount">23</span>
            </span>
          </div>
          <!-- 操作按钮 -->
          <div class="flex items-center gap-2">
            <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--secondary);" id="likeBtn" aria-label="点赞">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg'); mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg'); color: var(--text-500);"></span>
            </button>
            <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--secondary);" id="bookmarkBtn" aria-label="收藏">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--text-500);"></span>
            </button>
            <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--secondary);" id="shareBtn" aria-label="分享">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); color: var(--text-500);"></span>
            </button>
          </div>
        </div>

      </article>

      <!-- 关联商品卡片 -->
      <section class="px-4 pt-2 pb-4" aria-label="关联商品">
        <div class="flex items-center gap-2 mb-3">
          <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/link.svg'); mask-image: url('../assets/icons/dl-builtin-apple/link.svg'); color: var(--text-400);"></span>
          <span class="text-xs font-semibold tracking-wide" style="color: var(--text-400);">关联商品</span>
          <span class="commission-badge">笔记带货</span>
        </div>

        <div class="linked-product-card" data-dom-id="cta-buy">
          <!-- 商品缩略图占位 -->
          <div class="w-16 h-16 rounded-xl shrink-0" style="background: linear-gradient(135deg, var(--secondary), var(--accent)); border: 1px solid var(--border);"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--foreground);" id="productName">宠物便携航空箱 标准款</p>
            <div class="flex items-baseline gap-1.5 mt-1">
              <span class="text-sm font-bold" style="color: var(--primary);" id="productPrice">¥259</span>
              <span class="text-xs line-through" style="color: var(--text-300);" id="productOriginalPrice">¥359</span>
            </div>
          </div>
          <button class="h-8 px-4 rounded-full text-xs font-semibold shrink-0" style="background: var(--primary); color: var(--primary-foreground);" data-dom-id="cta-buy" aria-label="去购买">
            去购买
          </button>
        </div>
      </section>

      <!-- 分隔 -->
      <div class="mx-4" style="height: 1px; background: var(--border);"></div>

      <!-- 评论区 -->
      <section class="px-4 pt-3 pb-6" aria-label="评论区">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-base font-semibold" style="color: var(--foreground);">评论 (<span id="commentsTotal">56</span>)</h3>
          <button class="text-xs font-medium" style="color: var(--text-400);">按热度</button>
        </div>

        <div id="comments-list">
        </div>

        <!-- 查看更多评论入口 -->
        <button class="w-full flex items-center justify-center gap-1.5 h-11 rounded-xl mt-2" style="background: var(--secondary); border: none; color: var(--primary);" id="moreCommentsBtn" aria-label="查看更多评论">
          <span class="text-sm font-medium" id="moreCommentsText">查看全部 56 条评论</span>
          <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-down.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-down.svg');"></span>
        </button>
      </section>

    </main>

    <!-- 底部评论输入栏 -->
    <div class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
      <div class="flex items-center gap-3 h-[52px] px-4" style="max-width: 393px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom, 0px);">
        <div class="flex-1 h-9 flex items-center px-3 rounded-full" style="background: var(--secondary);">
          <span class="text-sm" style="color: var(--text-400);">说点什么...</span>
        </div>
        <button class="w-9 h-9 flex items-center justify-center rounded-full shrink-0" style="background: var(--secondary);" aria-label="点赞">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg'); mask-image: url('../assets/icons/dl-builtin-apple/thumbs-up.svg'); color: var(--text-500);"></span>
        </button>
        <button class="w-9 h-9 flex items-center justify-center rounded-full shrink-0" style="background: var(--secondary);" aria-label="收藏">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--text-500);"></span>
        </button>
        <button class="w-9 h-9 flex items-center justify-center rounded-full shrink-0" style="background: var(--secondary);" aria-label="分享">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); color: var(--text-500);"></span>
        </button>
      </div>
    </div>

    <script src="shared/mock-api.js"></script>
    <script src="shared/api.js"></script>
    <script>
      var api = window.moyuyoAPI;

      // 从 URL 参数获取帖子 ID
      var urlParams = new URLSearchParams(window.location.search);
      var postId = urlParams.get('postId') || 'post-1';

      // ===== IP 标签颜色映射 =====
      var ipTagColors = {
        'MILO': { bg: '#3b82f6', text: '#fff' },
        'OLIVE': { bg: '#22c55e', text: '#fff' },
        'LUNA': { bg: '#8b5cf6', text: '#fff' }
      };

      // ===== 渲染帖子详情 =====
      function renderPost(post) {
        // 作者信息
        document.getElementById('authorName').textContent = post.author.name;
        var vipEl = document.getElementById('authorVIP');
        if (post.author.isVIP) {
          vipEl.textContent = post.author.level || 'VIP';
          vipEl.style.display = '';
        } else {
          vipEl.style.display = 'none';
        }
        document.getElementById('authorFollowers').textContent = (post.author.followers || 0).toLocaleString() + ' 关注者';
        document.getElementById('postTime').textContent = post.time;

        // 标题
        document.getElementById('postTitle').textContent = post.title;

        // 正文
        document.getElementById('postContent').innerHTML = post.content;

        // 标签
        var tagsContainer = document.getElementById('tagsContainer');
        tagsContainer.innerHTML = '';
        (post.tags || []).forEach(function(tag) {
          var a = document.createElement('a');
          a.href = '#';
          a.className = 'topic-tag';
          a.textContent = '#' + tag;
          tagsContainer.appendChild(a);
        });
        // 宠物标签
        if (post.pet) {
          var petTag = document.createElement('a');
          petTag.href = '#';
          petTag.className = 'pet-tag';
          var petIcon = document.createElement('span');
          petIcon.setAttribute('data-icon', '');
          petIcon.className = 'w-3.5 h-3.5';
          petIcon.style.cssText = '-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/heart.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/heart.svg\');';
          petTag.appendChild(petIcon);
          petTag.appendChild(document.createTextNode(' @' + post.pet));
          tagsContainer.appendChild(petTag);
        }
        // IP 标签
        (post.ipTags || []).forEach(function(ipTag) {
          var span = document.createElement('span');
          span.className = 'ip-tag';
          span.textContent = ipTag;
          var color = ipTagColors[ipTag];
          if (color) {
            span.style.background = color.bg;
            span.style.color = color.text;
          }
          tagsContainer.appendChild(span);
        });

        // 互动数据
        document.getElementById('likeCount').textContent = post.likes || 0;
        document.getElementById('commentCount').textContent = post.comments || 0;
        document.getElementById('starCount').textContent = post.stars || 0;
        document.getElementById('shareCount').textContent = post.shares || 0;

        // 关联商品
        if (post.linkedProduct) {
          document.getElementById('productName').textContent = post.linkedProduct.name;
          document.getElementById('productPrice').textContent = '¥' + ((post.linkedProduct.price || 0) / 100);
          document.getElementById('productOriginalPrice').textContent = '¥' + ((post.linkedProduct.originalPrice || 0) / 100);
        }

        // 恢复交互状态
        if (post.isLiked) toggleLike(true);
        if (post.isStarred) toggleBookmark(true);
        if (post.isFollowed) toggleFollow(true);
      }

      // ===== 渲染评论列表 =====
      function renderComments(commentsData) {
        var total = commentsData.total || 0;
        var comments = commentsData.comments || [];
        document.getElementById('commentsTotal').textContent = total;
        document.getElementById('moreCommentsText').textContent = '查看全部 ' + total + ' 条评论';

        var commentsList = document.getElementById('comments-list');
        commentsList.innerHTML = '';

        var gradientColors = [
          'linear-gradient(135deg, var(--brand-100), var(--brand-300))',
          'linear-gradient(135deg, var(--state-success-surface), var(--brand-50))',
          'linear-gradient(135deg, var(--brand-200), var(--background-200))',
          'linear-gradient(135deg, var(--brand-50), var(--brand-200))',
          'linear-gradient(225deg, var(--brand-100), var(--secondary))'
        ];

        comments.forEach(function(comment, index) {
          var commentDiv = document.createElement('div');
          commentDiv.className = 'comment-item';

          var bg = gradientColors[index % gradientColors.length];

          commentDiv.innerHTML =
            '<div class="flex items-start gap-2.5">' +
              '<div class="w-8 h-8 rounded-full shrink-0" style="background: ' + bg + ';"></div>' +
              '<div class="flex-1 min-w-0">' +
                '<div class="flex items-center gap-2 mb-0.5">' +
                  '<span class="text-xs font-semibold" style="color: var(--text-800);">' + escapeHtml(comment.author.name) + '</span>' +
                  (comment.author.isVerified ? '<span class="inline-flex items-center px-1 py-0 rounded text-[9px] font-bold" style="background: var(--brand-50); color: var(--primary);">认证作者</span>' : '') +
                  '<span class="text-[11px]" style="color: var(--text-400);">' + escapeHtml(comment.time) + '</span>' +
                '</div>' +
                '<p class="text-sm leading-relaxed" style="color: var(--text-600);">' + escapeHtml(comment.content) + '</p>' +
                '<div class="flex items-center gap-4 mt-2">' +
                  '<button class="flex items-center gap-1 text-xs" style="color: var(--text-400);" data-comment-id="' + comment.id + '" aria-label="标记有用">' +
                    '<span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/thumbs-up.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/thumbs-up.svg\');"></span>' +
                    '有用 (' + (comment.likes || 0) + ')' +
                  '</button>' +
                  '<button class="text-xs" style="color: var(--text-400);">回复</button>' +
                '</div>' +
              '</div>' +
            '</div>';

          commentsList.appendChild(commentDiv);
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ===== API 数据加载 =====
      function loadPost() {
        api.get('/api/v1/post/' + postId).then(function(res) {
          if (res.code === 0 && res.data) {
            renderPost(res.data);
          }
        }).catch(function(err) {
          console.error('Failed to load post:', err);
        });
      }

      function loadComments() {
        api.get('/api/v1/post/' + postId + '/comments').then(function(res) {
          if (res.code === 0 && res.data) {
            renderComments(res.data);
            lucide.createIcons();
          }
        }).catch(function(err) {
          console.error('Failed to load comments:', err);
        });
      }

      // ===== 点赞按钮切换 =====
      var likeBtn = document.getElementById('likeBtn');
      var isLiked = false;
      function toggleLike(force) {
        isLiked = typeof force === 'boolean' ? force : !isLiked;
        var icon = likeBtn.querySelector('[data-icon]');
        if (isLiked) {
          likeBtn.classList.add('action-btn-liked');
          likeBtn.style.background = 'var(--state-error-surface)';
          icon.style.color = 'var(--state-error)';
        } else {
          likeBtn.classList.remove('action-btn-liked');
          likeBtn.style.background = 'var(--secondary)';
          icon.style.color = 'var(--text-500)';
        }
      }
      likeBtn.addEventListener('click', function () {
        toggleLike();
      });

      // ===== 收藏按钮切换 =====
      var bookmarkBtn = document.getElementById('bookmarkBtn');
      var isBookmarked = false;
      function toggleBookmark(force) {
        isBookmarked = typeof force === 'boolean' ? force : !isBookmarked;
        var icon = bookmarkBtn.querySelector('[data-icon]');
        if (isBookmarked) {
          bookmarkBtn.classList.add('action-btn-bookmarked');
          bookmarkBtn.style.background = 'rgba(255, 149, 0, 0.12)';
          icon.style.color = 'var(--state-warning)';
        } else {
          bookmarkBtn.classList.remove('action-btn-bookmarked');
          bookmarkBtn.style.background = 'var(--secondary)';
          icon.style.color = 'var(--text-500)';
        }
      }
      bookmarkBtn.addEventListener('click', function () {
        toggleBookmark();
      });

      // ===== 关注按钮切换 =====
      var followBtn = document.getElementById('followBtn');
      var isFollowing = false;
      function toggleFollow(force) {
        isFollowing = typeof force === 'boolean' ? force : !isFollowing;
        if (isFollowing) {
          followBtn.textContent = '已关注';
          followBtn.style.background = 'var(--secondary)';
          followBtn.style.color = 'var(--text-500)';
        } else {
          followBtn.textContent = '关注';
          followBtn.style.background = 'var(--primary)';
          followBtn.style.color = 'var(--primary-foreground)';
        }
      }
      followBtn.addEventListener('click', function () {
        toggleFollow();
      });

      // ===== 全屏图片查看 =====
      var viewer = document.getElementById('imageViewer');
      var viewerImg = document.getElementById('viewerImage');
      var viewerCounter = document.getElementById('viewerCounter');
      var closeBtn = document.getElementById('closeViewer');

      var placeholderGradients = [
        'linear-gradient(135deg, #e8f2ff, #9fcbff)',
        'linear-gradient(135deg, #e9f9ee, #cfe5ff)',
        'linear-gradient(135deg, #cfe5ff, #f2f2f7)',
        'linear-gradient(225deg, #9fcbff, #e8f2ff)',
        'linear-gradient(180deg, #f2f2f7, #f7f7fa)',
        'linear-gradient(135deg, #e8f2ff, #f2f2f7)'
      ];

      function bindImageGrid() {
        var gridImages = document.querySelectorAll('#imageGrid .grid-img');
        gridImages.forEach(function (img, index) {
          img.addEventListener('click', function () {
            viewerImg.style.background = placeholderGradients[index];
            viewerImg.style.width = '80vw';
            viewerImg.style.aspectRatio = '1';
            viewerImg.src = '';
            viewerImg.alt = '图片 ' + (index + 1);
            viewerCounter.textContent = (index + 1) + ' / ' + gridImages.length;
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
          });
        });
      }

      closeBtn.addEventListener('click', function () {
        viewer.classList.remove('active');
        document.body.style.overflow = '';
      });

      viewer.addEventListener('click', function (e) {
        if (e.target === viewer) {
          viewer.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      // ===== 返回按钮 =====
      var backBtn = document.querySelector('[data-dom-id="cta-back"]');
      if (backBtn) {
        backBtn.addEventListener('click', function () {
          window.history.back();
        });
      }

      // ===== 更多操作按钮 =====
      var moreBtn = document.getElementById('moreBtn');
      moreBtn.addEventListener('click', function () {
        // 在实际项目中此处弹出 ActionSheet
      });

      // ===== 初始化 =====
      lucide.createIcons();
      bindImageGrid();
      loadPost();
      loadComments();
    </script>
</body>
</html>
