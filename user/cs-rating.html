<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 服务评价</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-24">

      <!-- iOS 状态栏模拟 -->
      <div class="sticky top-0 z-30" style="background: var(--background);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--foreground);">9:41</span>
          <div class="flex items-center gap-1.5">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg');"></span>
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            <span class="w-6 h-3 rounded-sm" style="background: var(--foreground);"></span>
          </div>
        </div>
      </div>

      <!-- 顶部导航：返回箭头 + 标题 -->
      <nav class="sticky top-11 z-20 flex items-center justify-center h-11 px-4" style="background: var(--background); border-bottom: 1px solid var(--border);">
        <button class="absolute left-4 flex items-center justify-center w-8 h-8" data-dom-id="cta-back" aria-label="返回">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); color: var(--primary);"></span>
        </button>
        <span class="text-base font-semibold" style="color: var(--foreground);">服务评价</span>
      </nav>

      <!-- 客服信息卡片 -->
      <section class="mx-4 mt-4 p-4 rounded-2xl flex items-center gap-3.5" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);" aria-label="客服信息">
        <img src="../assets/cs-avatar.jpg" alt="客服小 MO" class="w-12 h-12 rounded-full object-cover shrink-0" style="border: 2px solid var(--background-200);">
        <div class="flex flex-col gap-1 min-w-0">
          <span class="text-sm font-semibold truncate" style="color: var(--foreground);">客服小 MO</span>
          <span class="text-xs" style="color: var(--text-500);">2026-07-08 14:30</span>
          <span class="text-xs mt-0.5 inline-flex items-center px-2 py-0.5 rounded-full w-fit" style="background: var(--background-200); color: var(--text-500);">物流配送咨询</span>
        </div>
      </section>

      <!-- 评价区域 -->
      <section class="mx-4 mt-6" aria-label="评分评价">
        <h2 class="text-base font-semibold mb-4" style="color: var(--foreground);">请对本次服务进行评价</h2>

        <!-- 评分维度列表 -->
        <div class="flex flex-col gap-5">
          <!-- 维度1：解决问题程度 -->
          <div class="flex items-center justify-between">
            <span class="text-sm" style="color: var(--text-600);">解决问题程度</span>
            <div class="rating-stars flex items-center gap-1" data-dimension="solve" data-rating="5">
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="1" aria-label="1星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="2" aria-label="2星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="3" aria-label="3星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="4" aria-label="4星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="5" aria-label="5星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
            </div>
          </div>

          <!-- 维度2：响应速度 -->
          <div class="flex items-center justify-between">
            <span class="text-sm" style="color: var(--text-600);">响应速度</span>
            <div class="rating-stars flex items-center gap-1" data-dimension="speed" data-rating="5">
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="1" aria-label="1星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="2" aria-label="2星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="3" aria-label="3星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="4" aria-label="4星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="5" aria-label="5星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
            </div>
          </div>

          <!-- 维度3：服务态度 -->
          <div class="flex items-center justify-between">
            <span class="text-sm" style="color: var(--text-600);">服务态度</span>
            <div class="rating-stars flex items-center gap-1" data-dimension="attitude" data-rating="5">
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="1" aria-label="1星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="2" aria-label="2星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="3" aria-label="3星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="4" aria-label="4星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
              <button class="star-btn w-7 h-7 flex items-center justify-center" data-value="5" aria-label="5星">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg');"></span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- 分隔线 -->
      <div class="mx-4 my-5" style="height: 1px; background: var(--border);"></div>

      <!-- 文字评价区 -->
      <section class="mx-4" aria-label="文字评价">
        <textarea
          id="rating-textarea"
          class="w-full p-3.5 rounded-xl resize-none text-sm leading-relaxed"
          style="background: var(--background-200); border: 1px solid var(--border); color: var(--foreground); outline: none; font-family: var(--font-sans); min-height: 100px; transition: border-color .2s ease, box-shadow .2s ease;"
          placeholder="分享更多您的感受（选填）"
          maxlength="500"
          onfocus="this.style.borderColor='var(--ring)'; this.style.boxShadow='0 0 0 1px var(--ring)';"
          onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none';"
          oninput="updateCharCount()"
        ></textarea>
        <div class="flex justify-end mt-1.5">
          <span id="char-count" class="text-xs" style="color: var(--text-400);">0/500</span>
        </div>
      </section>

      <!-- 上传截图区 -->
      <section class="mx-4 mt-5" aria-label="上传截图">
        <div class="flex items-center gap-3">
          <!-- 已上传的示例缩略图 -->
          <div class="relative w-20 h-20 rounded-xl overflow-hidden shrink-0" style="border: 1px solid var(--border);">
            <img src="../assets/cs-avatar.jpg" alt="已上传截图" class="w-full h-full object-cover">
            <button class="absolute top-1 right-1 w-5 h-5 rounded-full flex items-center justify-center" style="background: var(--background-800); opacity: 0.7;" aria-label="删除截图">
              <span data-icon class="w-3 h-3" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); color: var(--background-50); transform: rotate(45deg);"></span>
            </button>
          </div>
          <!-- 添加按钮（最多3张，示例已有1张，显示2个添加位） -->
          <button class="w-20 h-20 rounded-xl flex flex-col items-center justify-center gap-1 shrink-0" style="border: 2px dashed var(--background-400); background: var(--background-200);" aria-label="添加截图">
            <span data-icon class="w-6 h-6" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); color: var(--text-400);"></span>
            <span class="text-xs" style="color: var(--text-400);">1/3</span>
          </button>
        </div>
      </section>

      <!-- 提交按钮 -->
      <div class="mx-4 mt-7">
        <button
          class="btn btn-primary btn-lg w-full rounded-2xl text-base font-semibold"
          style="border-radius: var(--radius);"
          data-dom-id="cta-submit"
        >
          提交评价
        </button>
      </div>

      <!-- 底部提示 -->
      <div class="mx-4 mt-3 flex items-center justify-center gap-1.5">
        <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/tag.svg'); mask-image: url('../assets/icons/dl-builtin-apple/tag.svg'); color: var(--state-success);"></span>
        <span class="text-xs" style="color: var(--text-400);">完成评价可获得 10 积分奖励</span>
      </div>

      <!-- 分隔线 -->
      <div class="mx-4 my-6" style="height: 1px; background: var(--border);"></div>

      <!-- 意见反馈入口 -->
      <section class="mx-4 flex flex-col items-center gap-3 pb-8" aria-label="意见反馈入口">
        <span class="text-sm" style="color: var(--text-500);">对服务不满意？</span>
        <a href="feedback.html" class="btn btn-secondary rounded-2xl text-sm" style="border-radius: var(--radius); text-decoration: none;" data-dom-id="cta-feedback">
          <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg'); mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg'); color: var(--text-600);"></span>
          提交意见反馈
        </a>
      </section>

    </main>

    <!-- 星星评分交互脚本 -->
    <script>
      // 星星颜色配置（使用 CSS 变量的原始值）
      var STAR_ACTIVE = '#ff9500';   // 金色填充
      var STAR_INACTIVE = '#c7c7cc'; // 灰色描边

      // 初始化所有评分组件
      document.addEventListener('DOMContentLoaded', function () {
        var allGroups = document.querySelectorAll('.rating-stars');
        allGroups.forEach(function (group) {
          var currentRating = parseInt(group.getAttribute('data-rating')) || 0;
          renderStars(group, currentRating);
        });
      });

      // 渲染星星状态
      function renderStars(group, rating) {
        var buttons = group.querySelectorAll('.star-btn');
        buttons.forEach(function (btn) {
          var value = parseInt(btn.getAttribute('data-value'));
          var icon = btn.querySelector('[data-icon]');
          if (value <= rating) {
            // 选中状态：金色填充
            icon.style.color = STAR_ACTIVE;
            btn.style.filter = 'none';
          } else {
            // 未选状态：灰色
            icon.style.color = STAR_INACTIVE;
            btn.style.filter = 'none';
          }
        });
      }

      // 绑定点击事件
      document.querySelectorAll('.rating-stars').forEach(function (group) {
        group.querySelectorAll('.star-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var value = parseInt(this.getAttribute('data-value'));
            group.setAttribute('data-rating', value);
            renderStars(group, value);
          });
        });
      });

      // 字数统计更新
      function updateCharCount() {
        var textarea = document.getElementById('rating-textarea');
        var counter = document.getElementById('char-count');
        if (textarea && counter) {
          var len = textarea.value.length;
          counter.textContent = len + '/500';
          // 接近上限时变色提醒
          if (len >= 450) {
            counter.style.color = 'var(--state-error)';
          } else {
            counter.style.color = 'var(--text-400)';
          }
        }
      }
    </script>

</body>
</html>
