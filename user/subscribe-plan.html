<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 选择订阅计划</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-28" style="background-color: var(--background);">

      <!-- 顶部导航栏 -->
      <header class="sticky top-0 z-30 flex h-11 items-center px-4" style="background-color: var(--background); border-bottom: 1px solid var(--border);">
        <button data-dom-id="cta-back" class="inline-flex h-9 w-9 items-center justify-center" style="border-radius: var(--radius);" aria-label="返回">
          <i data-lucide="chevron-left" class="h-5 w-5" style="color: var(--foreground);"></i>
        </button>
        <h1 class="min-w-0 flex-1 text-center text-base font-semibold tracking-tight" style="color: var(--foreground); text-wrap: balance; word-break: keep-all;">订阅计划</h1>
        <div class="w-9"></div>
      </header>

      <!-- 商品信息摘要卡片 -->
      <section class="mx-4 mt-4 flex items-center gap-3 p-3" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card); box-shadow: var(--shadow-xs);">
        <img src="../assets/product-shampoo-bottle.jpg" alt="MOYUYO 温和沐浴露 500ml" class="h-16 w-16 shrink-0 object-cover" style="border-radius: calc(var(--radius) - 4px);">
        <div class="min-w-0 flex-1">
          <h2 class="text-sm font-semibold truncate" style="color: var(--foreground);">MOYUYO 温和沐浴露 500ml</h2>
          <p class="mt-1 text-sm font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$28.00</p>
          <p class="mt-0.5 text-xs" style="color: var(--muted-foreground);">单次购买价</p>
        </div>
      </section>

      <!-- Subscribe & Save 标题 -->
      <section class="mt-5 px-4">
        <div class="flex items-center gap-2">
          <h3 class="text-base font-bold" style="color: var(--foreground);">Subscribe & Save</h3>
          <span class="inline-flex items-center px-2 py-0.5 text-xs font-bold" style="border-radius: 999px; background-color: var(--brand-50); color: var(--primary);">省10%</span>
        </div>
        <p class="mt-1.5 text-xs leading-relaxed" style="color: var(--muted-foreground);">选择配送周期，定期自动送达，享受订阅专属折扣</p>
      </section>

      <!-- 订阅周期选择（3个卡片式选项） -->
      <section class="mt-4 px-4 flex flex-col gap-3">

        <!-- 每月配送（默认选中） -->
        <div class="plan-card selected relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="true">
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">每月配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$25.20<span class="text-xs font-normal" style="color: var(--muted-foreground);">/月</span></p>
          </div>
        </div>

        <!-- 双月配送 -->
        <div class="plan-card relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="false">
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">双月配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$50.40<span class="text-xs font-normal" style="color: var(--muted-foreground);">/2月</span></p>
            <div class="mt-1.5 flex items-center gap-1.5">
              <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
              <span class="text-xs" style="color: var(--state-success); font-weight: 500;">免运费</span>
            </div>
          </div>
        </div>

        <!-- 季度配送（推荐） -->
        <div class="plan-card relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="false">
          <!-- 推荐标签 -->
          <span class="recommend-badge">推荐</span>
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">季度配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$75.60<span class="text-xs font-normal" style="color: var(--muted-foreground);">/3月</span></p>
            <div class="mt-1.5 flex items-center gap-3">
              <div class="flex items-center gap-1.5">
                <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
                <span class="text-xs" style="color: var(--state-success); font-weight: 500;">免运费</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
                <span class="text-xs" style="color: var(--state-success); font-weight: 500;">赠品</span>
              </div>
            </div>
          </div>
        </div>

      </section>

      <!-- 订阅权益说明列表 -->
      <section class="mt-5 px-4">
        <h4 class="text-sm font-semibold" style="color: var(--foreground);">订阅权益</h4>
        <div class="mt-2.5 flex flex-col gap-3 p-4" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card);">

          <!-- 权益1: 自动享 10% off -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">自动享 10% off</span>
          </div>

          <!-- 权益2: 免运费 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">免运费</span>
          </div>

          <!-- 权益3: 随时调整周期/暂停/取消 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">随时调整周期 / 暂停 / 取消</span>
          </div>

          <!-- 权益4: 提前 7 天续订提醒 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">提前 7 天续订提醒</span>
          </div>

        </div>
      </section>

      <!-- 配送信息 -->
      <section class="mt-5 px-4">
        <h4 class="text-sm font-semibold" style="color: var(--foreground);">配送信息</h4>
        <div class="mt-2.5 flex flex-col gap-3 p-4" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card);">

          <!-- 首次配送日期 -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); color: var(--icon-500);"></span>
              <span class="text-sm" style="color: var(--muted-foreground);">首次配送日期</span>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-sm font-semibold" style="color: var(--foreground);">2026-07-15</span>
              <i data-lucide="chevron-right" class="h-3.5 w-3.5" style="color: var(--icon-400);"></i>
            </div>
          </div>

          <!-- 分隔线 -->
          <div style="height: 1px; background-color: var(--border);"></div>

          <!-- 配送地址 -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); color: var(--icon-500);"></span>
              <span class="text-sm" style="color: var(--muted-foreground);">配送地址</span>
            </div>
            <div class="flex items-center gap-1 min-w-0">
              <span class="text-sm font-semibold truncate" style="color: var(--foreground);">默认地址 - Los Angeles</span>
              <i data-lucide="chevron-right" class="h-3.5 w-3.5 shrink-0" style="color: var(--icon-400);"></i>
            </div>
          </div>

        </div>
      </section>

      <!-- 底部固定 CTA -->
      <div class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
        <div class="px-4 pt-3 pb-3" style="padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));">
          <!-- 订阅总价 -->
          <div class="flex items-baseline justify-between mb-2.5">
            <span class="text-xs" style="color: var(--muted-foreground);">订阅总价</span>
            <span class="text-lg font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$25.20<span class="text-xs font-normal" style="color: var(--muted-foreground);">/月</span></span>
          </div>
          <!-- 开始订阅按钮 -->
          <button data-dom-id="cta-subscribe" class="flex w-full items-center justify-center h-12 text-sm font-bold whitespace-nowrap" style="border-radius: 999px; border: none; background-color: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-md);">
            开始订阅
          </button>
          <!-- 底部小字 -->
          <p class="mt-2 text-center text-xs" style="color: var(--muted-foreground);">可随时取消，无额外费用</p>
        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
