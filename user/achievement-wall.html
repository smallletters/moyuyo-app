<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就墙 - MOYUYO</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <main class="pb-8">

    <!-- 深色导航栏 -->
    <nav class="sticky top-0 z-30 flex items-center h-[44px] px-4" style="background: var(--background-800);" aria-label="成就墙导航">
      <button class="flex items-center justify-center w-9 h-9 -ml-1 rounded-full" style="color: var(--background-50);" aria-label="返回">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
      </button>
      <h1 class="flex-1 text-center text-[17px] font-semibold" style="color: var(--background-50);">成就墙</h1>
      <div class="w-9 h-9"></div>
    </nav>

    <!-- 总览统计区 -->
    <section class="px-5 pt-6 pb-4" aria-label="成就总览">
      <div class="rounded-2xl p-5 relative overflow-hidden" style="background: linear-gradient(135deg, var(--brand-500), var(--brand-700)); box-shadow: var(--shadow-lg);">
        <!-- 装饰背景圆 -->
        <div class="absolute -top-6 -right-6 w-28 h-28 rounded-full opacity-10" style="background: var(--background-50);"></div>
        <div class="absolute -bottom-4 -left-4 w-20 h-20 rounded-full opacity-10" style="background: var(--background-50);"></div>

        <div class="flex items-center justify-between relative z-10">
          <div>
            <p class="text-sm font-medium" style="color: rgba(255,255,255,0.8);">已获得成就</p>
            <div class="flex items-baseline gap-1.5 mt-1">
              <span class="text-3xl font-bold" style="color: var(--background-50);">4</span>
              <span class="text-lg font-medium" style="color: rgba(255,255,255,0.6);">/ 12</span>
            </div>
          </div>
          <div class="text-right">
            <p class="text-sm font-medium" style="color: rgba(255,255,255,0.8);">总积分</p>
            <span class="text-3xl font-bold mt-1 block" style="color: var(--background-50);">680</span>
          </div>
        </div>

        <!-- 进度条 -->
        <div class="mt-4 h-1.5 rounded-full overflow-hidden relative z-10" style="background: rgba(255,255,255,0.2);">
          <div class="h-full rounded-full" style="width: 33.33%; background: var(--background-50);"></div>
        </div>
      </div>
    </section>

    <!-- 已获得成就区域 -->
    <section class="pb-6" aria-label="已获得成就">
      <div class="px-5 pb-3 flex items-center gap-2">
        <i data-lucide="trophy" class="w-4 h-4" style="color: var(--primary);"></i>
        <h2 class="text-base font-semibold" style="color: var(--foreground);">已获得</h2>
        <span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background: var(--brand-50); color: var(--primary);">4 个</span>
      </div>

      <!-- 横向滚动的已解锁徽章 -->
      <div class="flex gap-3 overflow-x-auto no-scrollbar px-5">

        <!-- 干净宝贝 -->
        <div data-dom-id="badge-earned" data-badge-name="干净宝贝" data-badge-date="2026-06-15" class="shrink-0 flex flex-col items-center gap-2 w-[80px] cursor-pointer">
          <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, var(--brand-400), var(--brand-600)); box-shadow: 0 4px 12px -2px rgba(0, 122, 255, 0.35);">
            <i data-lucide="sparkles" class="w-6 h-6" style="color: var(--background-50);"></i>
          </div>
          <div class="text-center">
            <p class="text-xs font-semibold truncate w-full" style="color: var(--foreground);">干净宝贝</p>
            <p class="text-[10px] mt-0.5" style="color: var(--muted-foreground);">2026-06-15</p>
          </div>
        </div>

        <!-- 防疫达人 -->
        <div data-dom-id="badge-earned" data-badge-name="防疫达人" data-badge-date="2026-05-20" class="shrink-0 flex flex-col items-center gap-2 w-[80px] cursor-pointer">
          <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, var(--brand-400), var(--brand-600)); box-shadow: 0 4px 12px -2px rgba(0, 122, 255, 0.35);">
            <i data-lucide="shield-check" class="w-6 h-6" style="color: var(--background-50);"></i>
          </div>
          <div class="text-center">
            <p class="text-xs font-semibold truncate w-full" style="color: var(--foreground);">防疫达人</p>
            <p class="text-[10px] mt-0.5" style="color: var(--muted-foreground);">2026-05-20</p>
          </div>
        </div>

        <!-- 驱虫卫士 -->
        <div data-dom-id="badge-earned" data-badge-name="驱虫卫士" data-badge-date="2026-04-10" class="shrink-0 flex flex-col items-center gap-2 w-[80px] cursor-pointer">
          <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, var(--brand-400), var(--brand-600)); box-shadow: 0 4px 12px -2px rgba(0, 122, 255, 0.35);">
            <i data-lucide="bug-off" class="w-6 h-6" style="color: var(--background-50);"></i>
          </div>
          <div class="text-center">
            <p class="text-xs font-semibold truncate w-full" style="color: var(--foreground);">驱虫卫士</p>
            <p class="text-[10px] mt-0.5" style="color: var(--muted-foreground);">2026-04-10</p>
          </div>
        </div>

        <!-- 全勤铲屎官 -->
        <div data-dom-id="badge-earned" data-badge-name="全勤铲屎官" data-badge-date="2026-07-01" class="shrink-0 flex flex-col items-center gap-2 w-[80px] cursor-pointer">
          <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, var(--brand-400), var(--brand-600)); box-shadow: 0 4px 12px -2px rgba(0, 122, 255, 0.35);">
            <i data-lucide="calendar-check" class="w-6 h-6" style="color: var(--background-50);"></i>
          </div>
          <div class="text-center">
            <p class="text-xs font-semibold truncate w-full" style="color: var(--foreground);">全勤铲屎官</p>
            <p class="text-[10px] mt-0.5" style="color: var(--muted-foreground);">2026-07-01</p>
          </div>
        </div>

      </div>
    </section>

    <!-- 分割线 -->
    <div class="mx-5 h-px" style="background: var(--border);"></div>

    <!-- 未获得成就区域 -->
    <section class="pt-5 px-5" aria-label="未获得成就">
      <div class="flex items-center gap-2 pb-3">
        <i data-lucide="lock" class="w-4 h-4" style="color: var(--icon-400);"></i>
        <h2 class="text-base font-semibold" style="color: var(--foreground);">未获得</h2>
        <span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background: var(--secondary); color: var(--muted-foreground);">8 个</span>
      </div>

      <div class="flex flex-col gap-2.5">

        <!-- 探索先锋 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="compass" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">探索先锋</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">解锁所有 3D 场景</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

        <!-- 生日快乐 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="cake" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">生日快乐</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">宠物生日当天登录</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

        <!-- 日记达人 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="book-open" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">日记达人</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">连续记录 30 天日记</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

        <!-- 消费达人 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="shopping-bag" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">消费达人</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">累计消费满 $500</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

        <!-- 邀请达人 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="user-plus" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">邀请达人</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">邀请 10 位好友</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

        <!-- 创作者 -->
        <div data-dom-id="badge-locked" class="flex items-center gap-3.5 p-3.5 rounded-2xl border cursor-pointer" style="background: var(--card); border-color: var(--border);">
          <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, var(--background-300), var(--background-400));">
            <i data-lucide="pen-line" class="w-5 h-5" style="color: var(--background-600);"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium" style="color: var(--foreground);">创作者</p>
            <p class="text-xs mt-0.5" style="color: var(--muted-foreground);">发布 10 条社区笔记</p>
          </div>
          <i data-lucide="lock" class="w-3.5 h-3.5 shrink-0" style="color: var(--background-400);"></i>
        </div>

      </div>
    </section>

    <!-- 底部进度说明 -->
    <section class="px-5 pt-6 pb-4" aria-label="成就提示">
      <div class="flex items-start gap-2.5 p-4 rounded-2xl border" style="background: var(--accent); border-color: var(--border);">
        <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-0.5" style="background: var(--brand-50);">
          <i data-lucide="gift" class="w-4 h-4" style="color: var(--primary);"></i>
        </div>
        <div>
          <p class="text-sm font-medium" style="color: var(--foreground);">限定奖励</p>
          <p class="text-xs mt-1 leading-relaxed" style="color: var(--muted-foreground);">再获得 2 个成就即可解锁限定 Pet Hub 场景</p>
        </div>
      </div>
    </section>

  </main>
  <script>
    lucide.createIcons();

    // Toast 提示
    function showToast(msg) {
      var t = document.createElement('div');
      t.textContent = msg;
      Object.assign(t.style, {
        position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
        background: 'rgba(0,0,0,0.8)', color: '#fff', padding: '10px 24px',
        borderRadius: '999px', fontSize: '14px', zIndex: '9999',
        transition: 'opacity 0.3s ease', opacity: '0'
      });
      document.body.appendChild(t);
      requestAnimationFrame(function() { t.style.opacity = '1'; });
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 2000);
    }

    // 返回按钮
    document.querySelector('nav button').addEventListener('click', function() {
      window.history.length > 1 ? window.history.back() : window.location.href = 'settings.html';
    });

    // 已获得徽章点击 - 查看详情
    document.querySelectorAll('[data-dom-id="badge-earned"]').forEach(function(badge) {
      badge.addEventListener('click', function() {
        var name = this.getAttribute('data-badge-name');
        var date = this.getAttribute('data-badge-date');
        showToast('「' + name + '」获得于 ' + date);
      });
    });

    // 未获得成就点击 - 查看解锁方式
    document.querySelectorAll('[data-dom-id="badge-locked"]').forEach(function(badge) {
      badge.addEventListener('click', function() {
        var name = this.querySelector('.text-sm.font-medium').textContent;
        var desc = this.querySelector('.text-xs.mt-0\\.5') ? this.querySelector('.text-xs.mt-0\\.5').textContent : '';
        showToast('「' + name + '」' + desc);
      });
    });

    // 限定奖励提示点击
    document.querySelector('[aria-label="成就提示"]').addEventListener('click', function() {
      showToast('再获得 2 个成就即可解锁限定 Pet Hub 场景');
    });
  </script>
</body>
</html>
