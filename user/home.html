<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 首页</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    </head>
<body class="min-h-screen font-sans antialiased">

  <script>lucide.createIcons();</script>
  <script>
    (function () {
      // 商品卡片模板
      function productCard(product) {
        var slug = product.slug || product.id || '';
        var img = product.coverImage || product.images?.[0] || '../assets/product-placeholder.jpg';
        var name = product.name || product.title || '';
        var desc = product.subtitle || product.brief || '';
        var price = product.price != null ? '¥' + (product.price / 100).toFixed(0) : '';
        var originalPrice = product.originalPrice != null ? '¥' + (product.originalPrice / 100).toFixed(0) : '';
        var rating = product.rating || product.avgRating || '';
        var reviews = product.reviewCount || product.salesCount || '';

        var card = document.createElement('a');
        card.href = 'product-detail.html?slug=' + encodeURIComponent(slug);
        card.className = 'block rounded-[var(--radius)] overflow-hidden border';
        card.setAttribute('data-dom-id', 'link-product-detail');
        card.style.cssText = 'background:var(--card);border-color:var(--border);box-shadow:var(--shadow-xs);transition:transform 0.18s ease,box-shadow 0.18s ease';

        card.innerHTML =
          '<div class="aspect-square overflow-hidden">' +
          '<img src="' + img + '" alt="' + name + '" class="w-full h-full object-cover" onerror="this.src=\'../assets/product-placeholder.jpg\'">' +
          '</div>' +
          '<div class="p-3">' +
          '<h3 class="text-sm font-medium truncate" style="color:var(--foreground)">' + name + '</h3>' +
          (desc ? '<p class="text-xs mt-1 truncate" style="color:var(--text-400)">' + desc + '</p>' : '') +
          '<div class="flex items-baseline gap-1.5 mt-2">' +
          '<span class="text-sm font-semibold" style="color:var(--primary)">' + price + '</span>' +
          (originalPrice ? '<span class="text-xs line-through" style="color:var(--text-300)">' + originalPrice + '</span>' : '') +
          '</div>' +
          (rating ? '<div class="flex items-center gap-1 mt-1.5"><span data-icon class="w-3 h-3" style="-webkit-mask-image:url(\'../assets/icons/dl-builtin-apple/star.svg\');mask-image:url(\'../assets/icons/dl-builtin-apple/star.svg\');color:var(--brand-300)"></span><span class="text-xs" style="color:var(--text-400)">' + rating + (reviews ? ' · ' + formatCount(reviews) + ' 好评' : '') + '</span></div>' : '') +
          '</div>';

        return card;
      }

      function formatCount(n) {
        if (!n) return '';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return n.toString();
      }

      // 加载 Home Feed
      async function loadFeed() {
        var grid = document.getElementById('product-grid');
        if (!grid) return;

        try {
          var res = await moyuyoAPI.get('/api/v1/home/feed?page=1&pageSize=10', { skipSign: true });
          if (res.code === 0 && res.data) {
            var data = res.data;
            var products = data.products || data.recommendations || data.items || data.list || [];

            if (products.length > 0) {
              // 清除静态占位
              grid.innerHTML = '';
              // 渲染 API 商品
              products.forEach(function (p) {
                grid.appendChild(productCard(p));
              });
            }
            // 无数据时保留静态占位
          }
        } catch (e) {
          // API 不可用时保留静态占位，不报错
          console.log('[MOYUYO] Home feed unavailable, showing static content');
        }
      }

      loadFeed();
    })();
  </script>
</body>
</html>
