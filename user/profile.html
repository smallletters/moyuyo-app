    <script src="shared/api.js"></script><script>lucide.createIcons();</script>
  <script>
    (function () {
      function addLevelClass() {
        var levelSpan = document.querySelector('.inline-flex.items-center.px-2');
        if (levelSpan) levelSpan.classList.add('profile-level');
      }

      async function loadProfile() {
        try {
          var res = await moyuyoAPI.get('/api/v1/user/profile');
          if (res.code === 0 && res.data) {
            var user = res.data;
            var nameEl = document.querySelector('.profile-name');
            if (nameEl && user.nickname) nameEl.textContent = user.nickname;
            if (nameEl && user.name) nameEl.textContent = user.name;

            var avatarEl = document.querySelector('img[alt="用户头像"]');
            if (avatarEl && user.avatar) { avatarEl.src = user.avatar; }

            var levelEl = document.querySelector('.profile-level');
            if (levelEl && user.memberLevel) {
              levelEl.textContent = user.memberLevel;
              if (user.memberLevel === 'PRIME') {
                levelEl.style.background = 'var(--accent-green-100)';
                levelEl.style.color = 'var(--accent-green-600)';
              } else if (user.memberLevel === 'GOLD') {
                levelEl.style.background = 'var(--brand-100)';
                levelEl.style.color = 'var(--brand-600)';
              }
            }

            var walletRes = await moyuyoAPI.get('/api/v1/user/wallet');
            if (walletRes.code === 0 && walletRes.data) {
              var balanceEl = document.querySelector('.wallet-balance');
              var pointsEl = document.querySelector('.wallet-points');
              if (balanceEl && walletRes.data.balance) balanceEl.textContent = walletRes.data.balance.toFixed(2);
              if (pointsEl && walletRes.data.points) pointsEl.textContent = walletRes.data.points.toLocaleString();
            }

            var orderRes = await moyuyoAPI.get('/api/v1/order/count');
            if (orderRes.code === 0 && orderRes.data) {
              var pendingPay = document.querySelector('.order-pending-pay');
              var pendingShip = document.querySelector('.order-pending-ship');
              var pendingReceive = document.querySelector('.order-pending-receive');
              var pendingReview = document.querySelector('.order-pending-review');
              if (pendingPay && orderRes.data.pendingPay > 0) pendingPay.textContent = orderRes.data.pendingPay;
              if (pendingShip && orderRes.data.pendingShip > 0) pendingShip.textContent = orderRes.data.pendingShip;
              if (pendingReceive && orderRes.data.pendingReceive > 0) pendingReceive.textContent = orderRes.data.pendingReceive;
              if (pendingReview && orderRes.data.pendingReview > 0) pendingReview.textContent = orderRes.data.pendingReview;
            }
          }
        } catch (e) {
          console.log('[MOYUYO] Profile unavailable, showing static content');
        }
      }

      async function logout() {
        try {
          await moyuyoAPI.post('/api/v1/user/logout');
        } catch (e) {
          console.log('[MOYUYO] Logout failed, clearing local');
        }
        moyuyoAPI.clearAuth();
        window.location.href = 'login.html';
      }

      function updateWalletLabels() {
        var balanceEl = document.querySelector('.grid.grid-cols-4.gap-2 a:first-child .text-base');
        if (balanceEl) balanceEl.classList.add('wallet-balance');
        var pointsEl = document.querySelector('.grid.grid-cols-4.gap-2 a:nth-child(2) .text-base');
        if (pointsEl) pointsEl.classList.add('wallet-points');
      }

      function addOrderBadges() {
        var orderLinks = document.querySelectorAll('.grid.grid-cols-5.gap-1 a');
        if (orderLinks[1]) {
          var badge = document.createElement('span');
          badge.className = 'order-pending-pay';
          badge.style.cssText = 'position:absolute;top:4px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--state-error);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;';
          orderLinks[1].style.position = 'relative';
          orderLinks[1].appendChild(badge);
        }
        if (orderLinks[2]) {
          var badge = document.createElement('span');
          badge.className = 'order-pending-ship';
          badge.style.cssText = 'position:absolute;top:4px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--state-error);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;';
          orderLinks[2].style.position = 'relative';
          orderLinks[2].appendChild(badge);
        }
        if (orderLinks[3]) {
          var badge = document.createElement('span');
          badge.className = 'order-pending-receive';
          badge.style.cssText = 'position:absolute;top:4px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--state-error);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;';
          orderLinks[3].style.position = 'relative';
          orderLinks[3].appendChild(badge);
        }
        if (orderLinks[4]) {
          var badge = document.createElement('span');
          badge.className = 'order-pending-review';
          badge.style.cssText = 'position:absolute;top:4px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--state-error);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;';
          orderLinks[4].style.position = 'relative';
          orderLinks[4].appendChild(badge);
        }
      }

      function fixNavLinks() {
        var navHome = document.querySelector('a[data-dom-id="nav-home"]');
        if (navHome) navHome.href = 'home.html';

        var navCategory = document.querySelector('a[data-dom-id="nav-category"]');
        if (navCategory) navCategory.href = 'category.html';

        var navPetHub = document.querySelector('a[data-dom-id="nav-pet-hub"]');
        if (navPetHub) navPetHub.href = 'pet-hub.html';

        var navCommunity = document.querySelector('nav.fixed.bottom-0 a:nth-child(4)');
        if (navCommunity) navCommunity.href = 'community.html';

        var navProfile = document.querySelector('nav.fixed.bottom-0 a[data-active="true"]');
        if (navProfile) navProfile.href = 'profile.html';

        var commonLinks = document.querySelectorAll('section.px-4.py-3.grid.grid-cols-3 a');
        if (commonLinks[0]) commonLinks[0].href = 'address-list.html';
        if (commonLinks[1]) commonLinks[1].href = 'pet-profile.html';
        if (commonLinks[2]) commonLinks[2].href = 'favorites.html';
        if (commonLinks[3]) commonLinks[3].href = 'browsing-history.html';
        if (commonLinks[4]) commonLinks[4].href = 'help-center.html';
        if (commonLinks[5]) commonLinks[5].href = 'about.html';

        var orderLinks = document.querySelectorAll('.grid.grid-cols-5.gap-1 a');
        if (orderLinks[0]) orderLinks[0].href = 'order-list.html';
        if (orderLinks[1]) orderLinks[1].href = 'order-list.html?status=pending_pay';
        if (orderLinks[2]) orderLinks[2].href = 'order-list.html?status=pending_ship';
        if (orderLinks[3]) orderLinks[3].href = 'order-list.html?status=pending_receive';
        if (orderLinks[4]) orderLinks[4].href = 'order-list.html?status=pending_review';

        var walletLinks = document.querySelectorAll('.grid.grid-cols-4.gap-2 a');
        if (walletLinks[0]) walletLinks[0].href = 'wallet.html';
        if (walletLinks[1]) walletLinks[1].href = 'points-detail.html';
        if (walletLinks[2]) walletLinks[2].href = 'coupons.html';
        if (walletLinks[3]) walletLinks[3].href = 'gift-cards.html';
      }

      function addLogoutMenu() {
        var header = document.querySelector('section.px-4.pt-6.pb-4');
        if (header) {
          var logoutBtn = document.createElement('button');
          logoutBtn.innerHTML = '<i data-lucide="log-out" style="width:20px;height:20px;"></i>';
          logoutBtn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--text-500);cursor:pointer;transition:background-color 0.18s ease;';
          logoutBtn.style.marginLeft = 'auto';
          logoutBtn.onmouseover = function() { this.style.background = 'var(--background-200)'; };
          logoutBtn.onmouseout = function() { this.style.background = 'transparent'; };
          logoutBtn.addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
              logout();
            }
          });
          header.querySelector('.flex.items-center.gap-3').appendChild(logoutBtn);
          lucide.createIcons();
        }
      }

      addLevelClass();
      updateWalletLabels();
      addOrderBadges();
      fixNavLinks();
      addLogoutMenu();
      loadProfile();
    })();
  </script>
</body>
</html>
