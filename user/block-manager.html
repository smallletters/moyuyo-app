<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 屏蔽管理</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="mx-auto max-w-[375px] min-h-screen" style="background-color: var(--background-200);">

      <!-- 顶部导航栏 -->
      <header class="sticky top-0 z-30 flex items-center justify-center px-4" style="height: 44px; background-color: var(--background-50); border-bottom: 1px solid var(--border);">
        <button data-dom-id="cta-back" class="absolute left-4 inline-flex h-9 w-9 items-center justify-center rounded-lg transition-colors duration-150 hover:opacity-70" aria-label="返回" style="background-color: transparent;">
          <i data-lucide="chevron-left" class="h-5 w-5" style="color: var(--brand-500);"></i>
        </button>
        <h1 class="text-base font-semibold" style="color: var(--text-800); letter-spacing: -0.02em;">屏蔽管理</h1>
      </header>

      <div class="px-4 pt-4 pb-8 flex flex-col gap-3">

        <!-- Tab 切换栏 -->
        <div class="flex no-scrollbar overflow-x-auto gap-2 pb-1">
          <button class="block-tab active-tab shrink-0 px-4 py-2 rounded-full text-xs font-semibold transition-colors duration-150" data-tab="tab-users" style="background-color: var(--brand-500); color: var(--background-50);">屏蔽用户</button>
          <button class="block-tab shrink-0 px-4 py-2 rounded-full text-xs font-semibold transition-colors duration-150" data-tab="tab-topics" style="background-color: var(--background-50); color: var(--text-500);">屏蔽话题</button>
          <button class="block-tab shrink-0 px-4 py-2 rounded-full text-xs font-semibold transition-colors duration-150" data-tab="tab-keywords" style="background-color: var(--background-50); color: var(--text-500);">屏蔽关键词</button>
          <button class="block-tab shrink-0 px-4 py-2 rounded-full text-xs font-semibold transition-colors duration-150" data-tab="tab-muted" style="background-color: var(--background-50); color: var(--text-500);">静音账号</button>
        </div>

        <!-- ==================== 屏蔽用户 Tab ==================== -->
        <div id="tab-users" class="block-panel flex flex-col gap-3">
          <!-- 搜索框 -->
          <div class="flex items-center gap-2 h-10 px-3 rounded-xl" style="background-color: var(--background-50);">
            <i data-lucide="search" class="w-4 h-4 shrink-0" style="color: var(--text-400);"></i>
            <input type="text" placeholder="按昵称搜索" class="flex-1 bg-transparent border-none outline-none text-sm" style="color: var(--text-800);">
          </div>

          <!-- 已屏蔽用户列表 -->
          <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);">
            <!-- 用户1 -->
            <div class="flex items-center justify-between px-4" style="min-height: 68px;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-sm font-bold" style="background-color: var(--brand-200); color: var(--brand-700);">张</div>
                <div class="flex flex-col gap-0.5">
                  <span class="text-sm font-medium" style="color: var(--text-800);">张三家的猫咪</span>
                  <span class="text-xs" style="color: var(--text-400);">2025-06-10 屏蔽</span>
                </div>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">解除屏蔽</button>
            </div>
            <div style="height: 1px; background-color: var(--border); margin-left: 68px;"></div>

            <!-- 用户2 -->
            <div class="flex items-center justify-between px-4" style="min-height: 68px;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-sm font-bold" style="background-color: var(--state-success-surface); color: var(--state-success);">李</div>
                <div class="flex flex-col gap-0.5">
                  <span class="text-sm font-medium" style="color: var(--text-800);">李四爱狗</span>
                  <span class="text-xs" style="color: var(--text-400);">2025-05-22 屏蔽</span>
                </div>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">解除屏蔽</button>
            </div>
            <div style="height: 1px; background-color: var(--border); margin-left: 68px;"></div>

            <!-- 用户3 -->
            <div class="flex items-center justify-between px-4" style="min-height: 68px;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-sm font-bold" style="background-color: var(--state-error-surface); color: var(--state-error);">王</div>
                <div class="flex flex-col gap-0.5">
                  <span class="text-sm font-medium" style="color: var(--text-800);">王五宠物店</span>
                  <span class="text-xs" style="color: var(--text-400);">2025-04-18 屏蔽</span>
                </div>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">解除屏蔽</button>
            </div>
          </section>

          <!-- 底部提示 -->
          <p class="text-center text-xs py-2" style="color: var(--text-400);">已屏蔽 3/500 人</p>
        </div>

        <!-- ==================== 屏蔽话题 Tab ==================== -->
        <div id="tab-topics" class="block-panel flex flex-col gap-3" style="display: none;">
          <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);">
            <!-- 话题1 -->
            <div class="flex items-center justify-between px-4" style="min-height: 60px;">
              <div class="flex flex-col gap-0.5">
                <div class="flex items-center gap-1.5">
                  <span data-icon class="w-4 h-4 shrink-0" style="color: var(--brand-500); -webkit-mask-image: url('../assets/icons/dl-builtin-apple/hash.svg'); mask-image: url('../assets/icons/dl-builtin-apple/hash.svg');"></span>
                  <span class="text-sm font-medium" style="color: var(--text-800);">猫粮测评</span>
                </div>
                <span class="text-xs ml-[26px]" style="color: var(--text-400);">2025-06-01 屏蔽</span>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">解除</button>
            </div>
            <div style="height: 1px; background-color: var(--border); margin-left: 16px;"></div>

            <!-- 话题2 -->
            <div class="flex items-center justify-between px-4" style="min-height: 60px;">
              <div class="flex flex-col gap-0.5">
                <div class="flex items-center gap-1.5">
                  <span data-icon class="w-4 h-4 shrink-0" style="color: var(--brand-500); -webkit-mask-image: url('../assets/icons/dl-builtin-apple/hash.svg'); mask-image: url('../assets/icons/dl-builtin-apple/hash.svg');"></span>
                  <span class="text-sm font-medium" style="color: var(--text-800);">宠物医院推荐</span>
                </div>
                <span class="text-xs ml-[26px]" style="color: var(--text-400);">2025-05-15 屏蔽</span>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">解除</button>
            </div>
          </section>

          <!-- 添加屏蔽话题按钮 -->
          <button class="flex items-center justify-center gap-2 h-12 rounded-xl text-sm font-medium transition-colors duration-150" style="background-color: var(--background-50); color: var(--brand-500); border: 1px dashed var(--border);">
            <i data-lucide="plus" class="w-4 h-4" style="color: var(--brand-500);"></i>
            <span>添加屏蔽话题</span>
          </button>
        </div>

        <!-- ==================== 屏蔽关键词 Tab ==================== -->
        <div id="tab-keywords" class="block-panel flex flex-col gap-3" style="display: none;">
          <!-- 输入框 + 添加按钮 -->
          <div class="flex items-center gap-2">
            <div class="flex items-center flex-1 h-10 px-3 rounded-xl gap-2" style="background-color: var(--background-50);">
              <i data-lucide="type" class="w-4 h-4 shrink-0" style="color: var(--text-400);"></i>
              <input type="text" placeholder="输入关键词" class="flex-1 bg-transparent border-none outline-none text-sm" style="color: var(--text-800);" id="keyword-input">
            </div>
            <button class="shrink-0 h-10 px-4 rounded-xl text-sm font-semibold transition-colors duration-150" style="background-color: var(--brand-500); color: var(--background-50);">添加</button>
          </div>

          <!-- 已屏蔽关键词标签列表 -->
          <section class="flex flex-wrap gap-2 p-4 rounded-xl" style="background-color: var(--background-50);">
            <!-- 关键词标签1 -->
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background-color: var(--secondary);">
              <span class="text-xs font-medium" style="color: var(--text-800);">虚假宣传</span>
              <button class="inline-flex items-center justify-center w-4 h-4 rounded-full transition-colors duration-150" style="background-color: var(--background-300);">
                <i data-lucide="x" class="w-3 h-3" style="color: var(--text-500);"></i>
              </button>
            </div>
            <!-- 关键词标签2 -->
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background-color: var(--secondary);">
              <span class="text-xs font-medium" style="color: var(--text-800);">广告推广</span>
              <button class="inline-flex items-center justify-center w-4 h-4 rounded-full transition-colors duration-150" style="background-color: var(--background-300);">
                <i data-lucide="x" class="w-3 h-3" style="color: var(--text-500);"></i>
              </button>
            </div>
            <!-- 关键词标签3 -->
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background-color: var(--secondary);">
              <span class="text-xs font-medium" style="color: var(--text-800);">低质内容</span>
              <button class="inline-flex items-center justify-center w-4 h-4 rounded-full transition-colors duration-150" style="background-color: var(--background-300);">
                <i data-lucide="x" class="w-3 h-3" style="color: var(--text-500);"></i>
              </button>
            </div>
          </section>

          <!-- 底部提示 -->
          <p class="text-center text-xs py-2" style="color: var(--text-400);">已添加 3/50 个关键词</p>
        </div>

        <!-- ==================== 静音账号 Tab ==================== -->
        <div id="tab-muted" class="block-panel flex flex-col gap-3" style="display: none;">
          <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);">
            <!-- 静音账号1 -->
            <div class="flex items-center justify-between px-4" style="min-height: 68px;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-sm font-bold" style="background-color: var(--background-300); color: var(--text-600);">萌</div>
                <div class="flex flex-col gap-0.5">
                  <span class="text-sm font-medium" style="color: var(--text-800);">萌宠日记</span>
                  <span class="text-xs" style="color: var(--text-400);">已关注 / 已静音</span>
                </div>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">取消静音</button>
            </div>
            <div style="height: 1px; background-color: var(--border); margin-left: 68px;"></div>

            <!-- 静音账号2 -->
            <div class="flex items-center justify-between px-4" style="min-height: 68px;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-sm font-bold" style="background-color: var(--background-100); color: var(--text-600);">猫</div>
                <div class="flex flex-col gap-0.5">
                  <span class="text-sm font-medium" style="color: var(--text-800);">猫咪研究所</span>
                  <span class="text-xs" style="color: var(--text-400);">已关注 / 已静音</span>
                </div>
              </div>
              <button class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors duration-150" style="background-color: var(--secondary); color: var(--brand-500);">取消静音</button>
            </div>
          </section>

          <!-- 底部说明 -->
          <p class="text-center text-xs py-2" style="color: var(--text-400);">静音的账号仍会出现在你的关注列表中，但其动态不会出现在你的信息流</p>
        </div>

      </div>
    </main>

    <script>
      // Tab 切换逻辑
      document.addEventListener('DOMContentLoaded', function () {
        var tabs = document.querySelectorAll('.block-tab');
        var panels = document.querySelectorAll('.block-panel');

        tabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            var targetId = this.getAttribute('data-tab');

            // 切换 Tab 按钮样式
            tabs.forEach(function (t) {
              t.style.backgroundColor = 'var(--background-50)';
              t.style.color = 'var(--text-500)';
            });
            this.style.backgroundColor = 'var(--brand-500)';
            this.style.color = 'var(--background-50)';

            // 切换面板显示
            panels.forEach(function (p) {
              p.style.display = 'none';
            });
            document.getElementById(targetId).style.display = 'flex';
          });
        });
      });
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
