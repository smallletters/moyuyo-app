<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 宠物装扮</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-28">

      <!-- ===== 顶部导航栏（深色） ===== -->
      <div class="sticky top-0 z-30" style="background: var(--background-800);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--text-50);">9:41</span>
          <div class="flex items-center gap-1.5">
            <i data-lucide="signal" class="w-4 h-4" style="color: var(--text-50);"></i>
            <i data-lucide="wifi" class="w-4 h-4" style="color: var(--text-50);"></i>
            <i data-lucide="battery-full" class="w-4 h-4" style="color: var(--text-50);"></i>
          </div>
        </div>
        <!-- 导航内容 -->
        <div class="h-[44px] flex items-center gap-3 px-4 pb-2">
          <button class="w-9 h-9 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,0.12);" aria-label="返回">
            <i data-lucide="chevron-left" class="w-5 h-5" style="color: var(--text-50);"></i>
          </button>
          <h1 class="text-base font-semibold flex-1 text-center" style="color: var(--text-50);">宠物装扮</h1>
          <button class="w-9 h-9 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,0.12);" aria-label="装扮记录">
            <i data-lucide="history" class="w-5 h-5" style="color: var(--text-50);"></i>
          </button>
        </div>
      </div>

      <!-- ===== 宠物预览区 ===== -->
      <section class="px-4 pt-5 pb-4" style="background: var(--background-200);" aria-label="宠物预览">
        <!-- 3D 宠物圆形占位 -->
        <div class="flex justify-center">
          <div class="relative">
            <!-- 外圈光晕 -->
            <div class="absolute -inset-3 rounded-full" style="background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%);"></div>
            <!-- 主圆形宠物预览 -->
            <div class="w-48 h-48 rounded-full relative overflow-hidden" style="background: linear-gradient(145deg, #cfe5ff 0%, #9fcbff 40%, #66abff 100%); box-shadow: var(--shadow-lg);">
              <!-- 宠物剪影占位（CSS 渐变模拟） -->
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-28 h-32 rounded-t-full rounded-b-[40%]" style="background: linear-gradient(180deg, #f5c8a8 0%, #e8a882 60%, #d4956e 100%); box-shadow: inset 0 -8px 16px rgba(0,0,0,0.08);">
                  <!-- 耳朵 -->
                  <div class="absolute -top-3 left-3 w-6 h-8 rounded-t-full rounded-b-[30%] rotate-[-12deg]" style="background: #e8a882;"></div>
                  <div class="absolute -top-3 right-3 w-6 h-8 rounded-t-full rounded-b-[30%] rotate-[12deg]" style="background: #e8a882;"></div>
                  <!-- 眼睛 -->
                  <div class="absolute top-8 left-6 w-3 h-3.5 rounded-full" style="background: var(--background-800);"></div>
                  <div class="absolute top-8 right-6 w-3 h-3.5 rounded-full" style="background: var(--background-800);"></div>
                  <!-- 鼻子 -->
                  <div class="absolute top-12 left-1/2 -translate-x-1/2 w-2.5 h-2 rounded-full" style="background: #c47a5a;"></div>
                </div>
              </div>
              <!-- 当前穿戴装扮标识 -->
              <div class="absolute bottom-2 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full text-[10px] font-semibold whitespace-nowrap" style="background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); color: var(--text-50);">
                当前穿戴: 经典红色项圈
              </div>
            </div>
            <!-- 旋转提示 -->
            <button class="absolute -bottom-1 right-0 w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--card); box-shadow: var(--shadow-sm); border: 1px solid var(--border);" aria-label="旋转宠物">
              <i data-lucide="rotate-3d" class="w-4 h-4" style="color: var(--icon-600);"></i>
            </button>
          </div>
        </div>
        <!-- 装扮操作提示 -->
        <p class="text-center text-xs mt-4" style="color: var(--text-400);">点击下方配饰即可实时预览装扮效果</p>
      </section>

      <!-- ===== 已保存套装切换 ===== -->
      <section class="px-4 py-4" style="background: var(--background-200);" aria-label="已保存套装">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold" style="color: var(--foreground);">我的套装</h2>
          <span class="text-xs" style="color: var(--text-400);">3/3 套</span>
        </div>
        <div class="flex gap-4 justify-center">
          <!-- 套装 1 (当前使用) -->
          <button class="flex flex-col items-center gap-1.5" aria-label="套装1 - 日常休闲">
            <div class="w-14 h-14 rounded-full relative" style="background: linear-gradient(135deg, #ff6b6b, #ffa07a); box-shadow: 0 0 0 2.5px var(--primary), var(--shadow-sm);">
              <div class="absolute inset-1 rounded-full flex items-center justify-center" style="background: var(--background-200);">
                <i data-lucide="shirt" class="w-4 h-4" style="color: var(--primary);"></i>
              </div>
            </div>
            <span class="text-[10px] font-medium" style="color: var(--primary);">日常休闲</span>
          </button>
          <!-- 套装 2 -->
          <button class="flex flex-col items-center gap-1.5" aria-label="套装2 - 派对女王">
            <div class="w-14 h-14 rounded-full relative" style="background: linear-gradient(135deg, #e5e5ea, #d1d1d6); box-shadow: var(--shadow-xs);">
              <div class="absolute inset-1 rounded-full flex items-center justify-center" style="background: var(--background-200);">
                <i data-lucide="crown" class="w-4 h-4" style="color: var(--text-400);"></i>
              </div>
            </div>
            <span class="text-[10px] font-medium" style="color: var(--text-400);">派对女王</span>
          </button>
          <!-- 套装 3 -->
          <button class="flex flex-col items-center gap-1.5" aria-label="套装3 - 户外探险">
            <div class="w-14 h-14 rounded-full relative" style="background: linear-gradient(135deg, #e5e5ea, #d1d1d6); box-shadow: var(--shadow-xs);">
              <div class="absolute inset-1 rounded-full flex items-center justify-center" style="background: var(--background-200);">
                <i data-lucide="mountain" class="w-4 h-4" style="color: var(--text-400);"></i>
              </div>
            </div>
            <span class="text-[10px] font-medium" style="color: var(--text-400);">户外探险</span>
          </button>
        </div>
      </section>

      <!-- ===== IP 专属装扮区 ===== -->
      <section class="px-4 py-4" aria-label="IP专属装扮">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="sparkles" class="w-4 h-4" style="color: var(--brand-300);"></i>
          <h2 class="text-sm font-semibold" style="color: var(--foreground);">IP 联名专属</h2>
        </div>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
          <!-- MILO 探险帽 -->
          <div class="shrink-0 w-[140px] rounded-2xl overflow-hidden relative" style="background: linear-gradient(135deg, #007AFF, #5856d6); box-shadow: var(--shadow-md);">
            <div class="p-3 pt-4">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2" style="background: rgba(255,255,255,0.2);">
                <i data-lucide="hard-hat" class="w-5 h-5" style="color: var(--text-50);"></i>
              </div>
              <span class="text-xs font-bold block" style="color: var(--text-50);">MILO 探险帽</span>
              <span class="text-[10px] mt-0.5 block" style="color: rgba(255,255,255,0.7);">限定联名款</span>
            </div>
          </div>
          <!-- LUNA 蝴蝶结 -->
          <div class="shrink-0 w-[140px] rounded-2xl overflow-hidden relative" style="background: linear-gradient(135deg, #ff6b9d, #c44569); box-shadow: var(--shadow-md);">
            <div class="p-3 pt-4">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2" style="background: rgba(255,255,255,0.2);">
                <i data-lucide="ribbon" class="w-5 h-5" style="color: var(--text-50);"></i>
              </div>
              <span class="text-xs font-bold block" style="color: var(--text-50);">LUNA 蝴蝶结</span>
              <span class="text-[10px] mt-0.5 block" style="color: rgba(255,255,255,0.7);">限定联名款</span>
            </div>
          </div>
          <!-- ATLAS 护目镜 -->
          <div class="shrink-0 w-[140px] rounded-2xl overflow-hidden relative" style="background: linear-gradient(135deg, #34c759, #248a3d); box-shadow: var(--shadow-md);">
            <div class="p-3 pt-4">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2" style="background: rgba(255,255,255,0.2);">
                <i data-lucide="glasses" class="w-5 h-5" style="color: var(--text-50);"></i>
              </div>
              <span class="text-xs font-bold block" style="color: var(--text-50);">ATLAS 护目镜</span>
              <span class="text-[10px] mt-0.5 block" style="color: rgba(255,255,255,0.7);">限定联名款</span>
            </div>
          </div>
          <!-- OLIVE 画家帽 -->
          <div class="shrink-0 w-[140px] rounded-2xl overflow-hidden relative" style="background: linear-gradient(135deg, #ff9500, #c77800); box-shadow: var(--shadow-md);">
            <div class="p-3 pt-4">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-2" style="background: rgba(255,255,255,0.2);">
                <i data-lucide="paintbrush" class="w-5 h-5" style="color: var(--text-50);"></i>
              </div>
              <span class="text-xs font-bold block" style="color: var(--text-50);">OLIVE 画家帽</span>
              <span class="text-[10px] mt-0.5 block" style="color: rgba(255,255,255,0.7);">限定联名款</span>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== 装扮分类 Tab ===== -->
      <section class="px-4 pt-2" aria-label="装扮分类">
        <div class="flex gap-0 border-b overflow-x-auto no-scrollbar" style="border-color: var(--border);">
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-semibold relative" style="color: var(--primary);">
            全部
            <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 rounded-full" style="background: var(--primary);"></span>
          </button>
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-medium" style="color: var(--text-400);">
            项圈
          </button>
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-medium" style="color: var(--text-400);">
            蝴蝶结
          </button>
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-medium" style="color: var(--text-400);">
            帽子
          </button>
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-medium" style="color: var(--text-400);">
            眼镜
          </button>
          <button class="shrink-0 px-4 h-10 flex items-center justify-center text-sm font-medium" style="color: var(--text-400);">
            衣服
          </button>
        </div>
      </section>

      <!-- ===== 装扮网格（3列） ===== -->
      <section class="px-4 pt-3 pb-4" aria-label="装扮列表">
        <div class="grid grid-cols-3 gap-2.5">

          <!-- 装扮 1: 经典红色项圈（已拥有，穿戴中） -->
          <button class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 2px solid var(--primary); box-shadow: var(--shadow-sm);" aria-label="经典红色项圈 - 穿戴中">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #ff6b6b, #ee5a5a);">
              <!-- 穿戴中标识 -->
              <div class="absolute top-1.5 right-1.5 px-1.5 py-0.5 rounded-md text-[9px] font-bold" style="background: var(--primary); color: var(--primary-foreground);">
                穿戴中
              </div>
              <!-- 图标占位 -->
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="link" class="w-7 h-7" style="color: rgba(255,255,255,0.9);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--foreground);">经典红色项圈</span>
          </button>

          <!-- 装扮 2: 星星蝴蝶结（已拥有） -->
          <button class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs);" aria-label="星星蝴蝶结">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #ff9f43, #feca57);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="star" class="w-7 h-7" style="color: rgba(255,255,255,0.9);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--foreground);">星星蝴蝶结</span>
          </button>

          <!-- 装扮 3: 牛仔小帽（已拥有） -->
          <button class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs);" aria-label="牛仔小帽">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #4834d4, #686de0);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="circle-dot" class="w-7 h-7" style="color: rgba(255,255,255,0.9);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--foreground);">牛仔小帽</span>
          </button>

          <!-- 装扮 4: 复古圆框眼镜（已拥有） -->
          <button class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs);" aria-label="复古圆框眼镜">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="glasses" class="w-7 h-7" style="color: rgba(255,255,255,0.9);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--foreground);">复古圆框眼镜</span>
          </button>

          <!-- 装扮 5: 格子小衬衫（未拥有 - 积分兑换） -->
          <div class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs); opacity: 0.5;">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #b8b8b8, #d1d1d6);">
              <!-- 锁定图标 -->
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="lock" class="w-6 h-6" style="color: var(--icon-400);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--text-400);">格子小衬衫</span>
            <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-md" style="background: var(--background-200); color: var(--brand-600);">积分兑换 200</span>
          </div>

          <!-- 装扮 6: 皇冠（未拥有 - 活动获取） -->
          <div class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs); opacity: 0.5;">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #b8b8b8, #d1d1d6);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="lock" class="w-6 h-6" style="color: var(--icon-400);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--text-400);">皇冠</span>
            <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-md" style="background: var(--background-200); color: var(--brand-600);">活动获取</span>
          </div>

          <!-- 装扮 7: 蕾丝项圈（未拥有 - 购买解锁） -->
          <div class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs); opacity: 0.5;">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #b8b8b8, #d1d1d6);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="lock" class="w-6 h-6" style="color: var(--icon-400);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--text-400);">蕾丝项圈</span>
            <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-md" style="background: var(--background-200); color: var(--brand-600);">$2.99</span>
          </div>

          <!-- 装扮 8: 太阳镜（未拥有 - 购买解锁） -->
          <div class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs); opacity: 0.5;">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #b8b8b8, #d1d1d6);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="lock" class="w-6 h-6" style="color: var(--icon-400);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--text-400);">太阳镜</span>
            <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-md" style="background: var(--background-200); color: var(--brand-600);">$1.99</span>
          </div>

          <!-- 装扮 9: 毛绒外套（未拥有 - 积分兑换） -->
          <div class="flex flex-col items-center gap-1.5 rounded-2xl p-2.5 relative" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-xs); opacity: 0.5;">
            <div class="w-full aspect-square rounded-xl relative overflow-hidden" style="background: linear-gradient(135deg, #b8b8b8, #d1d1d6);">
              <div class="absolute inset-0 flex items-center justify-center">
                <i data-lucide="lock" class="w-6 h-6" style="color: var(--icon-400);"></i>
              </div>
            </div>
            <span class="text-[11px] font-medium w-full text-center truncate" style="color: var(--text-400);">毛绒外套</span>
            <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-md" style="background: var(--background-200); color: var(--brand-600);">积分兑换 500</span>
          </div>

        </div>
      </section>

      <!-- ===== 底部固定操作栏 ===== -->
      <div class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
        <div class="flex items-center gap-3 px-4 py-3" style="padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);">
          <!-- 积分显示 -->
          <div class="flex items-center gap-1.5 px-3 py-2 rounded-xl" style="background: var(--background-200);">
            <i data-lucide="coins" class="w-4 h-4" style="color: var(--brand-300);"></i>
            <span class="text-xs font-semibold" style="color: var(--text-600);">1,280</span>
          </div>
          <!-- 保存装扮按钮 -->
