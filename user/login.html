<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO - Sign In</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <main class="relative flex items-center justify-center min-h-screen overflow-hidden" style="width: 375px; margin: 0 auto;">

    <!-- Fullscreen background image + dark overlay -->
    <img src="../assets/login-bg.jpg" alt="" class="absolute inset-0 w-full h-full object-cover">
    <div class="absolute inset-0" style="background: rgba(0, 0, 0, 0.45);"></div>

    <!-- Login card -->
    <div class="relative z-10 w-full mx-4" style="max-width: 343px; background: var(--background-50); border-radius: calc(var(--radius) * 1.6); padding: 32px; box-shadow: var(--shadow-xl); animation: cardEnter 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;">

      <!-- Brand name -->
      <h1 class="text-center" style="font-family: var(--font-sans); font-size: 24px; font-weight: 700; color: var(--text-800); letter-spacing: 0.06em; margin-bottom: 4px;">
        MOYUYO
      </h1>
      <!-- Tagline -->
      <p class="text-center" style="font-size: 13px; color: var(--text-500); margin-bottom: 28px;">
        A Better Life for Your Pet
      </p>

      <!-- Login method tab switch -->
      <div class="flex rounded-lg overflow-hidden" style="height: 36px; background: var(--background-200); margin-bottom: 20px;">
        <button
          id="tab-phone"
          class="flex-1 flex items-center justify-center text-center transition-colors duration-200"
          style="font-size: 13px; font-weight: 600; border-radius: calc(var(--radius) * 0.8); background: var(--background-50); color: var(--text-800); box-shadow: var(--shadow-xs); border: none; cursor: pointer;"
          onclick="switchTab('phone')"
        >
          Phone
        </button>
        <button
          id="tab-email"
          class="flex-1 flex items-center justify-center text-center transition-colors duration-200"
          style="font-size: 13px; font-weight: 500; border-radius: calc(var(--radius) * 0.8); background: transparent; color: var(--text-400); box-shadow: none; border: none; cursor: pointer;"
          onclick="switchTab('email')"
        >
          Email
        </button>
      </div>

      <!-- Phone login form -->
      <form id="form-phone" onsubmit="return false;" autocomplete="off">
        <!-- Phone number input row -->
        <div class="flex items-center gap-2" style="height: 44px; margin-bottom: 12px;">
          <!-- Country code selector -->
          <button
            type="button"
            class="flex items-center justify-center shrink-0"
            style="width: 64px; height: 44px; border: 1px solid var(--input); border-radius: var(--radius); background: var(--background-100); color: var(--text-800); font-size: 14px; font-weight: 500; cursor: pointer;"
            aria-label="Select country code"
          >
            +1
          </button>
          <!-- Phone number input -->
          <input
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="Phone number"
            maxlength="10"
            class="flex-1"
            style="height: 44px; padding: 0 14px; border: 1px solid var(--input); border-radius: var(--radius); background: var(--background-50); color: var(--text-800); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.18s ease, box-shadow 0.18s ease;"
            onfocus="this.style.borderColor='var(--ring)'; this.style.boxShadow='0 0 0 1px var(--ring)';"
            onblur="this.style.borderColor='var(--input)'; this.style.boxShadow='none';"
          >
        </div>
        <!-- Get verification code + verification code input -->
        <div class="flex items-center gap-2" style="height: 44px; margin-bottom: 24px;">
          <input
            type="text"
            inputmode="numeric"
            placeholder="Verification code"
            maxlength="6"
            class="flex-1"
            style="height: 44px; padding: 0 14px; border: 1px solid var(--input); border-radius: var(--radius); background: var(--background-50); color: var(--text-800); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.18s ease, box-shadow 0.18s ease;"
            onfocus="this.style.borderColor='var(--ring)'; this.style.boxShadow='0 0 0 1px var(--ring)';"
            onblur="this.style.borderColor='var(--input)'; this.style.boxShadow='none';"
          >
          <button
            type="button"
            class="shrink-0"
            style="height: 44px; padding: 0 14px; border: none; border-radius: var(--radius); background: transparent; color: var(--brand-500); font-size: 13px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; white-space: nowrap; transition: opacity 0.18s ease;"
            onmouseover="this.style.opacity='0.8';"
            onmouseout="this.style.opacity='1';"
          >
            Send Code
          </button>
        </div>
      </form>

      <!-- Email login form (hidden by default) -->
      <form id="form-email" onsubmit="return false;" autocomplete="off" style="display: none;">
        <!-- Email input -->
        <div style="height: 44px; margin-bottom: 12px;">
          <input
            id="login-email"
            type="email"
            placeholder="Email address"
            class="w-full"
            style="height: 44px; padding: 0 14px; border: 1px solid var(--input); border-radius: var(--radius); background: var(--background-50); color: var(--text-800); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.18s ease, box-shadow 0.18s ease;"
            onfocus="this.style.borderColor='var(--ring)'; this.style.boxShadow='0 0 0 1px var(--ring)';"
            onblur="this.style.borderColor='var(--input)'; this.style.boxShadow='none';"
          >
        </div>
        <!-- Password input -->
        <div class="relative" style="height: 44px; margin-bottom: 24px;">
          <input
            id="email-password"
            type="password"
            placeholder="Password"
            class="w-full"
            style="height: 44px; padding: 0 14px; padding-right: 44px; border: 1px solid var(--input); border-radius: var(--radius); background: var(--background-50); color: var(--text-800); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.18s ease, box-shadow 0.18s ease;"
            onfocus="this.style.borderColor='var(--ring)'; this.style.boxShadow='0 0 0 1px var(--ring)';"
            onblur="this.style.borderColor='var(--input)'; this.style.boxShadow='none';"
          >
          <button
            type="button"
            class="absolute right-0 top-0 flex items-center justify-center"
            style="width: 44px; height: 44px; border: none; background: transparent; color: var(--text-400); cursor: pointer;"
            aria-label="Toggle password"
            onclick="togglePassword()"
          >
            <i data-lucide="eye-off" style="width: 18px; height: 18px;"></i>
          </button>
        </div>
      </form>

      <!-- Login button -->
      <button
        id="btn-login"
        type="button"
        data-dom-id="cta-login"
        class="w-full flex items-center justify-center"
        style="height: 48px; border: none; border-radius: 999px; background: var(--brand-500); color: var(--background-50); font-size: 16px; font-weight: 600; font-family: var(--font-sans); letter-spacing: 0.02em; cursor: pointer; transition: filter 0.18s ease, transform 0.18s ease;"
        onmouseover="this.style.filter='brightness(0.92)';"
        onmouseout="this.style.filter='none';"
        onmousedown="this.style.transform='scale(0.98)';"
        onmouseup="this.style.transform='scale(1)';"
      >
        Sign In
      </button>

      <!-- Error message -->
      <p id="login-error" class="text-center mt-3" style="display:none;font-size:13px;color:var(--state-error);min-height:20px"></p>

      <!-- Other login methods divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1" style="height: 1px; background: var(--background-300);"></div>
        <span style="font-size: 12px; color: var(--text-400); white-space: nowrap;">or continue with</span>
        <div class="flex-1" style="height: 1px; background: var(--background-300);"></div>
      </div>

      <!-- Social login button row -->
      <div class="flex items-center justify-center gap-5">
        <!-- Google login -->
        <button
          type="button"
          data-dom-id="cta-google"
          class="flex items-center justify-center"
          style="width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--background-300); background: var(--background-100); color: var(--text-600); cursor: pointer; transition: background-color 0.18s ease, border-color 0.18s ease;"
          onmouseover="this.style.borderColor='var(--background-400)'; this.style.background='var(--background-200)';"
          onmouseout="this.style.borderColor='var(--background-300)'; this.style.background='var(--background-100)';"
          aria-label="Sign in with Google"
        >
          <!-- Google SVG icon -->
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>
        <!-- Apple login -->
        <button
          type="button"
          data-dom-id="cta-apple"
          class="flex items-center justify-center"
          style="width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--background-300); background: var(--background-100); color: var(--text-600); cursor: pointer; transition: background-color 0.18s ease, border-color 0.18s ease;"
          onmouseover="this.style.borderColor='var(--background-400)'; this.style.background='var(--background-200)';"
          onmouseout="this.style.borderColor='var(--background-300)'; this.style.background='var(--background-100)';"
          aria-label="Sign in with Apple"
        >
          <!-- Apple SVG icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
        </button>
        <!-- More login methods -->
        <button
          type="button"
          class="flex items-center justify-center"
          style="width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--background-300); background: var(--background-100); color: var(--text-400); cursor: pointer; transition: background-color 0.18s ease, border-color 0.18s ease;"
          onmouseover="this.style.borderColor='var(--background-400)'; this.style.background='var(--background-200)';"
          onmouseout="this.style.borderColor='var(--background-300)'; this.style.background='var(--background-100)';"
          aria-label="More login methods"
        >
          <i data-lucide="ellipsis" style="width: 20px; height: 20px;"></i>
        </button>
      </div>

      <!-- Bottom registration guide -->
      <p class="text-center mt-6" style="font-size: 13px; color: var(--text-400);">
        Don't have an account?
        <a
          href="#"
          data-dom-id="link-register"
          style="color: var(--brand-500); font-weight: 600; text-decoration: none; transition: opacity 0.18s ease;"
          onmouseover="this.style.opacity='0.8';"
          onmouseout="this.style.opacity='1';"
        >Sign Up</a>
      </p>
    </div>
  </main>

  <script src="shared/mock-api.js"></script>
  <script src="shared/api.js"></script>
  <script>
    var currentTab = 'phone';
    var codeTimer = null;

    function switchTab(type) {
      currentTab = type;
      var tabPhone = document.getElementById('tab-phone');
      var tabEmail = document.getElementById('tab-email');
      var formPhone = document.getElementById('form-phone');
      var formEmail = document.getElementById('form-email');
      if (type === 'phone') {
        tabPhone.style.background = 'var(--background-50)'; tabPhone.style.color = 'var(--text-800)'; tabPhone.style.fontWeight = '600'; tabPhone.style.boxShadow = 'var(--shadow-xs)';
        tabEmail.style.background = 'transparent'; tabEmail.style.color = 'var(--text-400)'; tabEmail.style.fontWeight = '500'; tabEmail.style.boxShadow = 'none';
        formPhone.style.display = 'block'; formEmail.style.display = 'none';
      } else {
        tabEmail.style.background = 'var(--background-50)'; tabEmail.style.color = 'var(--text-800)'; tabEmail.style.fontWeight = '600'; tabEmail.style.boxShadow = 'var(--shadow-xs)';
        tabPhone.style.background = 'transparent'; tabPhone.style.color = 'var(--text-400)'; tabPhone.style.fontWeight = '500'; tabPhone.style.boxShadow = 'none';
        formPhone.style.display = 'none'; formEmail.style.display = 'block';
      }
      clearError();
    }

    function togglePassword() {
      var pwd = document.getElementById('email-password');
      var btn = pwd.parentElement.querySelector('button');
      if (pwd.type === 'password') { pwd.type = 'text'; btn.innerHTML = '<i data-lucide="eye" style="width:18px;height:18px"></i>'; }
      else { pwd.type = 'password'; btn.innerHTML = '<i data-lucide="eye-off" style="width:18px;height:18px"></i>'; }
      lucide.createIcons();
    }

    function showError(msg) {
      var el = document.getElementById('login-error');
      el.textContent = msg; el.style.display = 'block';
    }
    function clearError() {
      var el = document.getElementById('login-error');
      el.textContent = ''; el.style.display = 'none';
    }
    function setLoading(loading) {
      var btn = document.getElementById('btn-login');
      btn.textContent = loading ? 'Signing in...' : 'Sign In';
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.6' : '1';
    }

    function startCodeTimer(btn) {
      var seconds = 60;
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.textContent = seconds + 's';
      codeTimer = setInterval(function() {
        seconds--;
        if (seconds <= 0) {
          clearInterval(codeTimer);
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.textContent = currentTab === 'phone' ? 'Send Code' : 'Send Code';
        } else {
          btn.textContent = seconds + 's';
        }
      }, 1000);
    }

    // Send verification code
    document.querySelector('#form-phone button:last-child').addEventListener('click', async function() {
      var phoneInput = document.querySelector('#form-phone input[type="tel"]');
      var phone = phoneInput.value.trim();
      if (!phone) { showError('Please enter your phone number'); return; }
      if (phone.length < 10) { showError('Invalid phone number'); return; }

      try {
        await moyuyoAPI.post('/api/v1/user/sms/send', {
          phone: phone,
          countryCode: '+1',
          scene: 'login'
        }, { skipSign: true });
        startCodeTimer(this);
        showError('');
      } catch (e) {
        showError('Failed to send verification code');
      }
    });

    // Send verification code on email login page
    document.querySelector('#form-email button').addEventListener('click', async function() {
      var emailInput = document.getElementById('login-email');
      var email = emailInput.value.trim();
      if (!email) { showError('Please enter your email'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Invalid email format'); return; }

      try {
        await moyuyoAPI.post('/api/v1/user/email/send', {
          email: email,
          scene: 'login'
        }, { skipSign: true });
        startCodeTimer(this);
        showError('');
      } catch (e) {
        showError('Failed to send verification code');
      }
    });

    // Login
    document.getElementById('btn-login').addEventListener('click', async function () {
      clearError();
      setLoading(true);

      try {
        if (currentTab === 'phone') {
          var phone = document.querySelector('#form-phone input[type="tel"]').value.trim();
          var code = document.querySelector('#form-phone input[type="text"]').value.trim();
          if (!phone) { showError('Please enter your phone number'); setLoading(false); return; }
          if (!code) { showError('Please enter verification code'); setLoading(false); return; }

          var res = await moyuyoAPI.post('/api/v1/user/login/sms', {
            phone: phone,
            countryCode: '+1',
            code: code,
            deviceId: moyuyoAPI.getDeviceId()
          }, { skipSign: true });

          handleLoginResult(res);
        } else {
          var email = document.getElementById('login-email').value.trim();
          var password = document.getElementById('email-password').value;
          if (!email) { showError('Please enter your email'); setLoading(false); return; }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Invalid email format'); setLoading(false); return; }
          if (!password) { showError('Please enter your password'); setLoading(false); return; }

          var res = await moyuyoAPI.post('/api/v1/user/login/email', {
            email: email,
            password: password,
            deviceId: moyuyoAPI.getDeviceId()
          }, { skipSign: true });

          handleLoginResult(res);
        }
      } catch (e) {
        showError('Network error. Please check your connection.');
      }
      setLoading(false);
    });

    function handleLoginResult(res) {
      if (res.code === 0 && res.data) {
        moyuyoAPI.setAuth(res.data.accessToken, res.data.refreshToken);
        window.location.href = 'home.html';
      } else if (res.code === 1204) {
        localStorage.setItem('moyuyo_2fa_temp', res.data ? res.data.tempToken : '');
        window.location.href = 'account-security.html';
      } else if (res.code === 1201) {
        showError('Email or password is incorrect');
      } else if (res.code === 1202) {
        showError('Account locked. Please try again later.');
      } else if (res.code === 1203) {
        showError('Email not verified');
      } else {
        showError(res.message || 'Login failed. Please try again.');
      }
    }

    document.getElementById('email-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
    document.getElementById('login-email').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('email-password').focus();
    });

    document.querySelector('#form-phone input[type="text"]').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    document.querySelector('a[data-dom-id="link-register"]').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'register.html';
    });
  </script>

  <!-- Login page entrance animation -->
  <style>
    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
  <script>lucide.createIcons();</script>
</body>
</html>
