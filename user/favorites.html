<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO - My Favorites</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen bg-[var(--background)]" style="max-width: 375px; margin: 0 auto;">
      <!-- Top Navigation Bar -->
      <header class="sticky top-0 z-30 border-b border-[var(--border)] bg-[var(--background)]/95 backdrop-blur">
        <div class="flex h-11 items-center px-4">
          <!-- Back Button -->
          <button data-dom-id="back-previous" class="inline-flex h-8 w-8 items-center justify-center rounded-lg" aria-label="Back">
            <i data-lucide="chevron-left" class="h-5 w-5" style="color: var(--foreground);"></i>
          </button>
          <!-- Centered Title -->
          <div class="min-w-0 flex-1 text-center text-[16px] font-semibold tracking-[-0.02em]" style="color: var(--text-800);">My Favorites</div>
          <!-- View Toggle Icon -->
          <button class="inline-flex h-8 w-8 items-center justify-center rounded-lg" aria-label="Toggle View">
            <i data-lucide="layout-grid" class="h-5 w-5" style="color: var(--icon);"></i>
          </button>
        </div>
      </header>

      <!-- Filter Tab Bar -->
      <nav class="flex items-center gap-2 px-4 py-3 overflow-x-auto no-scrollbar">
        <button class="inline-flex h-8 items-center justify-center px-3 rounded-lg whitespace-nowrap text-[13px] font-medium" style="background: var(--brand-500); color: var(--background-50);">All</button>
        <button class="inline-flex h-8 items-center justify-center px-3 rounded-lg whitespace-nowrap text-[13px] font-medium" style="background: var(--background-200); color: var(--text-500);">On Sale</button>
        <button class="inline-flex h-8 items-center justify-center px-3 rounded-lg whitespace-nowrap text-[13px] font-medium" style="background: var(--background-200); color: var(--text-500);">New</button>
        <button class="inline-flex h-8 items-center justify-center px-3 rounded-lg whitespace-nowrap text-[13px] font-medium" style="background: var(--background-200); color: var(--text-500);">Low Stock</button>
      </nav>

      <!-- Product Grid 2 Columns -->
      <section class="grid grid-cols-2 gap-2 px-3 pb-4">
        <!-- Product 1: Grooming Kit -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-shampoo-bottle.jpg" alt="Gentle Plant-Based Pet Grooming Kit" class="w-full h-full object-cover" loading="lazy">
            <!-- Heart Icon - Favorited (Filled Red) -->
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Gentle Plant-Based Pet Grooming Kit</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥128</p>
          </div>
        </a>

        <!-- Product 2: Leash Set -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-harness-gear.jpg" alt="Classic Nylon Pet Leash Set" class="w-full h-full object-cover" loading="lazy">
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Classic Nylon Pet Leash Set</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥89</p>
          </div>
        </a>

        <!-- Product 3: Interactive Toy Ball -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-toy-play.jpg" alt="Eco-Friendly Plush Interactive Toy Ball" class="w-full h-full object-cover" loading="lazy">
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Eco-Friendly Plush Interactive Toy Ball</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥45</p>
          </div>
        </a>

        <!-- Product 4: Performance Jacket (On Sale Tag) -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-pet-jacket.jpg" alt="Designer Pet Performance Jacket" class="w-full h-full object-cover" loading="lazy">
            <!-- On Sale Tag -->
            <span class="absolute top-2 left-2 inline-flex h-5 items-center justify-center px-1.5 rounded-md text-[10px] font-semibold whitespace-nowrap" style="background: var(--state-error); color: var(--state-error-foreground);">On Sale</span>
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Designer Pet Performance Jacket</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥168</p>
          </div>
        </a>

        <!-- Product 5: Carrier Bag -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-pet-carrier.jpg" alt="Luxury Pet Travel Carrier Bag" class="w-full h-full object-cover" loading="lazy">
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Luxury Pet Travel Carrier Bag</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥259</p>
          </div>
        </a>

        <!-- Product 6: Treat Gift Box (Low Stock Tag) -->
        <a data-dom-id="link-product-detail" href="#" class="flex flex-col rounded-xl border border-[var(--border)] bg-[var(--card)] overflow-hidden transition-transform duration-150 active:scale-[0.98]" style="box-shadow: var(--shadow-xs);">
          <div class="relative aspect-square">
            <img src="../assets/product-pet-treats.jpg" alt="Organic Healthy Pet Treat Gift Box" class="w-full h-full object-cover" loading="lazy">
            <!-- Low Stock Tag (Amber) -->
            <span class="absolute top-2 left-2 inline-flex h-5 items-center justify-center px-1.5 rounded-md text-[10px] font-semibold whitespace-nowrap" style="background: var(--chart-3); color: var(--background-50);">Low Stock</span>
            <button class="absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);" aria-label="Remove from Favorites">
              <i data-lucide="heart" class="h-4 w-4" style="color: var(--state-error); fill: var(--state-error);"></i>
            </button>
          </div>
          <div class="flex flex-col gap-1 p-2.5">
            <h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color: var(--text-800);">Organic Healthy Pet Treat Gift Box</h3>
            <p class="text-[14px] font-semibold whitespace-nowrap" style="color: var(--text-800);">¥56</p>
          </div>
        </a>
      </section>

      <!-- Footer Stats Text -->
      <div class="flex items-center justify-center py-4 pb-6">
        <p class="text-[13px]" style="color: var(--text-400);">12 items in your favorites</p>
      </div>
    </main>
    <script src="shared/mock-api.js"></script>
    <script src="shared/api.js"></script><script>lucide.createIcons();</script>
  <script>
    (function () {
      var grid = document.querySelector('.grid.grid-cols-2');
      if (!grid) return;

      function favCard(item) {
        var goods = item.goods || item;
        var name = goods.name || goods.title || '';
        var price = goods.price != null ? '¥' + (goods.price / 100).toFixed(0) : '';
        var img = goods.coverImage || goods.images?.[0] || '../assets/product-placeholder.jpg';
        var slug = goods.slug || goods.id || '';
        var isOnSale = item.priceDrop || item.onSale;

        var a = document.createElement('a');
        a.href = 'product-detail.html?slug=' + encodeURIComponent(slug);
        a.className = 'flex flex-col rounded-xl border overflow-hidden';
        a.setAttribute('data-dom-id', 'link-product-detail');
        a.style.cssText = 'border-color:var(--border);background:var(--card);box-shadow:var(--shadow-xs);transition:transform .15s';

        a.innerHTML =
          '<div class="relative aspect-square">' +
          '<img src="' + img + '" alt="' + name + '" class="w-full h-full object-cover" loading="lazy" onerror="this.src=\'../assets/product-placeholder.jpg\'">' +
          (isOnSale ? '<span class="absolute top-2 left-2 inline-flex h-5 items-center justify-center px-1.5 rounded-md text-[10px] font-semibold" style="background:var(--state-error);color:var(--state-error-foreground)">On Sale</span>' : '') +
          '<button class="fav-remove absolute top-2 right-2 h-7 w-7 flex items-center justify-center rounded-full" style="background:rgba(0,0,0,0.3);backdrop-filter:blur(4px)" data-fav-id="' + (item.id || '') + '"><i data-lucide="heart" class="h-4 w-4" style="color:var(--state-error);fill:var(--state-error)"></i></button>' +
          '</div>' +
          '<div class="flex flex-col gap-1 p-2.5">' +
          '<h3 class="text-[13px] leading-[1.25] line-clamp-2" style="color:var(--text-800)">' + name + '</h3>' +
          '<p class="text-[14px] font-semibold" style="color:var(--text-800)">' + price + '</p>' +
          '</div>';
        return a;
      }

      // Load favorites
      async function loadFavorites() {
        try {
          var res = await moyuyoAPI.get('/api/v1/favorites/list?page=1&pageSize=20');
          if (res.code === 0 && res.data) {
            var items = res.data.items || res.data.list || [];
            if (items.length > 0) {
              grid.innerHTML = '';
              items.forEach(function (item) {
                grid.appendChild(favCard(item));
              });
              lucide.createIcons();
            }
          }
        } catch (e) {
          console.log('[MOYUYO] Favorites unavailable, showing static content');
        }
      }

      // Remove from favorites
      grid.addEventListener('click', function (e) {
        var btn = e.target.closest('.fav-remove');
        if (!btn) return;
        e.preventDefault();
        var favId = btn.getAttribute('data-fav-id');
        moyuyoAPI.post('/api/v1/favorites/remove', { favoriteId: favId }).then(function (res) {
          if (res.code === 0) {
            var card = btn.closest('a');
            if (card) { card.style.opacity = '0'; setTimeout(function () { card.remove(); }, 200); }
          }
        }).catch(function () {});
      });

      loadFavorites();
    })();
  </script>
</body>
</html>
