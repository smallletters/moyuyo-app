<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO - Health Calendar</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-24">

      <!-- iOS Status Bar Simulation -->
      <div class="sticky top-0 z-30" style="background: var(--background);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--foreground);">9:41</span>
          <div class="flex items-center gap-1.5">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg');"></span>
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            <span class="w-6 h-3 rounded-sm" style="background: var(--foreground);"></span>
          </div>
        </div>

        <!-- Top Navigation Bar -->
        <div class="h-11 flex items-center justify-between px-4">
          <!-- Back Button -->
          <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--background-200); border: none;" data-dom-id="cta-back" aria-label="Back">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); color: var(--text-800);"></span>
          </button>
          <!-- Page Title -->
          <h1 class="text-base font-semibold" style="color: var(--text-800);">Health Calendar</h1>
          <!-- Add Record Button -->
          <button class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--brand-500); border: none;" aria-label="Add Record">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); color: var(--primary-foreground);"></span>
          </button>
        </div>
      </div>

      <!-- Pet Switch Horizontal Scroll Bar -->
      <section class="px-4 pt-3 pb-2" aria-label="Pet Switch">
        <div class="flex gap-4 overflow-x-auto no-scrollbar py-1" id="pet-switch-bar">
          <!-- Dynamic Rendering -->
        </div>
      </section>

      <!-- Monthly Calendar View -->
      <section class="mx-4 mt-2 rounded-[var(--radius)] p-4" style="background: var(--card); box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid var(--border);" aria-label="Monthly Calendar">
        <!-- Month Switch -->
        <div class="flex items-center justify-between mb-4">
          <button class="w-8 h-8 flex items-center justify-center rounded-full" style="background: var(--background-200); border: none;" aria-label="Previous Month" data-dom-id="prev-month">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); color: var(--text-600);"></span>
          </button>
          <h2 class="text-base font-semibold" style="color: var(--text-800);" id="calendar-month-label">July 2026</h2>
          <button class="w-8 h-8 flex items-center justify-center rounded-full" style="background: var(--background-200); border: none;" aria-label="Next Month" data-dom-id="next-month">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); color: var(--text-600);"></span>
          </button>
        </div>

        <!-- Weekday Header Row -->
        <div class="calendar-grid mb-1">
          <div class="text-center text-xs font-medium py-1" style="color: var(--state-error);">Sun</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--text-500);">Mon</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--text-500);">Tue</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--text-500);">Wed</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--text-500);">Thu</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--text-500);">Fri</div>
          <div class="text-center text-xs font-medium py-1" style="color: var(--state-error);">Sat</div>
        </div>

        <!-- Date Grid -->
        <div class="calendar-grid" id="calendar-grid">
          <!-- Dynamic Rendering -->
        </div>

        <!-- Legend -->
        <div class="flex items-center gap-3 mt-4 pt-3" style="border-top: 1px solid var(--border);">
          <div class="flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full type-bath"></span>
            <span class="text-[10px]" style="color: var(--text-500);">Bath</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full type-vaccine"></span>
            <span class="text-[10px]" style="color: var(--text-500);">Vaccine</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full type-deworm"></span>
            <span class="text-[10px]" style="color: var(--text-500);">Deworm</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full type-checkup"></span>
            <span class="text-[10px]" style="color: var(--text-500);">Checkup</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="w-2.5 h-2.5 rounded-full type-diary"></span>
            <span class="text-[10px]" style="color: var(--text-500);">Diary</span>
          </div>
        </div>
      </section>

      <!-- Daily Record Details -->
      <section class="mx-4 mt-3 rounded-[var(--radius)] p-4" style="background: var(--card); box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid var(--border);" aria-label="Daily Records">
        <!-- Date &amp; Pet Name Header -->
        <div class="flex items-center justify-between mb-3" id="records-header">
          <!-- Dynamic Rendering -->
        </div>
        <!-- Care Record List -->
        <div class="flex flex-col gap-2.5" id="records-list">
          <!-- Dynamic Rendering -->
        </div>
      </section>

      <!-- Upcoming Reminders List -->
      <section class="mx-4 mt-3 rounded-[var(--radius)] p-4" style="background: var(--card); box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid var(--border);" aria-label="Upcoming Reminders">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold" style="color: var(--text-800);">Upcoming Reminders</h3>
          <span class="text-xs" style="color: var(--text-400);">View All</span>
        </div>
        <div class="flex flex-col gap-2.5" id="reminders-list">
          <!-- Dynamic Rendering -->
        </div>
      </section>

      <!-- Monthly Care Stats Overview -->
      <section class="mx-4 mt-3 mb-4 rounded-[var(--radius)] p-4" style="background: var(--card); box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid var(--border);" aria-label="Monthly Stats">
        <h3 class="text-sm font-semibold mb-3" style="color: var(--text-800);">Monthly Overview</h3>
        <div class="grid grid-cols-3 gap-3" id="stats-grid">
          <!-- Dynamic Rendering -->
        </div>
      </section>

      <!-- Bottom TabBar -->
      <nav class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);" aria-label="Main Navigation">
        <div class="flex items-stretch justify-around h-[49px]" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
          <!-- Home -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 min-w-0" style="color: var(--text-400);" data-dom-id="nav-home" aria-label="Home">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/house.svg'); mask-image: url('../assets/icons/dl-builtin-apple/house.svg');"></span>
            <span class="text-[10px] font-medium">Home</span>
          </button>
          <!-- Categories -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 min-w-0" style="color: var(--text-400);" data-dom-id="nav-category" aria-label="Categories">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/grip.svg'); mask-image: url('../assets/icons/dl-builtin-apple/grip.svg');"></span>
            <span class="text-[10px] font-medium">Categories</span>
          </button>
          <!-- Pet Hub (Active) -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 min-w-0" style="color: var(--primary);" aria-label="Pet Hub" aria-current="page">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/heart.svg'); mask-image: url('../assets/icons/dl-builtin-apple/heart.svg');"></span>
            <span class="text-[10px] font-medium">Pet Hub</span>
          </button>
          <!-- Community -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 min-w-0" style="color: var(--text-400);" aria-label="Community">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg'); mask-image: url('../assets/icons/dl-builtin-apple/message-circle-more.svg');"></span>
            <span class="text-[10px] font-medium">Community</span>
          </button>
          <!-- Profile -->
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 min-w-0" style="color: var(--text-400);" data-dom-id="nav-profile" aria-label="Profile">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/user.svg'); mask-image: url('../assets/icons/dl-builtin-apple/user.svg');"></span>
            <span class="text-[10px] font-medium">Me</span>
          </button>
        </div>
        <!-- Safe area -->
        <div class="h-[env(safe-area-inset-bottom,0px)]" style="background: rgba(255,255,255,0.88);"></div>
      </nav>

    </main>
    <script src="shared/mock-api.js"></script>
    <script src="shared/api.js"></script>
    <script>
(function () {
  'use strict';

  var api = window.moyuyoAPI;

  /* ========== State Variables ========== */
  var params = new URLSearchParams(window.location.search);
  var currentPetId = params.get('petId') || 'pet-1';
  var currentYear = 2026;
  var currentMonth = 7; // 1-indexed
  var selectedDate = '2026-07-09';
  var petList = [];
  var calendarEvents = {};
  var currentPetName = '';

  /* ========== Event Type Mapping ========== */
  var TYPE_MAP = {
    BATH:    { css: 'type-bath',    label: 'Bath', tag: 'brand-50', tagColor: 'brand-600', icon: 'droplets',   iconBg: 'brand-50', iconColor: 'brand-500' },
    VACCINE: { css: 'type-vaccine', label: 'Vaccine', tag: 'tag-vaccine',                   icon: 'syringe',     iconBg: 'state-success-surface', iconColor: 'state-success' },
    DEWORM:  { css: 'type-deworm',  label: 'Deworm', tag: 'tag-deworm',                    icon: 'shield',      iconBg: 'state-warning', iconColor: 'state-warning', iconBgOpacity: '0.12' },
    CHECKUP: { css: 'type-checkup', label: 'Checkup', tag: 'tag-checkup',                   icon: 'stethoscope',  iconBg: '#f0f0ff', iconColor: 'chart-4' },
    DIARY:   { css: 'type-diary',   label: 'Diary', tag: 'brand-50', tagColor: 'brand-600', icon: 'book-open', iconBg: 'text-400', iconColor: 'text-400', iconBgOpacity: '0.12' },
    WEIGHT:  { css: '',             label: 'Weight', tag: 'brand-50', tagColor: 'brand-600', icon: 'arrow-down', iconBg: 'brand-50', iconColor: 'brand-500' }
  };

  var STAT_STYLES = {
    BATH:    { bg: 'brand-50',    numColor: 'brand-500', labelColor: 'brand-600', dotColor: 'brand-200' },
    VACCINE: { bg: 'state-success-surface', numColor: 'state-success', labelColor: 'state-success', dotColor: '#b5f0c2' },
    DEWORM:  { bg: '#fff5e6',    numColor: 'state-warning', labelColor: 'state-warning', dotColor: '#ffd699' },
    CHECKUP: { bg: '#f0f0ff',    numColor: 'chart-4', labelColor: 'chart-4', dotColor: '#d4c8ff' },
    DIARY:   { bg: 'background-200', numColor: 'text-500', labelColor: 'text-500', dotColor: 'text-300' }
  };

  /* ========== Utility Functions ========== */
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function formatDate(y, m, d) { return y + '-' + pad(m) + '-' + pad(d); }
  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
  function dayOfWeek(y, m, d) { return new Date(y, m - 1, d).getDay(); }

  function isToday(y, m, d) {
    var now = new Date();
    return now.getFullYear() === y && (now.getMonth() + 1) === m && now.getDate() === d;
  }

  function getMonthLabel(y, m) {
    var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    return months[m - 1] + ' ' + y;
  }

  /* ========== Render Pet Switch Bar ========== */
  function renderPetBar() {
    var container = document.getElementById('pet-switch-bar');
    if (!container) return;
    var html = '';
    for (var i = 0; i < petList.length; i++) {
      var pet = petList[i];
      var isActive = pet.id === currentPetId;
      html += '<div class="flex flex-col items-center gap-1.5 flex-shrink-0" data-pet-id="' + pet.id + '" style="cursor:pointer;">';
      html += '<div class="pet-avatar' + (isActive ? ' active' : '') + '">';
      html += '<div class="pet-avatar-placeholder">';
      html += '<span data-icon class="w-5 h-5" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/heart.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/heart.svg\'); color: var(--icon-400);"></span>';
      html += '</div></div>';
      html += '<span class="text-xs font-medium" style="color: ' + (isActive ? 'var(--primary)' : 'var(--text-500)') + ';">' + pet.name + '</span>';
      html += '</div>';
    }
    // Add pet button
    html += '<div class="flex flex-col items-center gap-1.5 flex-shrink-0">';
    html += '<div class="pet-avatar" style="border: 2px dashed var(--background-300);">';
    html += '<div class="pet-avatar-placeholder">';
    html += '<span data-icon class="w-5 h-5" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/circle-plus.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/circle-plus.svg\'); color: var(--icon-300);"></span>';
    html += '</div></div>';
    html += '<span class="text-xs font-medium" style="color: var(--text-400);">Add</span>';
    html += '</div>';
    container.innerHTML = html;

    // Bind click events
    var items = container.querySelectorAll('[data-pet-id]');
    for (var j = 0; j < items.length; j++) {
      (function (petId) {
        items[j].addEventListener('click', function () {
          switchPet(petId);
        });
      })(petList[j].id);
    }

    lucide.createIcons();
  }

  /* ========== Switch Pet ========== */
  function switchPet(petId) {
    if (petId === currentPetId) return;
    currentPetId = petId;
    // Update URL params
    var url = new URL(window.location.href);
    url.searchParams.set('petId', petId);
    window.history.replaceState({}, '', url.toString());
    renderPetBar();
    loadCalendarData();
    loadReminders();
    loadStats();
    loadRecordsForDate(selectedDate);
  }

  /* ========== Render Calendar Grid ========== */
  function renderCalendar() {
    var grid = document.getElementById('calendar-grid');
    if (!grid) return;
    var days = daysInMonth(currentYear, currentMonth);
    var startDow = dayOfWeek(currentYear, currentMonth, 1); // 0=Sun
    var html = '';

    // Leading empty cells
    for (var i = 0; i < startDow; i++) {
      html += '<div class="calendar-cell other-month"></div>';
    }

    // Current month dates
    for (var d = 1; d <= days; d++) {
      var dateStr = formatDate(currentYear, currentMonth, d);
      var cellClasses = 'calendar-cell';
      if (isToday(currentYear, currentMonth, d)) cellClasses += ' today';
      if (dateStr === selectedDate) cellClasses += ' selected';

      html += '<div class="' + cellClasses + '" data-date="' + dateStr + '">';
      html += '<span class="day-number">' + d + '</span>';

      // Event dots
      var dayEvents = calendarEvents[String(d)] || [];
      if (dayEvents.length > 0) {
        html += '<div class="dot-indicators">';
        for (var e = 0; e < dayEvents.length; e++) {
          var ev = dayEvents[e];
          var tm = TYPE_MAP[ev.type] || {};
          html += '<span class="dot-indicator ' + (tm.css || '') + '"></span>';
        }
        html += '</div>';
      }

      html += '</div>';
    }

    grid.innerHTML = html;

    // Bind click events
    var cells = grid.querySelectorAll('.calendar-cell[data-date]');
    for (var c = 0; c < cells.length; c++) {
      (function (dateStr) {
        cells[c].addEventListener('click', function () {
          selectDate(dateStr);
        });
      })(cells[c].getAttribute('data-date'));
    }
  }

  /* ========== Select Date ========== */
  function selectDate(dateStr) {
    selectedDate = dateStr;
    // Update grid selection state
    var grid = document.getElementById('calendar-grid');
    if (grid) {
      var cells = grid.querySelectorAll('.calendar-cell');
      for (var i = 0; i < cells.length; i++) {
        cells[i].classList.remove('selected');
      }
      var selectedCell = grid.querySelector('[data-date="' + dateStr + '"]');
      if (selectedCell) selectedCell.classList.add('selected');
    }
    loadRecordsForDate(dateStr);
  }

  /* ========== Render Daily Records ========== */
  function renderRecords(data) {
    var header = document.getElementById('records-header');
    var list = document.getElementById('records-list');
    if (!header || !list) return;

    var dateParts = data.date.split('-');
    var monthAbbr = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var monthDay = monthAbbr[parseInt(dateParts[1], 10) - 1] + ' ' + parseInt(dateParts[2], 10);
    var todayStr = formatDate(new Date().getFullYear(), new Date().getMonth() + 1, new Date().getDate());
    var isTodayDate = data.date === todayStr;

    header.innerHTML = '<div class="flex items-center gap-2">' +
      '<span class="text-sm font-semibold" style="color: var(--text-800);">' + monthDay + '</span>' +
      (isTodayDate ? '<span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background: var(--brand-50); color: var(--brand-600);">Today</span>' : '') +
      '</div>' +
      '<span class="text-xs" style="color: var(--text-500);">' + (data.petName || currentPetName) + '</span>';

    var records = data.records || [];
    if (records.length === 0) {
      list.innerHTML = '<div class="text-center py-4 text-xs" style="color: var(--text-400);">No records</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < records.length; i++) {
      var r = records[i];
      var tm = TYPE_MAP[r.type] || TYPE_MAP.DIARY;
      html += '<div class="flex items-start gap-3 p-3 rounded-xl" style="background: var(--background-200);">';
      html += '<div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background: var(--' + tm.iconBg + ')' + (tm.iconBgOpacity ? '; opacity: ' + tm.iconBgOpacity : '') + ';">';
      html += '<span data-icon class="w-4 h-4" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/' + tm.icon + '.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/' + tm.icon + '.svg\'); color: var(--' + tm.iconColor + ');"></span>';
      html += '</div>';
      html += '<div class="flex-1 min-w-0">';
      html += '<div class="flex items-center gap-2 mb-1">';
      if (tm.tag === 'tag-vaccine' || tm.tag === 'tag-deworm' || tm.tag === 'tag-checkup') {
        html += '<span class="text-xs font-semibold px-2 py-0.5 rounded-md ' + tm.tag + '">' + (r.title || tm.label) + '</span>';
      } else {
        html += '<span class="text-xs font-semibold px-2 py-0.5 rounded-md" style="background: var(--' + tm.tag + '); color: var(--' + tm.tagColor + ');">' + (r.title || tm.label) + '</span>';
      }
      html += '<span class="text-[10px]" style="color: var(--text-400);">' + (r.time || '') + '</span>';
      html += '</div>';
      html += '<p class="text-xs" style="color: var(--text-600);">' + (r.desc || '') + '</p>';
      html += '</div></div>';
    }
    list.innerHTML = html;
    lucide.createIcons();
  }

  /* ========== Render Reminders List ========== */
  function renderReminders(data) {
    var container = document.getElementById('reminders-list');
    if (!container) return;
    var list = data.list || [];
    var html = '';

    for (var i = 0; i < list.length; i++) {
      var r = list[i];
      var tm = TYPE_MAP[r.type] || TYPE_MAP.BATH;
      var isOverdue = r.status === 'OVERDUE';
      var isUpcoming = r.status === 'UPCOMING';

      var statusText = '';
      var statusColor = 'var(--text-500)';
      if (isOverdue) {
        statusText = 'Overdue ' + Math.abs(r.remaining) + ' days';
        statusColor = 'var(--state-error)';
      } else if (isUpcoming) {
        statusText = 'In ' + r.remaining + ' days';
        statusColor = 'var(--state-warning)';
      } else {
        statusText = 'In ' + r.remaining + ' days';
        statusColor = 'var(--text-500)';
      }

      var rowBg = isOverdue ? 'var(--state-error-surface)' : 'var(--background-200)';
      var rowClass = isOverdue ? ' reminder-overdue' : '';

      html += '<div class="flex items-center gap-3 p-3 rounded-xl' + rowClass + '" style="background: ' + rowBg + ';">';
      html += '<div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background: var(--' + tm.iconBg + ')' + (tm.iconBgOpacity ? '; opacity: ' + tm.iconBgOpacity : '') + ';">';
      html += '<span data-icon class="w-4 h-4" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/' + tm.icon + '.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/' + tm.icon + '.svg\'); color: var(--' + tm.iconColor + ');"></span>';
      html += '</div>';
      html += '<div class="flex-1 min-w-0">';
      html += '<div class="flex items-center justify-between mb-0.5">';

      // Label
      if (tm.tag === 'tag-vaccine' || tm.tag === 'tag-deworm' || tm.tag === 'tag-checkup') {
        html += '<span class="text-xs font-semibold px-2 py-0.5 rounded-md ' + tm.tag + '">' + (r.title || tm.label) + '</span>';
      } else {
        var tagBg = isOverdue ? 'rgba(255,59,48,0.1)' : 'var(--' + tm.tag + ')';
        var tagCol = isOverdue ? 'var(--state-error)' : 'var(--' + tm.tagColor + ')';
        html += '<span class="text-xs font-semibold px-2 py-0.5 rounded-md" style="background: ' + tagBg + '; color: ' + tagCol + ';">' + (r.title || tm.label) + '</span>';
      }

      html += '<span class="text-[10px] font-semibold" style="color: ' + statusColor + ';">' + statusText + '</span>';
      html += '</div>';
      html += '<p class="text-[11px]" style="color: var(--text-500);">' + (r.desc || 'Expected date: ' + r.dueDate) + '</p>';
      html += '</div></div>';
    }

    container.innerHTML = html;
    lucide.createIcons();
  }

  /* ========== Render Monthly Stats ========== */
  function renderStats(data) {
    var container = document.getElementById('stats-grid');
    if (!container) return;
    var stats = data.stats || {};
    var html = '';
    var keys = ['BATH', 'VACCINE', 'DEWORM', 'CHECKUP', 'DIARY'];
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var entry = stats[key];
      if (!entry) continue;
      var ss = STAT_STYLES[key] || STAT_STYLES.DIARY;
      html += '<div class="flex flex-col items-center gap-1.5 py-3 rounded-xl" style="background: var(--' + ss.bg + ');">';
      html += '<span class="stat-number" style="color: var(--' + ss.numColor + ');">' + (entry.count || 0) + '</span>';
      html += '<span class="text-[10px] font-medium" style="color: var(--' + ss.labelColor + ');">' + (entry.label || '') + '</span>';
      html += '<div class="w-1 h-1 rounded-full" style="background: var(--' + ss.dotColor + ');"></div>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

  /* ========== API Data Loading ========== */
  function loadPetList() {
    api.get('/api/v1/pet/list').then(function (res) {
      if (res.code === 0 && res.data) {
        petList = res.data;
        // Find current pet name
        for (var i = 0; i < petList.length; i++) {
          if (petList[i].id === currentPetId) {
            currentPetName = petList[i].name;
            break;
          }
        }
        renderPetBar();
      }
    }).catch(function (err) {
      console.error('Failed to load pet list:', err);
    });
  }

  function loadCalendarData() {
    api.get('/api/v1/pet/' + currentPetId + '/health/calendar').then(function (res) {
      if (res.code === 0 && res.data) {
        currentYear = res.data.year;
        currentMonth = res.data.month;
        calendarEvents = res.data.events || {};
        document.getElementById('calendar-month-label').textContent = getMonthLabel(currentYear, currentMonth);
        renderCalendar();
      }
    }).catch(function (err) {
      console.error('Failed to load calendar data:', err);
    });
  }

  function loadRecordsForDate(dateStr) {
    api.get('/api/v1/pet/' + currentPetId + '/health/records?date=' + dateStr).then(function (res) {
      if (res.code === 0 && res.data) {
        renderRecords(res.data);
      }
    }).catch(function (err) {
      console.error('Failed to load records:', err);
    });
  }

  function loadReminders() {
    api.get('/api/v1/pet/' + currentPetId + '/health/reminders').then(function (res) {
      if (res.code === 0 && res.data) {
        renderReminders(res.data);
      }
    }).catch(function (err) {
      console.error('Failed to load reminders:', err);
    });
  }

  function loadStats() {
    api.get('/api/v1/pet/' + currentPetId + '/health/stats').then(function (res) {
      if (res.code === 0 && res.data) {
        renderStats(res.data);
      }
    }).catch(function (err) {
      console.error('Failed to load stats:', err);
    });
  }

  /* ========== Month Navigation ========== */
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    document.getElementById('calendar-month-label').textContent = getMonthLabel(currentYear, currentMonth);
    loadCalendarData();
  }

  /* ========== Event Binding ========== */
  function bindEvents() {
    // Back button
    var btnBack = document.querySelector('[data-dom-id="cta-back"]');
    if (btnBack) {
      btnBack.addEventListener('click', function () { window.history.back(); });
    }

    // Previous/Next month
    var btnPrev = document.querySelector('[data-dom-id="prev-month"]');
    if (btnPrev) {
      btnPrev.addEventListener('click', function () { changeMonth(-1); });
    }
    var btnNext = document.querySelector('[data-dom-id="next-month"]');
    if (btnNext) {
      btnNext.addEventListener('click', function () { changeMonth(1); });
    }

    // Bottom navigation
    var navHome = document.querySelector('[data-dom-id="nav-home"]');
    if (navHome) {
      navHome.addEventListener('click', function () { window.location.href = 'home.html'; });
    }
    var navCategory = document.querySelector('[data-dom-id="nav-category"]');
    if (navCategory) {
      navCategory.addEventListener('click', function () { window.location.href = 'category.html'; });
    }
    var navProfile = document.querySelector('[data-dom-id="nav-profile"]');
    if (navProfile) {
      navProfile.addEventListener('click', function () { window.location.href = 'profile.html'; });
    }
  }

  /* ========== Initialization ========== */
  function init() {
    bindEvents();
    loadPetList();
    loadCalendarData();
    loadReminders();
    loadStats();
    loadRecordsForDate(selectedDate);
  }

  init();
})();
    </script>
</body>
