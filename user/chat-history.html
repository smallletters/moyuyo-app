<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 客服会话</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col h-screen" style="max-width:375px;margin:0 auto;background:var(--background-50);">

      <!-- 顶部导航栏 -->
      <header class="sticky top-0 z-30 flex items-center justify-between px-4 h-11 border-b" style="background:var(--background-50);border-color:var(--background-300);">
        <button data-dom-id="cta-back" class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="color:var(--brand-500);" aria-label="返回">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <span class="text-base font-semibold tracking-tight" style="color:var(--text-800);">客服会话</span>
        <!-- 占位保持标题居中 -->
        <div class="w-8 h-8"></div>
      </header>

      <!-- 筛选 Tab 栏 -->
      <nav class="flex gap-0 border-b px-4" style="border-color:var(--border);background:var(--background-50);" aria-label="会话状态筛选">
        <button class="flex-1 py-2.5 text-center text-[14px] font-semibold whitespace-nowrap" style="color:var(--brand-500);border-bottom:2px solid var(--brand-500);">全部</button>
        <button class="flex-1 py-2.5 text-center text-[14px] font-normal whitespace-nowrap" style="color:var(--text-400);">进行中</button>
        <button class="flex-1 py-2.5 text-center text-[14px] font-normal whitespace-nowrap" style="color:var(--text-400);">已结束</button>
      </nav>

      <!-- 会话列表 -->
      <div class="flex-1 overflow-y-auto flex flex-col no-scrollbar" style="background:var(--background-200);">

        <!-- 会话 1: 人工客服 - 物流问题 - 进行中 - 有未读 -->
        <a href="customer-service.html" data-dom-id="chat-1" class="flex items-center gap-3 px-4 py-3 border-b active:opacity-70 transition-opacity" style="background:var(--background-50);border-color:var(--border);">
          <!-- 客服头像 -->
          <div class="relative shrink-0">
            <img src="../assets/cs-avatar.jpg" alt="客服头像" class="w-10 h-10 rounded-full object-cover" style="border:1px solid var(--background-300);">
            <!-- 未读红点 -->
            <div class="absolute -top-0.5 -right-0.5 w-3 h-3 rounded-full" style="background:var(--state-error);border:2px solid var(--background-50);"></div>
          </div>
          <!-- 会话信息 -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="text-[15px] font-semibold truncate" style="color:var(--text-800);">客服小美</span>
              <span class="inline-flex items-center h-5 px-1.5 rounded text-[11px] font-medium" style="background:var(--brand-50);color:var(--brand-500);">人工客服</span>
            </div>
            <div class="flex items-center justify-between mt-1">
              <p class="text-[13px] truncate pr-2" style="color:var(--text-500);">您好，您的包裹目前正在转运中，预计明天送达</p>
              <span class="text-[12px] whitespace-nowrap shrink-0" style="color:var(--text-400);">14:30</span>
            </div>
          </div>
          <!-- 状态标签 -->
          <div class="shrink-0 self-start mt-0.5">
            <span class="inline-flex items-center h-5 px-2 rounded-full text-[11px] font-medium" style="background:var(--brand-50);color:var(--brand-500);">进行中</span>
          </div>
        </a>

        <!-- 会话 2: 智能客服 - 优惠券规则 - 已结束 -->
        <a href="customer-service.html" data-dom-id="chat-2" class="flex items-center gap-3 px-4 py-3 border-b active:opacity-70 transition-opacity" style="background:var(--background-50);border-color:var(--border);">
          <div class="relative shrink-0">
            <img src="../assets/cs-avatar.jpg" alt="客服头像" class="w-10 h-10 rounded-full object-cover" style="border:1px solid var(--background-300);">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="text-[15px] font-semibold truncate" style="color:var(--text-800);">MOYUYO智能助手</span>
              <span class="inline-flex items-center h-5 px-1.5 rounded text-[11px] font-medium" style="background:var(--background-200);color:var(--text-500);">智能客服</span>
            </div>
            <div class="flex items-center justify-between mt-1">
              <p class="text-[13px] truncate pr-2" style="color:var(--text-500);">优惠券可在下单时自动抵扣，每笔订单限用一张</p>
              <span class="text-[12px] whitespace-nowrap shrink-0" style="color:var(--text-400);">昨天</span>
            </div>
          </div>
          <div class="shrink-0 self-start mt-0.5">
            <span class="inline-flex items-center h-5 px-2 rounded-full text-[11px] font-medium" style="background:var(--background-200);color:var(--text-500);">已结束</span>
          </div>
        </a>

        <!-- 会话 3: 人工客服 - 退换货咨询 - 已结束 -->
        <a href="customer-service.html" data-dom-id="chat-3" class="flex items-center gap-3 px-4 py-3 border-b active:opacity-70 transition-opacity" style="background:var(--background-50);border-color:var(--border);">
          <div class="relative shrink-0">
            <img src="../assets/cs-avatar.jpg" alt="客服头像" class="w-10 h-10 rounded-full object-cover" style="border:1px solid var(--background-300);">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="text-[15px] font-semibold truncate" style="color:var(--text-800);">客服小杰</span>
              <span class="inline-flex items-center h-5 px-1.5 rounded text-[11px] font-medium" style="background:var(--brand-50);color:var(--brand-500);">人工客服</span>
            </div>
            <div class="flex items-center justify-between mt-1">
              <p class="text-[13px] truncate pr-2" style="color:var(--text-500);">退换货申请已处理完成，退款将在3个工作日内到账</p>
              <span class="text-[12px] whitespace-nowrap shrink-0" style="color:var(--text-400);">3天前</span>
            </div>
          </div>
          <div class="shrink-0 self-start mt-0.5">
            <span class="inline-flex items-center h-5 px-2 rounded-full text-[11px] font-medium" style="background:var(--background-200);color:var(--text-500);">已结束</span>
          </div>
        </a>

        <!-- 会话 4: 智能客服 - 订单查询 - 进行中 - 无未读 -->
        <a href="customer-service.html" data-dom-id="chat-4" class="flex items-center gap-3 px-4 py-3 border-b active:opacity-70 transition-opacity" style="background:var(--background-50);border-color:var(--border);">
          <div class="relative shrink-0">
            <img src="../assets/cs-avatar.jpg" alt="客服头像" class="w-10 h-10 rounded-full object-cover" style="border:1px solid var(--background-300);">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="text-[15px] font-semibold truncate" style="color:var(--text-800);">MOYUYO智能助手</span>
              <span class="inline-flex items-center h-5 px-1.5 rounded text-[11px] font-medium" style="background:var(--background-200);color:var(--text-500);">智能客服</span>
            </div>
            <div class="flex items-center justify-between mt-1">
              <p class="text-[13px] truncate pr-2" style="color:var(--text-500);">已为您找到3笔近期订单，请问需要查看哪一笔</p>
              <span class="text-[12px] whitespace-nowrap shrink-0" style="color:var(--text-400);">10:15</span>
            </div>
          </div>
          <div class="shrink-0 self-start mt-0.5">
            <span class="inline-flex items-center h-5 px-2 rounded-full text-[11px] font-medium" style="background:var(--brand-50);color:var(--brand-500);">进行中</span>
          </div>
        </a>

        <!-- 底部提示 -->
        <div class="flex items-center justify-center py-6">
          <span class="text-[12px]" style="color:var(--text-400);">会话记录保留 180 天</span>
        </div>

      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
