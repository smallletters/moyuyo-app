<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="shared/moyuyo-tokens.css">

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <script src="shared/api.js"></script>
    <script>
(function() {
  'use strict';
  var api = window.moyuyoAPI;

  function formatCount(n) {
    if (n >= 1000) {
      return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    }
    return String(n);
  }

  var ipColorMap = {
    'MILO': { bg: 'rgba(59,130,246,0.1)', color: '#3b82f6' },
    'OLIVE': { bg: 'rgba(34,197,94,0.1)', color: '#22c55e' },
    'LUNA': { bg: 'rgba(168,85,247,0.1)', color: '#a855f7' }
  };

  function getAvatarGradient(name) {
    var hash = 0;
    for (var i = 0; i < name.length; i++) {
      hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    var h1 = ((hash % 360) + 360) % 360;
    var h2 = (h1 + 45) % 360;
    return 'linear-gradient(135deg, hsl(' + h1 + ', 65%, 55%), hsl(' + h2 + ', 65%, 45%))';
  }

  function renderIpTags(ipTags) {
    if (!ipTags || !ipTags.length) return '';
    return ipTags.map(function(tag) {
      var c = ipColorMap[tag] || ipColorMap['MILO'];
      return '<span class="inline-flex items-center h-5 px-1.5 rounded text-[10px] font-semibold shrink-0" style="background:' + c.bg + ';color:' + c.color + ';">' + tag + '</span>';
    }).join('');
  }

  function renderPostCard(post) {
    var avatarGradient = getAvatarGradient(post.author.name);
    var vipBadge = post.author.isVIP
      ? '<span class="inline-flex items-center h-4 px-1 rounded text-[9px] font-bold shrink-0" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;">VIP</span>'
      : '';
    var verifiedBadge = post.author.isVerified
      ? '<span class="inline-flex items-center shrink-0" style="color:#3b82f6;"><i data-lucide="badge-check" class="w-3.5 h-3.5"></i></span>'
      : '';

    var tagsHtml = (post.tags || []).map(function(tag) {
      return '<span class="shrink-0 inline-flex items-center h-5 px-2 rounded-full text-[10px] font-medium" style="background:var(--brand-100);color:var(--primary);">#' + tag + '</span>';
    }).join('');

    var ipTagsHtml = renderIpTags(post.ipTags);

    return '<article class="rounded-[var(--radius)] overflow-hidden border" style="background:var(--card);border-color:var(--border);box-shadow:var(--shadow-xs);transition:transform 0.18s ease,box-shadow 0.18s ease;" data-post-id="' + post.id + '">' +
      '<div class="flex items-center gap-2.5 p-3">' +
        '<div class="w-9 h-9 rounded-full shrink-0 flex items-center justify-center text-xs font-bold" style="background:' + avatarGradient + ';color:#fff;">' + post.author.name.charAt(0) + '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-1.5">' +
            '<p class="text-sm font-semibold truncate" style="color:var(--foreground);">' + post.author.name + '</p>' +
            vipBadge +
            verifiedBadge +
          '</div>' +
          '<p class="text-xs truncate" style="color:var(--text-400);">' + (post.pet || '') + ' · ' + post.time + '</p>' +
        '</div>' +
        '<button class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg" style="color:var(--text-400);" aria-label="更多">' +
          '<i data-lucide="more-horizontal" class="w-4 h-4"></i>' +
        '</button>' +
      '</div>' +
      '<div class="px-3 pb-3">' +
        '<h3 class="text-sm font-semibold" style="color:var(--foreground);">' + post.title + '</h3>' +
      '</div>' +
      '<div class="flex items-center gap-2 px-3 pb-2 flex-wrap">' +
        tagsHtml +
        ipTagsHtml +
      '</div>' +
      '<div class="flex items-center gap-5 px-3 pb-3">' +
        '<button class="like-btn flex items-center gap-1.5" style="color:var(--text-500);" aria-label="点赞" data-post-id="' + post.id + '">' +
          '<i data-lucide="heart" class="w-4 h-4"></i>' +
          '<span class="text-xs font-medium">' + formatCount(post.likes) + '</span>' +
        '</button>' +
        '<button class="flex items-center gap-1.5" style="color:var(--text-500);" aria-label="评论">' +
          '<i data-lucide="message-circle" class="w-4 h-4"></i>' +
          '<span class="text-xs font-medium">' + formatCount(post.comments) + '</span>' +
        '</button>' +
        '<button class="star-btn flex items-center gap-1.5" style="color:var(--text-500);" aria-label="收藏" data-post-id="' + post.id + '">' +
          '<i data-lucide="star" class="w-4 h-4"></i>' +
          '<span class="text-xs font-medium">' + formatCount(post.stars) + '</span>' +
        '</button>' +
      '</div>' +
    '</article>';
  }

  function renderPosts(posts) {
    var container = document.getElementById('community-feed');
    if (!container) return;
    container.innerHTML = posts.map(renderPostCard).join('');

    container.querySelectorAll('.like-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var icon = this.querySelector('i');
        if (icon.style.fill === 'var(--state-error)') {
          this.style.color = 'var(--text-500)';
          icon.style.fill = '';
        } else {
          this.style.color = 'var(--state-error)';
          icon.style.fill = 'var(--state-error)';
        }
      });
    });

    container.querySelectorAll('.star-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var icon = this.querySelector('i');
        if (icon.style.fill === '#f59e0b') {
          this.style.color = 'var(--text-500)';
          icon.style.fill = '';
        } else {
          this.style.color = '#f59e0b';
          icon.style.fill = '#f59e0b';
        }
      });
    });
  }

  function renderTopics(topics) {
    var container = document.getElementById('community-topics');
    if (!container) return;
    container.innerHTML = topics.map(function(topic) {
      return '<span class="shrink-0 inline-flex items-center gap-1 h-8 px-3 rounded-full text-xs font-medium" style="background:var(--brand-100);color:var(--primary);">' +
        '<i data-lucide="' + (topic.icon || 'hash') + '" class="w-3 h-3"></i>#' + topic.name + ' <span style="color:var(--text-400);">' + formatCount(topic.count) + '</span>' +
      '</span>';
    }).join('');
  }

  function loadFeed(category) {
    category = category || 'ALL';
    var url = '/api/v1/community/feed';
    if (category !== 'ALL') {
      url += '?category=' + category;
    }
    api.get(url).then(function(res) {
      if (res.code === 0 && res.data && res.data.posts) {
        renderPosts(res.data.posts);
        lucide.createIcons();
      }
    });
  }

  function loadTopics() {
    api.get('/api/v1/community/topics').then(function(res) {
      if (res.code === 0 && res.data && res.data.topics) {
        renderTopics(res.data.topics);
        lucide.createIcons();
      }
    });
  }

  document.querySelectorAll('[data-category]').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var category = this.getAttribute('data-category');
      document.querySelectorAll('[data-category]').forEach(function(t) {
        t.style.color = 'var(--text-400)';
        t.classList.remove('font-semibold');
        t.classList.add('font-medium');
        var indicator = t.querySelector('.absolute');
        if (indicator) indicator.style.display = 'none';
      });
      this.style.color = 'var(--primary)';
      this.classList.remove('font-medium');
      this.classList.add('font-semibold');
      var indicator = this.querySelector('.absolute');
      if (indicator) indicator.style.display = '';
      loadFeed(category);
    });
  });

  var navHome = document.querySelector('[data-dom-id="nav-home"]');
  if (navHome) navHome.addEventListener('click', function() { window.location.href = 'home.html'; });
  var navCategory = document.querySelector('[data-dom-id="nav-category"]');
  if (navCategory) navCategory.addEventListener('click', function() { window.location.href = 'category.html'; });
  var navPetHub = document.querySelector('[data-dom-id="nav-pet-hub"]');
  if (navPetHub) navPetHub.addEventListener('click', function() { window.location.href = 'pet-hub.html'; });
  var navProfile = document.querySelector('[data-dom-id="nav-profile"]');
  if (navProfile) navProfile.addEventListener('click', function() { window.location.href = 'profile.html'; });

  loadFeed('ALL');
  loadTopics();
})();
    </script>
</body>
</html>
