<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO - My After-Sales</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background-color: var(--background-200);">

      <!-- Top Navigation Bar -->
      <header class="sticky top-0 z-30" style="background-color: var(--background-50); border-bottom: 1px solid var(--border);">
        <div class="flex items-center justify-center h-11 px-4 relative">
          <!-- Back Button -->
          <button data-dom-id="cta-back" class="absolute left-4 inline-flex h-8 w-8 items-center justify-center rounded-lg" style="border: 1px solid var(--border); background-color: var(--background-50);" aria-label="Back">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg');"></span>
          </button>
          <!-- Page Title -->
          <h1 class="text-base font-semibold" style="color: var(--text-800); letter-spacing: -0.02em;">My After-Sales</h1>
          <!-- Right Apply Button -->
          <button data-dom-id="cta-apply" class="absolute right-4 text-xs font-medium" style="color: var(--brand-500);">Apply for After-Sales</button>
        </div>
      </header>

      <!-- Primary Filter Tab: Status -->
      <nav class="sticky top-11 z-20" style="background-color: var(--background-50);">
        <div class="flex no-scrollbar overflow-x-auto" style="border-bottom: 1px solid var(--border);">
          <button data-tab-status="" class="flex-shrink-0 flex flex-col items-center px-4 pt-2 pb-1.5 text-xs font-semibold" style="color: var(--brand-500); border-bottom: 2px solid var(--brand-500);">
            All
          </button>
          <button data-tab-status="PROCESSING" class="flex-shrink-0 flex flex-col items-center px-4 pt-2 pb-1.5 text-xs font-medium" style="color: var(--text-500); border-bottom: 2px solid transparent;">
            Processing
          </button>
          <button data-tab-status="COMPLETED" class="flex-shrink-0 flex flex-col items-center px-4 pt-2 pb-1.5 text-xs font-medium" style="color: var(--text-500); border-bottom: 2px solid transparent;">
            Completed
          </button>
          <button data-tab-status="REJECTED" class="flex-shrink-0 flex flex-col items-center px-4 pt-2 pb-1.5 text-xs font-medium" style="color: var(--text-500); border-bottom: 2px solid transparent;">
            Rejected
          </button>
          <button data-tab-status="CANCELLED" class="flex-shrink-0 flex flex-col items-center px-4 pt-2 pb-1.5 text-xs font-medium" style="color: var(--text-500); border-bottom: 2px solid transparent;">
            Cancelled
          </button>
        </div>

        <!-- Secondary Filter: Type + Time Range -->
        <div class="flex items-center justify-between px-4 py-2.5 gap-2">
          <!-- Type Filter Dropdown -->
          <button class="flex items-center gap-1.5 h-8 px-3 rounded-full text-xs font-medium flex-shrink-0" style="background-color: var(--background-200); color: var(--text-600);">
            <span>After-Sales Type</span>
            <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <!-- Time Range Filter -->
          <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
            <button class="flex-shrink-0 h-8 px-3 rounded-full text-xs font-medium" style="background-color: var(--brand-500); color: var(--background-50);">All Time</button>
            <button class="flex-shrink-0 h-8 px-3 rounded-full text-xs font-medium" style="background-color: var(--background-200); color: var(--text-600);">Last 7 Days</button>
            <button class="flex-shrink-0 h-8 px-3 rounded-full text-xs font-medium" style="background-color: var(--background-200); color: var(--text-600);">Last 30 Days</button>
            <button class="flex-shrink-0 h-8 px-3 rounded-full text-xs font-medium" style="background-color: var(--background-200); color: var(--text-600);">Last 90 Days</button>
          </div>
        </div>
      </nav>

      <!-- After-Sales Card List -->
      <div id="after-sale-cards" class="flex flex-col gap-3 p-4">
      </div>

      <!-- Empty State (shown when no after-sales records) -->
      <div id="empty-state" class="hidden flex flex-col items-center justify-center px-4 pt-16 pb-8">
        <!-- Pure CSS empty state illustration: file/box icon -->
        <div class="relative w-24 h-24 mb-6">
          <!-- Outer frame -->
          <div class="absolute inset-0 rounded-[var(--radius)]" style="background-color: var(--background-200); border: 1px solid var(--border);"></div>
          <!-- Inner file icon simulation -->
          <div class="absolute top-5 left-1/2 -translate-x-1/2 w-10 h-12 rounded-md" style="background-color: var(--background-50); border: 1.5px solid var(--background-400);"></div>
          <!-- File fold corner -->
          <div class="absolute top-5 right-[calc(50%-22px)] w-3 h-3" style="border-left: 1.5px solid var(--background-400); border-bottom: 1.5px solid var(--background-400); border-radius: 0 0 0 3px; transform: rotate(-45deg) translate(-1px, -1px); background-color: var(--background-200);"></div>
          <!-- File line simulation -->
          <div class="absolute top-9 left-1/2 -translate-x-1/2 w-6 h-[2px] rounded-full" style="background-color: var(--background-400);"></div>
          <div class="absolute top-12 left-1/2 -translate-x-1/2 w-5 h-[2px] rounded-full" style="background-color: var(--background-400);"></div>
          <div class="absolute top-[58px] left-1/2 -translate-x-1/2 w-7 h-[2px] rounded-full" style="background-color: var(--background-400);"></div>
          <!-- Search/view icon circle -->
          <div class="absolute -bottom-1 -right-1 w-8 h-8 rounded-full flex items-center justify-center" style="background-color: var(--background-300); border: 2px solid var(--background-50);">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/search.svg'); mask-image: url('../assets/icons/dl-builtin-apple/search.svg'); color: var(--text-400);"></span>
          </div>
        </div>
        <!-- Copy -->
        <p class="text-sm font-medium" style="color: var(--text-800);">No After-Sales Records</p>
        <p class="text-xs mt-1.5" style="color: var(--text-400);">Your after-sales application records will be displayed here</p>
        <!-- Go Shopping Button -->
        <button class="mt-6 h-10 px-8 rounded-full text-sm font-semibold" style="background-color: var(--brand-500); color: var(--background-50);">Go Shopping</button>
      </div>

      <!-- Footer Text -->
      <div class="px-4 pb-8 pt-2 text-center">
        <p class="text-xs" style="color: var(--text-400);">After-Sales Hotline: 400-888-6688</p>
        <p class="text-xs mt-1" style="color: var(--text-400);">Service Hours: 09:00 - 21:00</p>
      </div>

    </main>
    <script>lucide.createIcons();</script>
    <script src="shared/mock-api.js"></script>
    <script src="shared/api.js"></script>
    <script>
(function() {
  var api = window.moyuyoAPI;
  var currentStatus = '';

  var statusBadgeColors = {
    'WAIT_RETURN': { bg: 'var(--brand-50)', text: 'var(--brand-500)' },
    'REFUNDING': { bg: 'color-mix(in srgb, var(--chart-3) 12%, var(--background-50))', text: 'var(--chart-3)' },
    'COMPLETED': { bg: 'var(--state-success-surface)', text: 'var(--state-success)' },
    'REJECTED': { bg: 'var(--state-error-surface)', text: 'var(--state-error)' },
    'CANCELLED': { bg: 'var(--background-200)', text: 'var(--text-500)' }
  };

  var progressBarColors = {
    'WAIT_RETURN': 'var(--brand-500)',
    'REFUNDING': 'var(--chart-3)',
    'COMPLETED': 'var(--state-success)',
    'REJECTED': 'var(--state-error)',
    'CANCELLED': 'var(--background-300)'
  };

  function formatPrice(cents) {
    return '¥' + (cents / 100).toFixed(2);
  }

  function renderCards(items) {
    var container = document.getElementById('after-sale-cards');
    var emptyState = document.getElementById('empty-state');

    if (!items || items.length === 0) {
      container.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');

    var html = '';
    items.forEach(function(item) {
      var barColor = progressBarColors[item.status] || 'var(--background-300)';
      var badge = statusBadgeColors[item.status] || { bg: 'var(--background-200)', text: 'var(--text-500)' };

      var progressBars = '';
      for (var i = 0; i < item.totalSteps; i++) {
        var color = i < item.progress ? barColor : 'var(--background-300)';
        progressBars += '<span class="flex-1 h-1 rounded-full" style="background-color: ' + color + ';"></span>';
      }

      var stepsHtml = '';
      for (var j = 0; j < item.steps.length; j++) {
        var isCurrent = j === item.progress - 1;
        var stepColor = isCurrent ? barColor : 'var(--text-400)';
        var fontWeight = isCurrent ? 'font-medium' : '';
        stepsHtml += '<span class="text-[10px] ' + fontWeight + '" style="color: ' + stepColor + ';">' + item.steps[j] + '</span>';
      }

      var bottomInfo;
      if (item.type === 'EXCHANGE') {
        bottomInfo = '<div class="flex items-baseline gap-1"><span class="text-xs" style="color: var(--text-500);">Exchange Complete</span><span class="text-sm font-semibold tabular-nums" style="color: var(--state-success);">Shipped</span></div>';
      } else {
        bottomInfo = '<div class="flex items-baseline gap-1"><span class="text-xs" style="color: var(--text-500);">Refund Amount</span><span class="text-sm font-semibold tabular-nums" style="color: var(--state-error);">-' + formatPrice(item.refundAmount) + '</span></div>';
      }

      html += '<a data-dom-id="card-after-sale-' + item.id + '" href="order-detail.html" class="block rounded-[var(--radius)] overflow-hidden" style="background-color: var(--background-50); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">' +
        '<div class="flex items-center justify-between px-4 pt-3 pb-2">' +
          '<div class="flex items-center gap-2">' +
            '<span class="inline-flex items-center justify-center px-2 py-0.5 rounded-md text-xs font-semibold whitespace-nowrap" style="background-color: ' + badge.bg + '; color: ' + badge.text + ';">' +
              item.statusName +
            '</span>' +
            '<span class="inline-flex items-center justify-center px-2 py-0.5 rounded-md text-xs font-medium whitespace-nowrap" style="background-color: var(--background-200); color: var(--text-500);">' +
              item.typeName +
            '</span>' +
          '</div>' +
          '<span data-icon class="w-4 h-4 flex-shrink-0" style="-webkit-mask-image: url(\'../assets/icons/dl-builtin-apple/chevron-right.svg\'); mask-image: url(\'../assets/icons/dl-builtin-apple/chevron-right.svg\'); color: var(--text-300);"></span>' +
        '</div>' +
        '<div class="flex items-center gap-3 px-4 pb-3">' +
          '<img src="' + item.goods.image + '" alt="' + item.goods.name + '" class="w-16 h-16 rounded-lg object-cover flex-shrink-0" style="border: 1px solid var(--border);">' +
          '<div class="flex-1 min-w-0">' +
            '<p class="text-sm font-medium truncate" style="color: var(--text-800);">' + item.goods.name + '</p>' +
            '<p class="text-xs mt-0.5 truncate" style="color: var(--text-400);">' + item.goods.spec + '</p>' +
          '</div>' +
        '</div>' +
        '<div style="border-top: 1px solid var(--border);"></div>' +
        '<div class="flex items-center justify-between px-4 py-3">' +
          bottomInfo +
          '<span class="text-xs" style="color: var(--text-400);">' + item.applyDate + ' Applied</span>' +
        '</div>' +
        '<div class="px-4 pb-3">' +
          '<div class="flex items-center gap-1">' + progressBars + '</div>' +
          '<div class="flex items-center justify-between mt-1.5">' + stepsHtml + '</div>' +
        '</div>' +
      '</a>';
    });

    container.innerHTML = html;
    lucide.createIcons();
  }

  function loadList(status) {
    var url = '/api/v1/after-sale/list';
    if (status) {
      url += '?status=' + status;
    }
    api.get(url).then(function(res) {
      if (res.code === 0 && res.data) {
        renderCards(res.data.items);
      }
    }).catch(function(err) {
      console.error('Failed to load after-sale list:', err);
    });
  }

  var tabs = document.querySelectorAll('[data-tab-status]');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var status = this.getAttribute('data-tab-status');
      currentStatus = status;

      tabs.forEach(function(t) {
        t.style.color = 'var(--text-500)';
        t.style.borderBottomColor = 'transparent';
        t.classList.remove('font-semibold');
        t.classList.add('font-medium');
      });
      this.style.color = 'var(--brand-500)';
      this.style.borderBottomColor = 'var(--brand-500)';
      this.classList.remove('font-medium');
      this.classList.add('font-semibold');

      loadList(status);
    });
  });

  var backBtn = document.querySelector('[data-dom-id="cta-back"]');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      window.history.back();
    });
  }

  loadList('');
})();
    </script>
</body>
</html>
