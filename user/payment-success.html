<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 支付成功</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col items-center justify-center min-h-screen px-6 py-12" style="background: var(--background-50);">
      <!-- 成功插图区域 -->
      <div class="relative flex items-center justify-center mb-6" style="width: 200px; height: 200px; animation: fadeInUp 0.6s ease-out;">
        <img src="../assets/payment-success.jpg" alt="支付成功庆祝插图" class="w-full h-full object-contain" style="animation: fadeIn 0.8s ease-out;">
        <!-- 成功对勾图标 - 叠加在插图底部 -->
        <div class="absolute flex items-center justify-center" style="width: 56px; height: 56px; border-radius: 50%; background: var(--state-success); bottom: -8px; box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3); animation: scaleBounce 0.5s 0.3s ease-out both;">
          <i data-lucide="check" class="w-7 h-7" style="color: var(--background-50);"></i>
        </div>
      </div>

      <!-- 支付成功标题 -->
      <h1 class="text-xl font-semibold tracking-tight mb-2" style="color: var(--text-800); font-size: 20px; line-height: 1.3;">
        支付成功
      </h1>

      <!-- 订单号 -->
      <p class="text-sm mb-6" style="color: var(--text-400); line-height: 1.5;">
        订单号: MOY20260715001
      </p>

      <!-- 支付金额 -->
      <div class="text-center mb-6">
        <p class="text-xs mb-1" style="color: var(--text-500);">支付金额</p>
        <p class="font-semibold tracking-tight" style="color: var(--text-800); font-size: 24px; line-height: 1.2;">¥197.00</p>
      </div>

      <!-- 订单摘要卡片 -->
      <div class="w-full max-w-xs mb-8 p-4" style="background: var(--background-200); border-radius: calc(var(--radius) * 0.8); border: 1px solid var(--border);">
        <p class="text-xs leading-relaxed" style="color: var(--text-500);">
          经典尼龙宠物牵引套装 x1 + 温和植物萃取宠物洗护套装 x1
        </p>
      </div>

      <!-- 操作按钮 -->
      <div class="w-full max-w-xs flex flex-col gap-3">
        <!-- 查看订单详情 - 描边按钮 -->
        <a
          href="#"
          data-dom-id="cta-view-order"
          class="flex items-center justify-center h-11 whitespace-nowrap font-semibold text-sm transition-all duration-200 hover:opacity-80 active:scale-[0.98]"
          style="border-radius: 999px; border: 1.5px solid var(--brand-500); color: var(--brand-500); background: transparent;"
        >
          查看订单详情
        </a>
        <!-- 继续购物 - 填充按钮 -->
        <a
          href="#"
          data-dom-id="cta-continue-shopping"
          class="flex items-center justify-center h-11 whitespace-nowrap font-semibold text-sm transition-all duration-200 hover:opacity-90 active:scale-[0.98]"
          style="border-radius: 999px; background: var(--brand-500); color: var(--background-50);"
        >
          继续购物
        </a>
      </div>

      <!-- 底部分享与积分提示 -->
      <div class="flex items-center gap-3 mt-8">
        <!-- 分享给好友 -->
        <a href="#" class="flex items-center gap-1.5 text-xs transition-colors duration-200 hover:opacity-70" style="color: var(--text-500);">
          <i data-lucide="share-2" class="w-4 h-4" style="color: var(--text-500);"></i>
          <span>分享给好友</span>
        </a>
        <!-- 积分奖励徽章 -->
        <span class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium" style="border-radius: 999px; background: var(--brand-100); color: var(--brand-500);">
          <i data-lucide="gift" class="w-3.5 h-3.5"></i>
          <span>已获得 50 积分</span>
        </span>
      </div>
    </main>

    <!-- 动画样式 - 放置在 body 中 -->
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleBounce {
        0% { opacity: 0; transform: scale(0.3); }
        50% { transform: scale(1.1); }
        70% { transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        @keyframes fadeIn { from { opacity: 1; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 1; transform: none; } to { opacity: 1; transform: none; } }
        @keyframes scaleBounce { from { opacity: 1; transform: none; } to { opacity: 1; transform: none; } }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
