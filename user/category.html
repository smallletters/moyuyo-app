<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 商品分类</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <!-- 页面特定样式 -->
    <style>
      /* ===== 基础重置 ===== */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: var(--font-sans);
        background: var(--background);
        color: var(--foreground);
        line-height: 1.47;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        max-width: 375px;
        margin: 0 auto;
        min-height: 100vh;
        position: relative;
      }

      /* ===== 页面整体布局 ===== */
      .page-category {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding-bottom: calc(50px + env(safe-area-inset-bottom, 0px));
      }

      /* ===== 顶部搜索栏 ===== */
      .top-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        padding-top: calc(8px + env(safe-area-inset-top, 0px));
        background: var(--background);
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .back-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .back-btn .icon-back {
        width: 20px;
        height: 20px;
        background-color: var(--foreground);
        -webkit-mask: url("../assets/icons/dl-builtin-apple/chevron-left.svg") no-repeat center / contain;
        mask: url("../assets/icons/dl-builtin-apple/chevron-left.svg") no-repeat center / contain;
      }

      .search-bar {
        flex: 1;
        height: 36px;
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--secondary);
        border-radius: 10px;
        padding: 0 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .search-bar .icon-search {
        width: 16px;
        height: 16px;
        background-color: var(--muted-foreground);
        flex-shrink: 0;
      }

      /* 使用 CSS 绘制搜索图标（无 SVG） */
      .search-bar .icon-search::after {
        content: '';
        display: block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--muted-foreground);
        border-radius: 50%;
        position: relative;
        top: -1px;
      }
      .search-bar .icon-search::before {
        content: '';
        display: block;
        width: 2px;
        height: 6px;
        background: var(--muted-foreground);
        transform: rotate(-45deg);
        position: relative;
        top: 5px;
        left: 10px;
      }

      .search-bar .search-text {
        font-size: 13px;
        color: var(--muted-foreground);
        font-weight: 400;
      }

      /* ===== 产品线 Tab ===== */
      .product-tabs {
        display: flex;
        gap: 0;
        padding: 4px 16px 0;
        background: var(--background);
        position: sticky;
        top: 52px;
        z-index: 19;
      }

      .product-tab {
        flex: 1;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted-foreground);
        padding: 8px 0 10px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        transition: color 0.2s ease;
        letter-spacing: 0.02em;
      }

      .product-tab.active {
        color: var(--primary);
        font-weight: 600;
      }

      .product-tab::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) scaleX(0);
        width: 20px;
        height: 2.5px;
        border-radius: 2px;
        background: var(--primary);
        transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      }

      .product-tab.active::after {
        transform: translateX(-50%) scaleX(1);
      }

      /* ===== 主体内容区（左分类 + 右商品） ===== */
      .content-body {
        display: flex;
        flex: 1;
        min-height: 0;
        background: var(--background);
      }

      /* ===== 左侧分类导航 ===== */
      .category-sidebar {
        width: 80px;
        flex-shrink: 0;
        background: var(--secondary);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 4px 0;
      }

      /* 隐藏滚动条 */
      .category-sidebar::-webkit-scrollbar {
        display: none;
      }

      .category-item {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 6px;
        font-size: 12px;
        font-weight: 400;
        color: var(--muted-foreground);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        text-align: center;
        line-height: 1.3;
        transition: all 0.2s ease;
        position: relative;
        border: none;
        background: none;
        width: 100%;
      }

      .category-item.active {
        color: var(--primary);
        font-weight: 600;
        background: var(--background);
      }

      .category-item.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 2.5px;
        height: 16px;
        border-radius: 0 2px 2px 0;
        background: var(--primary);
      }

      /* ===== 右侧商品网格 ===== */
      .product-area {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px 10px;
      }

      /* 隐藏滚动条 */
      .product-area::-webkit-scrollbar {
        display: none;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      /* ===== 商品卡片 ===== */
      .product-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.6);
        overflow: hidden;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: box-shadow 0.25s ease;
      }

      .product-card:active {
        box-shadow: var(--shadow-md);
      }

      .product-card .card-image {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: var(--secondary);
        display: block;
      }

      .product-card .card-info {
        padding: 8px 8px 10px;
      }

      .product-card .card-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--foreground);
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 4px;
      }

      .product-card .card-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .product-card .card-price {
        font-size: 14px;
        font-weight: 600;
        color: var(--foreground);
        letter-spacing: -0.02em;
      }

      .product-card .card-price .price-symbol {
        font-size: 11px;
        font-weight: 500;
      }

      .product-card .card-brand {
        font-size: 9px;
        font-weight: 500;
        color: var(--muted-foreground);
        padding: 1px 5px;
        border: 1px solid var(--border);
        border-radius: 4px;
        line-height: 1.5;
        letter-spacing: 0.02em;
      }

      /* ===== 底部 TabBar ===== */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 375px;
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
        padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
        background: rgba(255, 255, 255, 0.82);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        border-top: 0.5px solid var(--border);
        z-index: 100;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        min-width: 44px;
        min-height: 44px;
        justify-content: center;
        text-decoration: none;
        padding: 4px 0;
      }

      .tab-item .tab-icon {
        width: 24px;
        height: 24px;
        background-color: var(--icon-muted);
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
      }

      .tab-item .tab-label {
        font-size: 10px;
        font-weight: 400;
        color: var(--icon-muted);
        line-height: 1;
      }

      .tab-item.active .tab-icon {
        background-color: var(--primary);
      }

      .tab-item.active .tab-label {
        color: var(--primary);
        font-weight: 500;
      }

      /* Tab 图标路径 */
      .tab-icon-home {
        -webkit-mask-image: url("../assets/icons/dl-builtin-apple/house.svg");
        mask-image: url("../assets/icons/dl-builtin-apple/house.svg");
      }
      .tab-icon-category {
        -webkit-mask-image: url("../assets/icons/dl-builtin-apple/grip.svg");
        mask-image: url("../assets/icons/dl-builtin-apple/grip.svg");
      }
      .tab-icon-pethub {
        -webkit-mask-image: url("../assets/icons/dl-builtin-apple/heart.svg");
        mask-image: url("../assets/icons/dl-builtin-apple/heart.svg");
      }
      .tab-icon-community {
        -webkit-mask-image: url("../assets/icons/dl-builtin-apple/message-circle-more.svg");
        mask-image: url("../assets/icons/dl-builtin-apple/message-circle-more.svg");
      }
      .tab-icon-profile {
        -webkit-mask-image: url("../assets/icons/dl-builtin-apple/user.svg");
        mask-image: url("../assets/icons/dl-builtin-apple/user.svg");
      }

      /* ===== 过渡动画 ===== */
      .fade-in {
        animation: fadeIn 0.35s cubic-bezier(0.32, 0.72, 0, 1) both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <div class="top-bar">

      <div class="product-area">
        <div class="product-grid">

          <!-- 商品卡片 1 -->

          <!-- 商品卡片 3 -->

              </div>
            </div>

    <!-- ===== 底部 TabBar ===== -->

  </div>

  <!-- ===== 交互脚本 ===== -->
  <script>
    /* 产品线 Tab 切换 */
    document.querySelectorAll('.product-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.product-tab').forEach(function(t) {
          t.classList.remove('active');
        });
        this.classList.add('active');
      });
    });

    /* 左侧分类导航切换 */
    document.querySelectorAll('.category-item').forEach(function(item) {
      item.addEventListener('click', function() {
        document.querySelectorAll('.category-item').forEach(function(i) {
          i.classList.remove('active');
        });
        this.classList.add('active');
      });
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
