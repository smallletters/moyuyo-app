<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 商品对比</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-36">

      <!-- iOS 状态栏模拟 -->
      <div class="sticky top-0 z-30" style="background: var(--background);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--foreground);">9:41</span>
          <div class="flex items-center gap-1.5">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg');"></span>
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            <span class="w-6 h-3 rounded-sm" style="background: var(--foreground);"></span>
          </div>
        </div>

        <!-- 导航栏：返回 + 标题 + 添加商品 -->
        <div class="flex items-center justify-between h-12 px-4" style="border-bottom: 1px solid var(--border);">
          <!-- 返回按钮 -->
          <a href="product-detail.html" class="flex items-center gap-1 shrink-0" style="color: var(--primary); text-decoration: none;" data-dom-id="cta-back" aria-label="返回商品详情">
            <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg');"></span>
            <span class="text-sm font-medium">返回</span>
          </a>
          <!-- 页面标题 -->
          <h1 class="text-base font-semibold" style="color: var(--foreground);">商品对比（2/4）</h1>
          <!-- 添加商品按钮 -->
          <button class="flex items-center gap-1 shrink-0 text-sm font-medium" style="color: var(--primary); background: none; border: none; cursor: pointer;" data-dom-id="cta-add" aria-label="添加对比商品">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg');"></span>
            添加商品
          </button>
        </div>
      </div>

      <!-- 已对比商品缩略图行（横向滚动） -->
      <section class="px-4 pt-4 pb-2" aria-label="已选对比商品">
        <div class="flex gap-3 overflow-x-auto no-scrollbar">
          <!-- 已选商品 1 -->
          <div class="shrink-0 w-[72px] flex flex-col items-center gap-1.5">
            <div class="w-[64px] h-[64px] rounded-xl overflow-hidden border-2" style="border-color: var(--primary); box-shadow: var(--shadow-sm);">
              <img src="../assets/product-shampoo-bottle.jpg" alt="高端宠物洗护套装" class="w-full h-full object-cover">
            </div>
            <span class="text-[11px] font-medium truncate max-w-[72px] text-center" style="color: var(--text-600);">洗护套装</span>
          </div>
          <!-- 已选商品 2 -->
          <div class="shrink-0 w-[72px] flex flex-col items-center gap-1.5">
            <div class="w-[64px] h-[64px] rounded-xl overflow-hidden border-2" style="border-color: var(--primary); box-shadow: var(--shadow-sm);">
              <img src="../assets/product-harness-gear.jpg" alt="舒适胸背带" class="w-full h-full object-cover">
            </div>
            <span class="text-[11px] font-medium truncate max-w-[72px] text-center" style="color: var(--text-600);">舒适胸背带</span>
          </div>
          <!-- 空位占位 1 -->
          <button class="shrink-0 w-[72px] flex flex-col items-center gap-1.5" style="background: none; border: none; cursor: pointer;" aria-label="添加第3个对比商品">
            <div class="w-[64px] h-[64px] rounded-xl flex items-center justify-center border border-dashed" style="border-color: var(--background-400); background: var(--background-100);">
              <span data-icon class="w-6 h-6" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); color: var(--text-400);"></span>
            </div>
            <span class="text-[11px]" style="color: var(--text-400);">添加</span>
          </button>
          <!-- 空位占位 2 -->
          <button class="shrink-0 w-[72px] flex flex-col items-center gap-1.5" style="background: none; border: none; cursor: pointer;" aria-label="添加第4个对比商品">
            <div class="w-[64px] h-[64px] rounded-xl flex items-center justify-center border border-dashed" style="border-color: var(--background-400); background: var(--background-100);">
              <span data-icon class="w-6 h-6" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-plus.svg'); color: var(--text-400);"></span>
            </div>
            <span class="text-[11px]" style="color: var(--text-400);">添加</span>
          </button>
        </div>
      </section>

      <!-- 对比表格 -->
      <section class="px-4 pt-3" aria-label="商品对比详情">
        <div class="rounded-[var(--radius)] overflow-hidden border" style="border-color: var(--border); background: var(--card); box-shadow: var(--shadow-sm);">

          <!-- 商品头部行：商品图 + 名称 + 价格 + 评分 -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <!-- 标签列占位 -->
            <div class="flex items-center justify-center p-2.5" style="background: var(--muted); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-[10px] font-bold uppercase tracking-wider" style="color: var(--muted-foreground);">对比项</span>
            </div>
            <!-- 商品 1 头部 -->
            <div class="flex flex-col items-center gap-2 p-3" style="border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <img src="../assets/product-shampoo-bottle.jpg" alt="高端宠物洗护套装" class="w-14 h-14 rounded-xl object-cover" style="border: 1px solid var(--border);">
              <div class="text-center">
                <p class="text-xs font-semibold leading-tight" style="color: var(--foreground);">高端宠物洗护套装</p>
                <p class="text-sm font-bold mt-1" style="color: var(--primary);">$28.00</p>
                <div class="flex items-center justify-center gap-0.5 mt-1">
                  <span data-icon class="w-3 h-3" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--brand-300);"></span>
                  <span class="text-[11px] font-medium" style="color: var(--text-500);">4.8</span>
                </div>
              </div>
            </div>
            <!-- 商品 2 头部 -->
            <div class="flex flex-col items-center gap-2 p-3" style="border-bottom: 1px solid var(--border);">
              <img src="../assets/product-harness-gear.jpg" alt="舒适胸背带" class="w-14 h-14 rounded-xl object-cover" style="border: 1px solid var(--border);">
              <div class="text-center">
                <p class="text-xs font-semibold leading-tight" style="color: var(--foreground);">舒适胸背带</p>
                <p class="text-sm font-bold mt-1" style="color: var(--primary);">$35.00</p>
                <div class="flex items-center justify-center gap-0.5 mt-1">
                  <span data-icon class="w-3 h-3" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--brand-300);"></span>
                  <span class="text-[11px] font-medium" style="color: var(--text-500);">4.5</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 对比维度行（差异项 - 浅绿色高亮） -->

          <!-- 1. 价格（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">价格</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-bold" style="color: var(--foreground);">$28.00</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-bold" style="color: var(--foreground);">$35.00</span>
            </div>
          </div>

          <!-- 2. 评分（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">评分</span>
            </div>
            <div class="flex items-center justify-center gap-1 px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--brand-300);"></span>
              <span class="text-sm font-semibold" style="color: var(--foreground);">4.8</span>
            </div>
            <div class="flex items-center justify-center gap-1 px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); mask-image: url('../assets/icons/dl-builtin-apple/star.svg'); color: var(--brand-300);"></span>
              <span class="text-sm font-semibold" style="color: var(--foreground);">4.5</span>
            </div>
          </div>

          <!-- 3. 评价数（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">评价数</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">328</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">156</span>
            </div>
          </div>

          <!-- 4. 宠物类型（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">宠物类型</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">猫/狗通用</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">仅猫</span>
            </div>
          </div>

          <!-- 5. 尺码范围（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">尺码范围</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">XS-XL</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">S-L</span>
            </div>
          </div>

          <!-- 6. 材质（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">材质</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--state-success);">天然有机</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--text-500);">普通材质</span>
            </div>
          </div>

          <!-- 7. 是否包邮（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">是否包邮</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <!-- 绿色勾 -->
              <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <!-- 红色叉 -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--state-error)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </div>
          </div>

          <!-- 8. 是否可订阅（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">可订阅</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);">
              <!-- 绿色勾 -->
              <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-bottom: 1px solid var(--border);">
              <!-- 灰色划线 -->
              <div class="relative">
                <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-minus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-minus.svg'); color: var(--text-400);"></span>
              </div>
            </div>
          </div>

          <!-- 9. 适用体型（差异） -->
          <div class="grid gap-0" style="grid-template-columns: 80px 1fr 1fr;">
            <div class="flex items-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border);">
              <span class="text-xs font-medium" style="color: var(--text-600);">适用体型</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface); border-right: 1px solid var(--border);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">全体型</span>
            </div>
            <div class="flex items-center justify-center px-3 py-3" style="background: var(--state-success-surface);">
              <span class="text-sm font-semibold" style="color: var(--foreground);">中小型</span>
            </div>
          </div>

        </div>
      </section>

      <!-- 底部操作按钮（固定定位） -->
      <div class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
        <div class="flex gap-3 px-4 py-3" style="padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);">
          <!-- 加入购物车 - 商品 1 -->
          <button class="flex-1 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background: var(--primary); color: var(--primary-foreground); border: none; cursor: pointer; box-shadow: var(--shadow-sm);" data-dom-id="cta-add-cart-1" aria-label="将高端宠物洗护套装加入购物车">
            <span data-icon class="w-4 h-4 mr-1.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg);"></span>
            加入购物车 - $28.00
          </button>
          <!-- 加入购物车 - 商品 2 -->
          <button class="flex-1 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background: var(--primary); color: var(--primary-foreground); border: none; cursor: pointer; box-shadow: var(--shadow-sm);" data-dom-id="cta-add-cart-2" aria-label="将舒适胸背带加入购物车">
            <span data-icon class="w-4 h-4 mr-1.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            加入购物车 - $35.00
          </button>
        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
