<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 宠物档案</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background: var(--background-200);">

      <!-- 顶部导航栏 -->
      <header class="sticky top-0 z-30 flex items-center justify-between px-4" style="height: 44px; background: var(--background-50);">
        <button data-dom-id="back-previous" class="inline-flex items-center justify-center" style="width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--foreground); cursor: pointer;" aria-label="返回">
          <i data-lucide="chevron-left" style="width: 20px; height: 20px;"></i>
        </button>
        <span class="text-center font-semibold" style="flex: 1; font-size: 16px; color: var(--text-800); letter-spacing: -0.02em;">宠物档案</span>
        <button data-dom-id="cta-edit-pet" class="inline-flex items-center justify-center font-semibold" style="border: none; background: transparent; color: var(--brand-500); cursor: pointer; font-size: 15px; height: 32px; padding: 0 4px;" aria-label="编辑宠物档案">编辑</button>
      </header>

      <!-- 宠物英雄卡片（背景图+渐变叠加） -->
      <section class="mx-3 mt-3 relative overflow-hidden" style="border-radius: 19.2px; min-height: 200px;">
        <img src="../assets/pet-profile-dog.jpg" alt="旺财" class="absolute inset-0 w-full h-full object-cover" style="border-radius: 19.2px;">
        <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.08) 100%); border-radius: 19.2px;"></div>
        <div class="relative z-10 flex flex-col justify-end p-4" style="min-height: 200px;">
          <h1 class="font-bold" style="font-size: 28px; color: var(--background-50); line-height: 1.18; letter-spacing: -0.02em; text-wrap: balance; word-break: keep-all;">旺财</h1>
          <p class="mt-1" style="font-size: 14px; color: var(--background-100); line-height: 1.5;">金毛寻回犬 · 3岁6个月 · 公</p>
          <!-- 三项数据徽章 -->
          <div class="flex gap-2 mt-3">
            <div class="inline-flex items-center justify-center" style="padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.16); backdrop-filter: blur(8px); font-size: 12px; color: var(--background-50); white-space: nowrap;">
              体重 28.5kg
            </div>
            <div class="inline-flex items-center justify-center" style="padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.16); backdrop-filter: blur(8px); font-size: 12px; color: var(--background-50); white-space: nowrap;">
              肩高 58cm
            </div>
            <div class="inline-flex items-center justify-center" style="padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.16); backdrop-filter: blur(8px); font-size: 12px; color: var(--background-50); white-space: nowrap;">
              生日 2023-01-15
            </div>
          </div>
        </div>
      </section>

      <!-- 快捷操作行 -->
      <section class="mx-3 mt-4 grid grid-cols-4 gap-2">
        <a href="#" class="flex flex-col items-center justify-center gap-1 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border); text-decoration: none; transition: background-color 0.16s ease;" aria-label="疫苗记录">
          <i data-lucide="circle-check" style="width: 20px; height: 20px; color: var(--brand-500);"></i>
          <span style="font-size: 11px; color: var(--text-500); white-space: nowrap;">疫苗记录</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center gap-1 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border); text-decoration: none; transition: background-color 0.16s ease;" aria-label="驱虫记录">
          <i data-lucide="shield" style="width: 20px; height: 20px; color: var(--state-success);"></i>
          <span style="font-size: 11px; color: var(--text-500); white-space: nowrap;">驱虫记录</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center gap-1 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border); text-decoration: none; transition: background-color 0.16s ease;" aria-label="洗护记录">
          <i data-lucide="droplets" style="width: 20px; height: 20px; color: var(--brand-500);"></i>
          <span style="font-size: 11px; color: var(--text-500); white-space: nowrap;">洗护记录</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center gap-1 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border); text-decoration: none; transition: background-color 0.16s ease;" aria-label="体检记录">
          <i data-lucide="heart-pulse" style="width: 20px; height: 20px; color: var(--state-error);"></i>
          <span style="font-size: 11px; color: var(--text-500); white-space: nowrap;">体检记录</span>
        </a>
      </section>

      <!-- 护理时间线 -->
      <section class="mx-3 mt-6">
        <h2 class="font-semibold" style="font-size: 18px; color: var(--text-800); line-height: 1.3; letter-spacing: -0.01em;">护理时间线</h2>
        <div class="mt-3 flex flex-col gap-0" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border); overflow: hidden;">

          <!-- 时间线条目 1：洗澡 -->
          <div class="flex items-start gap-3 px-3 py-3" style="border-bottom: 1px solid var(--border);">
            <div class="flex-shrink-0 flex items-center justify-center mt-0.5" style="width: 32px; height: 32px; border-radius: 8px; background: var(--brand-50);">
              <i data-lucide="droplets" style="width: 16px; height: 16px; color: var(--brand-500);"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="font-semibold truncate" style="font-size: 14px; color: var(--text-800);">洗澡</span>
                <span class="flex-shrink-0 ml-2" style="font-size: 12px; color: var(--text-400);">7月15日</span>
              </div>
              <p class="mt-0.5 truncate" style="font-size: 13px; color: var(--text-500);">使用MOYUYO温和洗护套装</p>
            </div>
          </div>

          <!-- 时间线条目 2：驱虫 -->
          <div class="flex items-start gap-3 px-3 py-3" style="border-bottom: 1px solid var(--border);">
            <div class="flex-shrink-0 flex items-center justify-center mt-0.5" style="width: 32px; height: 32px; border-radius: 8px; background: var(--state-success-surface);">
              <i data-lucide="shield" style="width: 16px; height: 16px; color: var(--state-success);"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="font-semibold truncate" style="font-size: 14px; color: var(--text-800);">驱虫</span>
                <span class="flex-shrink-0 ml-2" style="font-size: 12px; color: var(--text-400);">7月10日</span>
              </div>
              <p class="mt-0.5 truncate" style="font-size: 13px; color: var(--text-500);">体内+体外驱虫</p>
            </div>
          </div>

          <!-- 时间线条目 3：疫苗 -->
          <div class="flex items-start gap-3 px-3 py-3" style="border-bottom: 1px solid var(--border);">
            <div class="flex-shrink-0 flex items-center justify-center mt-0.5" style="width: 32px; height: 32px; border-radius: 8px; background: var(--brand-50);">
              <i data-lucide="check" style="width: 16px; height: 16px; color: var(--brand-500);"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="font-semibold truncate" style="font-size: 14px; color: var(--text-800);">疫苗</span>
                <span class="flex-shrink-0 ml-2" style="font-size: 12px; color: var(--text-400);">6月28日</span>
              </div>
              <p class="mt-0.5 truncate" style="font-size: 13px; color: var(--text-500);">狂犬疫苗加强针</p>
            </div>
          </div>

          <!-- 时间线条目 4：体检 -->
          <div class="flex items-start gap-3 px-3 py-3">
            <div class="flex-shrink-0 flex items-center justify-center mt-0.5" style="width: 32px; height: 32px; border-radius: 8px; background: var(--state-error-surface);">
              <i data-lucide="heart" style="width: 16px; height: 16px; color: var(--state-error);"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="font-semibold truncate" style="font-size: 14px; color: var(--text-800);">体检</span>
                <span class="flex-shrink-0 ml-2" style="font-size: 12px; color: var(--text-400);">6月15日</span>
              </div>
              <p class="mt-0.5 truncate" style="font-size: 13px; color: var(--text-500);">年度体检，一切正常</p>
            </div>
          </div>

        </div>
      </section>

      <!-- 健康数据 -->
      <section class="mx-3 mt-6">
        <h2 class="font-semibold" style="font-size: 18px; color: var(--text-800); line-height: 1.3; letter-spacing: -0.01em;">健康数据</h2>
        <div class="mt-3 overflow-hidden" style="border-radius: 12px;">
          <img src="../assets/pet-weight-chart.jpg" alt="体重趋势图" class="w-full object-cover" style="display: block; border-radius: 12px;">
        </div>
      </section>

      <!-- 健康数据网格 2x2 -->
      <section class="mx-3 mt-4 grid grid-cols-2 gap-2">
        <!-- 体重 -->
        <div class="flex flex-col gap-1 px-3 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border);">
          <span style="font-size: 12px; color: var(--text-400);">体重</span>
          <div class="flex items-baseline gap-1.5">
            <span class="font-semibold" style="font-size: 22px; color: var(--text-800); font-variant-numeric: tabular-nums; line-height: 1;">28.5</span>
            <span style="font-size: 13px; color: var(--text-500);">kg</span>
          </div>
          <span class="inline-flex items-center" style="font-size: 11px; color: var(--state-success);">
            <i data-lucide="check-circle" style="width: 12px; height: 12px; margin-right: 2px;"></i>
            正常
          </span>
        </div>
        <!-- 体温 -->
        <div class="flex flex-col gap-1 px-3 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border);">
          <span style="font-size: 12px; color: var(--text-400);">体温</span>
          <div class="flex items-baseline gap-1.5">
            <span class="font-semibold" style="font-size: 22px; color: var(--text-800); font-variant-numeric: tabular-nums; line-height: 1;">38.5</span>
            <span style="font-size: 13px; color: var(--text-500);">°C</span>
          </div>
          <span class="inline-flex items-center" style="font-size: 11px; color: var(--state-success);">
            <i data-lucide="check-circle" style="width: 12px; height: 12px; margin-right: 2px;"></i>
            正常
          </span>
        </div>
        <!-- 心率 -->
        <div class="flex flex-col gap-1 px-3 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border);">
          <span style="font-size: 12px; color: var(--text-400);">心率</span>
          <div class="flex items-baseline gap-1.5">
            <span class="font-semibold" style="font-size: 22px; color: var(--text-400); font-variant-numeric: tabular-nums; line-height: 1;">--</span>
            <span style="font-size: 13px; color: var(--text-400);">bpm</span>
          </div>
          <span style="font-size: 11px; color: var(--text-400);">暂无数据</span>
        </div>
        <!-- 食量 -->
        <div class="flex flex-col gap-1 px-3 py-3" style="background: var(--background-50); border-radius: 12px; border: 1px solid var(--border);">
          <span style="font-size: 12px; color: var(--text-400);">食量</span>
          <div class="flex items-baseline gap-1.5">
            <span class="font-semibold" style="font-size: 22px; color: var(--text-800); line-height: 1;">--</span>
          </div>
          <span class="inline-flex items-center" style="font-size: 11px; color: var(--state-success);">
            <i data-lucide="check-circle" style="width: 12px; height: 12px; margin-right: 2px;"></i>
            正常
          </span>
        </div>
      </section>

      <!-- 底部操作区 -->
      <section class="mx-3 mt-6 mb-8 flex flex-col items-center gap-3">
        <button class="inline-flex items-center justify-center font-semibold" style="width: 100%; height: 44px; border-radius: 999px; border: 1.5px solid var(--brand-500); background: transparent; color: var(--brand-500); font-size: 15px; cursor: pointer; transition: background-color 0.16s ease, color 0.16s ease; white-space: nowrap;" aria-label="添加护理记录">
          添加护理记录
        </button>
        <a href="#" class="inline-flex items-center justify-center" style="border: none; background: transparent; color: var(--brand-500); font-size: 14px; text-decoration: none; cursor: pointer; white-space: nowrap; transition: opacity 0.16s ease;" aria-label="查看完整档案">
          查看完整档案
        </a>
      </section>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
