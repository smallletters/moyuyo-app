<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 搜索</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen bg-[var(--background)]">
      <!-- 搜索栏区域 -->
      <div class="sticky top-0 z-20 bg-[var(--background)]/95 backdrop-blur-sm px-4 pt-3 pb-2">
        <div class="flex items-center gap-3">
          <div class="field flex-1" style="min-width:0;height:40px;">
            <span data-icon class="w-4 h-4 shrink-0" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/funnel.svg'); mask-image: url('../assets/icons/dl-builtin-apple/funnel.svg');"></span>
            <input class="control text-sm" placeholder="搜索宠物用品、品牌、IP" autofocus aria-label="搜索宠物用品、品牌、IP">
          </div>
          <button class="shrink-0 text-sm font-medium whitespace-nowrap" style="color: var(--brand-500); background: transparent; border: none; cursor: pointer;" data-dom-id="back-previous">取消</button>
        </div>
      </div>

      <!-- 搜索历史区域 -->
      <section class="px-4 pt-4 pb-2">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold" style="color: var(--text-800);">搜索历史</h2>
          <button class="inline-flex items-center gap-1 text-xs whitespace-nowrap" style="color: var(--text-500); background: transparent; border: none; cursor: pointer;" aria-label="清空搜索历史">
            <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/trash-2.svg'); mask-image: url('../assets/icons/dl-builtin-apple/trash-2.svg');"></span>
            <span>清空</span>
          </button>
        </div>
        <div class="flex flex-wrap gap-2">
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">宠物洗发水</span>
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">牵引绳</span>
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">猫粮</span>
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">宠物玩具</span>
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">狗衣服</span>
          <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm whitespace-nowrap" style="background: var(--background-200); color: var(--text-600); border-radius: var(--radius);">宠物零食</span>
        </div>
      </section>

      <div class="mx-4 my-1" style="height: 1px; background: var(--border);"></div>

      <!-- 热搜榜区域 -->
      <section class="px-4 pt-3 pb-2">
        <h2 class="text-base font-semibold mb-3" style="color: var(--text-800);">热搜榜</h2>
        <ul class="flex flex-col gap-0" style="list-style: none; margin: 0; padding: 0;">
          <!-- 热搜1-3: 品牌蓝色序号 -->
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-bold" style="color: var(--brand-500);">1</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">宠物驱虫</span>
            <span class="inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-semibold whitespace-nowrap" style="background: var(--state-error); color: var(--state-error-foreground); border-radius: 4px;">热</span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-bold" style="color: var(--brand-500);">2</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">夏季护理</span>
            <span class="inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-semibold whitespace-nowrap" style="background: var(--brand-500); color: var(--primary-foreground); border-radius: 4px;">新</span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-bold" style="color: var(--brand-500);">3</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">猫爬架</span>
            <span></span>
          </li>
          <!-- 热搜4-10: 常规序号 -->
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">4</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">狗狗零食</span>
            <span class="inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-semibold whitespace-nowrap" style="background: var(--state-error); color: var(--state-error-foreground); border-radius: 4px;">热</span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">5</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">宠物床垫</span>
            <span></span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">6</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">宠物推车</span>
            <span class="inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-semibold whitespace-nowrap" style="background: var(--brand-500); color: var(--primary-foreground); border-radius: 4px;">新</span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">7</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">猫砂</span>
            <span></span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">8</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">狗狗衣服</span>
            <span></span>
          </li>
          <li class="flex items-center gap-3 py-2.5" style="border-bottom: 1px solid var(--border);">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">9</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">宠物碗</span>
            <span></span>
          </li>
          <li class="flex items-center gap-3 py-2.5">
            <span class="w-5 text-center text-sm font-medium" style="color: var(--text-400);">10</span>
            <span class="flex-1 min-w-0 text-sm truncate" style="color: var(--text-800);">宠物GPS</span>
            <span class="inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-semibold whitespace-nowrap" style="background: var(--brand-500); color: var(--primary-foreground); border-radius: 4px;">新</span>
          </li>
        </ul>
      </section>

      <div class="mx-4 my-1" style="height: 1px; background: var(--border);"></div>

      <!-- 搜索发现区域 -->
      <section class="px-4 pt-3 pb-6">
        <h2 class="text-base font-semibold mb-3" style="color: var(--text-800);">搜索发现</h2>
        <!-- 横滑卡片 -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1" style="-webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;">
          <!-- 卡片1: 宠物穿搭 (带图片背景) -->
          <div class="shrink-0 w-[140px] h-[88px] relative overflow-hidden" style="border-radius: var(--radius); scroll-snap-align: start;">
            <img src="../assets/treats-category-header.jpg" alt="宠物穿搭" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);"></div>
            <span class="absolute bottom-2 left-3 text-white text-sm font-semibold">宠物穿搭</span>
          </div>
          <!-- 卡片2: 夏日护理 (带图片背景) -->
          <div class="shrink-0 w-[140px] h-[88px] relative overflow-hidden" style="border-radius: var(--radius); scroll-snap-align: start;">
            <img src="../assets/pet-care-grooming.jpg" alt="夏日护理" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);"></div>
            <span class="absolute bottom-2 left-3 text-white text-sm font-semibold">夏日护理</span>
          </div>
          <!-- 卡片3: 新品速递 (纯色背景) -->
          <div class="shrink-0 w-[140px] h-[88px] relative overflow-hidden flex items-end" style="border-radius: var(--radius); background: var(--brand-50); scroll-snap-align: start;">
            <span class="pb-3 pl-3 text-sm font-semibold" style="color: var(--brand-600);">新品速递</span>
          </div>
          <!-- 卡片4: 猫咪专区 (纯色背景) -->
          <div class="shrink-0 w-[140px] h-[88px] relative overflow-hidden flex items-end" style="border-radius: var(--radius); background: var(--background-200); scroll-snap-align: start;">
            <span class="pb-3 pl-3 text-sm font-semibold" style="color: var(--text-600);">猫咪专区</span>
          </div>
        </div>
      </section>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
