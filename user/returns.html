<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 申请售后</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--card-foreground);
  }
  @layer base {
    body { background: var(--card-background); color: var(--card-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="max-w-[375px] mx-auto min-h-screen" style="background: var(--background);">

      <!-- 顶部导航栏 -->
      <nav class="sticky top-0 z-50 flex items-center justify-center h-[44px] px-4" style="background: var(--background);">
        <button data-dom-id="back-previous" class="absolute left-4 flex items-center justify-center w-8 h-8 rounded-full" style="background: var(--secondary);" aria-label="返回">
          <i data-lucide="chevron-left" class="w-[18px] h-[18px]" style="color: var(--foreground);"></i>
        </button>
        <span class="text-[17px] font-semibold" style="color: var(--foreground);">申请售后</span>
      </nav>

      <div class="px-4 pb-28 pt-3 flex flex-col gap-4">

        <!-- 售后类型选择（横向标签页） -->
        <div class="flex gap-2 no-scrollbar overflow-x-auto">
          <button class="flex-shrink-0 h-[36px] px-4 rounded-full text-[13px] font-medium" style="background: var(--primary); color: var(--primary-foreground);">退货退款</button>
          <button class="flex-shrink-0 h-[36px] px-4 rounded-full text-[13px] font-medium" style="background: var(--secondary); color: var(--secondary-foreground);">仅退款</button>
          <button class="flex-shrink-0 h-[36px] px-4 rounded-full text-[13px] font-medium" style="background: var(--secondary); color: var(--secondary-foreground);">换货</button>
          <button class="flex-shrink-0 h-[36px] px-4 rounded-full text-[13px] font-medium" style="background: var(--secondary); color: var(--secondary-foreground);">价格保护</button>
        </div>

        <!-- 订单商品卡片 -->
        <div class="flex gap-3 p-3.5 rounded-[19.2px]" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <img src="../assets/product-shampoo-bottle.jpg" alt="宠物洗护套装" class="w-[72px] h-[72px] rounded-xl object-cover flex-shrink-0" style="border: 1px solid var(--border);">
          <div class="flex flex-col justify-center min-w-0">
            <p class="text-[14px] font-medium leading-snug truncate" style="color: var(--foreground);">温和植物萃取宠物洗护套装</p>
            <p class="mt-1 text-[12px]" style="color: var(--muted-foreground);">订单号: MOY20260715001</p>
            <p class="mt-1.5 text-[15px] font-semibold tabular-nums" style="color: var(--foreground);">实付: ¥128.00</p>
          </div>
        </div>

        <!-- 退货原因选择 -->
        <div class="rounded-[19.2px] p-4" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <p class="text-[15px] font-semibold mb-3" style="color: var(--foreground);">退货原因</p>
          <div class="flex flex-col gap-0">
            <!-- 选项1: 选中状态 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer" style="border-bottom: 1px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0" style="border: 2px solid var(--primary); background: var(--primary);">
                <span class="block w-2 h-2 rounded-full" style="background: var(--primary-foreground);"></span>
              </span>
              <span class="text-[14px] font-medium" style="color: var(--foreground);">商品质量问题</span>
            </label>
            <!-- 选项2 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer" style="border-bottom: 1px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">商品与描述不符</span>
            </label>
            <!-- 选项3 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer" style="border-bottom: 1px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">不喜欢/不想要</span>
            </label>
            <!-- 选项4 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer" style="border-bottom: 1px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">尺寸/规格不符</span>
            </label>
            <!-- 选项5 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer" style="border-bottom: 1px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">收到商品破损</span>
            </label>
            <!-- 选项6 -->
            <label class="flex items-center gap-3 py-3 cursor-pointer">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">发错商品</span>
            </label>
          </div>
        </div>

        <!-- 数量选择 -->
        <div class="flex items-center justify-between rounded-[19.2px] px-4 py-3.5" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <p class="text-[15px] font-semibold" style="color: var(--foreground);">数量</p>
          <div class="flex items-center gap-0">
            <button class="flex items-center justify-center w-9 h-9 rounded-full" style="background: var(--secondary); color: var(--secondary-foreground);">
              <i data-lucide="minus" class="w-4 h-4"></i>
            </button>
            <span class="w-12 text-center text-[16px] font-semibold tabular-nums" style="color: var(--foreground);">1</span>
            <button class="flex items-center justify-center w-9 h-9 rounded-full" style="background: var(--primary); color: var(--primary-foreground);">
              <i data-lucide="plus" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- 上传凭证 -->
        <div class="rounded-[19.2px] p-4" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <p class="text-[15px] font-semibold mb-3" style="color: var(--foreground);">上传凭证（选填）</p>
          <div class="flex gap-3">
            <!-- 上传占位槽 1 -->
            <div class="w-[88px] h-[88px] rounded-xl flex flex-col items-center justify-center gap-1.5 flex-shrink-0" style="border: 2px dashed var(--background-400); background: var(--background);">
              <i data-lucide="camera" class="w-6 h-6" style="color: var(--icon-muted);"></i>
              <span class="text-[10px]" style="color: var(--muted-foreground);">添加图片</span>
            </div>
            <!-- 上传占位槽 2 -->
            <div class="w-[88px] h-[88px] rounded-xl flex flex-col items-center justify-center gap-1.5 flex-shrink-0" style="border: 2px dashed var(--background-400); background: var(--background);">
              <i data-lucide="camera" class="w-6 h-6" style="color: var(--icon-muted);"></i>
              <span class="text-[10px]" style="color: var(--muted-foreground);">添加图片</span>
            </div>
            <!-- 上传占位槽 3 -->
            <div class="w-[88px] h-[88px] rounded-xl flex flex-col items-center justify-center gap-1.5 flex-shrink-0" style="border: 2px dashed var(--background-400); background: var(--background);">
              <i data-lucide="camera" class="w-6 h-6" style="color: var(--icon-muted);"></i>
              <span class="text-[10px]" style="color: var(--muted-foreground);">添加图片</span>
            </div>
          </div>
          <p class="mt-2.5 text-[12px]" style="color: var(--muted-foreground);">最多上传3张图片</p>
        </div>

        <!-- 退款金额卡片 -->
        <div class="rounded-[19.2px] p-4" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <p class="text-[15px] font-semibold mb-1.5" style="color: var(--foreground);">退款金额</p>
          <p class="text-[28px] font-bold tabular-nums tracking-tight" style="color: var(--foreground);">¥128.00</p>
          <p class="mt-2 text-[12px]" style="color: var(--muted-foreground);">原路退回至微信支付</p>
        </div>

        <!-- 退货方式 -->
        <div class="rounded-[19.2px] p-4" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
          <p class="text-[15px] font-semibold mb-3" style="color: var(--foreground);">退货方式</p>
          <div class="flex flex-col gap-2.5">
            <!-- 上门取件（推荐） - 选中 -->
            <div class="flex items-center gap-3 p-3.5 rounded-xl cursor-pointer" style="border: 1.5px solid var(--primary); background: var(--brand-50);">
              <span class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0" style="border: 2px solid var(--primary); background: var(--primary);">
                <span class="block w-2 h-2 rounded-full" style="background: var(--primary-foreground);"></span>
              </span>
              <div class="flex flex-col">
                <span class="text-[14px] font-medium" style="color: var(--primary);">上门取件（推荐）</span>
                <span class="mt-0.5 text-[12px]" style="color: var(--muted-foreground);">上门取件后运费由商家承担</span>
              </div>
            </div>
            <!-- 自行寄回 - 未选中 -->
            <div class="flex items-center gap-3 p-3.5 rounded-xl cursor-pointer" style="border: 1.5px solid var(--border);">
              <span class="w-5 h-5 rounded-full flex-shrink-0" style="border: 2px solid var(--input);"></span>
              <span class="text-[14px]" style="color: var(--foreground);">自行寄回</span>
            </div>
          </div>
        </div>

      </div>

      <!-- 底部固定操作栏 -->
      <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] z-50 flex flex-col items-center gap-2 pb-6 pt-3 px-4" style="background: linear-gradient(to top, var(--background) 70%, transparent);">
        <button data-dom-id="cta-submit-return" class="w-full h-[48px] rounded-full text-[16px] font-semibold" style="background: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-sm);">提交申请</button>
        <a href="#" class="text-[13px]" style="color: var(--primary);">查看售后政策</a>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
