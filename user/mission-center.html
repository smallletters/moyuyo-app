<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYUYO 任务中心</title>
    <link rel="stylesheet" href="shared/moyuyo-tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: 'DM Sans', -apple-system, sans-serif;">

    <main class="min-h-screen" style="background: var(--background-200);">

      <!-- iOS 状态栏模拟 -->
      <div class="sticky top-0 z-30" style="background: var(--background);">
        <div class="h-11 flex items-center justify-between px-5">
          <span class="text-sm font-semibold" style="color: var(--foreground);">9:41</span>
          <div class="flex items-center gap-1.5">
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg'); mask-image: url('../assets/icons/dl-builtin-apple/triangle-alert.svg');"></span>
            <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/box.svg'); mask-image: url('../assets/icons/dl-builtin-apple/box.svg');"></span>
            <span class="w-6 h-3 rounded-sm" style="background: var(--foreground);"></span>
          </div>
        </div>
      </div>

      <!-- 顶部导航栏 -->
      <header class="sticky top-11 z-20 flex items-center h-11 px-4 gap-3" style="background: var(--background); border-bottom: 1px solid var(--border);">
        <button data-dom-id="cta-back" class="flex items-center justify-center w-8 h-8 -ml-1 rounded-full" style="background: transparent; border: none; color: var(--brand-500);" aria-label="返回">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg');"></span>
        </button>
        <h1 class="text-base font-semibold flex-1 text-center -mr-8" style="color: var(--foreground);">任务中心</h1>
      </header>

      <!-- 页面内容区 -->
      <div class="px-4 pt-4 pb-8 space-y-4">

        <!-- ===== 今日进度卡片 ===== -->
        <section class="progress-card" aria-label="今日进度">
          <div class="flex items-center justify-between">
            <!-- 环形进度图 -->
            <div class="ring-progress">
              <svg width="120" height="120" viewBox="0 0 120 120">
                <circle class="ring-track" cx="60" cy="60" r="50"></circle>
                <!-- 进度 2/5 = 40% -->
                <circle class="ring-bar" cx="60" cy="60" r="50"
                  stroke-dasharray="314.16"
                  stroke-dashoffset="188.5"></circle>
              </svg>
              <div class="ring-text">
                <span class="text-2xl font-bold" style="line-height: 1;">2/5</span>
                <span class="text-[11px] mt-0.5" style="opacity: 0.8;">今日任务</span>
              </div>
            </div>

            <!-- 右侧信息 -->
            <div class="flex flex-col items-end gap-1">
              <span class="text-xs" style="opacity: 0.7;">今日已获积分</span>
              <span class="text-3xl font-bold" style="line-height: 1;">+8</span>
              <div class="flex items-center gap-1 mt-1">
                <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/flame.svg'); mask-image: url('../assets/icons/dl-builtin-apple/flame.svg'); opacity: 0.8;"></span>
                <span class="text-xs" style="opacity: 0.8;">连续签到 3 天</span>
              </div>
            </div>
          </div>
        </section>

        <!-- ===== 任务分类 Tab ===== -->
        <nav class="rounded-[var(--radius)] overflow-hidden" style="background: var(--card); border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.08);" aria-label="任务分类">
          <div class="flex" style="border-bottom: 1px solid var(--border);">
            <button class="tab-btn active" data-tab="daily" aria-selected="true">每日</button>
            <button class="tab-btn" data-tab="weekly" aria-selected="false">每周</button>
            <button class="tab-btn" data-tab="achievement" aria-selected="false">成就</button>
          </div>

          <!-- ===== 每日任务面板 ===== -->
          <div class="tab-panel active" id="panel-daily">
            <div class="p-3 space-y-3">

              <!-- 每日签到（已完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--state-success-surface);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/calendar-check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/calendar-check.svg'); color: var(--state-success);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">每日签到</span>
                    <span class="points-tag">+5</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--state-success);">已完成</span>
                </div>
                <button class="mission-btn mission-btn-done" disabled>已完成</button>
              </div>

              <!-- 浏览 5 个商品（进行中 3/5） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--brand-50);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/eye.svg'); mask-image: url('../assets/icons/dl-builtin-apple/eye.svg'); color: var(--brand-500);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">浏览 5 个商品</span>
                    <span class="points-tag">+3</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 60%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">3/5</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 分享 1 个商品（未完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--state-warning-surface);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); mask-image: url('../assets/icons/dl-builtin-apple/share.svg'); color: var(--state-warning);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">分享 1 个商品</span>
                    <span class="points-tag">+5</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--text-400);">未完成</span>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 完成 1 次 Pet Hub 互动（未完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--brand-50);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/heart.svg'); mask-image: url('../assets/icons/dl-builtin-apple/heart.svg'); color: var(--brand-500);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">完成 1 次 Pet Hub 互动</span>
                    <span class="points-tag">+2</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--text-400);">未完成</span>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

            </div>
          </div>

          <!-- ===== 每周任务面板 ===== -->
          <div class="tab-panel" id="panel-weekly">
            <div class="p-3 space-y-3">

              <!-- 累计签到 5 天（进行中 3/5） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--brand-50);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/calendar-days.svg'); mask-image: url('../assets/icons/dl-builtin-apple/calendar-days.svg'); color: var(--brand-500);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">累计签到 5 天</span>
                    <span class="points-tag">+20</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 60%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">3/5</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 完成 1 单购物（未完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--state-warning-surface);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/shopping-bag.svg'); mask-image: url('../assets/icons/dl-builtin-apple/shopping-bag.svg'); color: var(--state-warning);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">完成 1 单购物</span>
                    <span class="points-tag">+30</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--text-400);">未完成</span>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 发布 1 条社区笔记（未完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--brand-50);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/pencil.svg'); mask-image: url('../assets/icons/dl-builtin-apple/pencil.svg'); color: var(--brand-500);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">发布 1 条社区笔记</span>
                    <span class="points-tag">+15</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--text-400);">未完成</span>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 邀请 1 位好友注册（未完成） -->
              <div class="mission-item">
                <div class="mission-icon-wrap" style="background: var(--state-error-surface);">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/user-plus.svg'); mask-image: url('../assets/icons/dl-builtin-apple/user-plus.svg'); color: var(--state-error);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">邀请 1 位好友注册</span>
                    <span class="points-tag">+50</span>
                  </div>
                  <span class="text-xs mt-0.5 block" style="color: var(--text-400);">未完成</span>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

            </div>
          </div>

          <!-- ===== 成就任务面板 ===== -->
          <div class="tab-panel" id="panel-achievement">
            <div class="p-3 space-y-3">

              <!-- 首单完成（已获得） -->
              <div class="mission-item">
                <div class="badge-placeholder earned">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); color: var(--background-50);"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">首单完成</span>
                  </div>
                  <div class="flex items-center gap-1.5 mt-0.5">
                    <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check-circle.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check-circle.svg'); color: var(--state-success);"></span>
                    <span class="text-xs" style="color: var(--state-success);">已获得「新人徽章」</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-done" disabled>已获得</button>
              </div>

              <!-- 累计消费满 $500（进行中 $380/500） -->
              <div class="mission-item">
                <div class="badge-placeholder locked">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); mask-image: url('../assets/icons/dl-builtin-apple/award.svg');"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">累计消费满 $500</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 76%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">$380/500</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 连续签到 30 天（进行中 12/30） -->
              <div class="mission-item">
                <div class="badge-placeholder locked">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); mask-image: url('../assets/icons/dl-builtin-apple/award.svg');"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">连续签到 30 天</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 40%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">12/30</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 发布 10 条笔记（进行中 4/10） -->
              <div class="mission-item">
                <div class="badge-placeholder locked">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); mask-image: url('../assets/icons/dl-builtin-apple/award.svg');"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">发布 10 条笔记</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 40%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">4/10</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

              <!-- 邀请 10 位好友（进行中 1/10） -->
              <div class="mission-item">
                <div class="badge-placeholder locked">
                  <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/award.svg'); mask-image: url('../assets/icons/dl-builtin-apple/award.svg');"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium" style="color: var(--foreground);">邀请 10 位好友</span>
                  </div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <div class="progress-track">
                      <div class="progress-fill" style="width: 10%;"></div>
                    </div>
                    <span class="text-xs flex-shrink-0" style="color: var(--text-500);">1/10</span>
                  </div>
                </div>
                <button class="mission-btn mission-btn-primary">去完成</button>
              </div>

            </div>
          </div>

        </nav>

      </div>

    </main>

    <!-- Tab 切换逻辑 -->
    <script>
      // Tab 切换功能
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var tabId = this.getAttribute('data-tab');

          // 更新 Tab 按钮状态
          document.querySelectorAll('.tab-btn').forEach(function(b) {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          this.classList.add('active');
          this.setAttribute('aria-selected', 'true');

          // 切换面板显示
          document.querySelectorAll('.tab-panel').forEach(function(panel) {
            panel.classList.remove('active');
          });
          var targetPanel = document.getElementById('panel-' + tabId);
          if (targetPanel) {
            targetPanel.classList.add('active');
          }
        });
      });
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
