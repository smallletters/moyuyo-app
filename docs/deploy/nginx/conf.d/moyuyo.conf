# 限流配置（conf.d 自包含定义，即使主 nginx.conf 未包含也可正常工作）
limit_req_zone $binary_remote_addr zone=moyuyo_api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=moyuyo_login:10m rate=10r/s;

server {
    listen 80;
    server_name api.moyuyo.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name api.moyuyo.com;

    ssl_certificate /etc/nginx/ssl/api.moyuyo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.moyuyo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 50m;

    location / {
        proxy_pass http://moyuyo-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        limit_req zone=moyuyo_api burst=200 nodelay;
    }

    location /api/auth/login {
        proxy_pass http://moyuyo-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=moyuyo_login burst=20 nodelay;
    }

    location /actuator/health {
        proxy_pass http://moyuyo-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        internal;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://moyuyo-backend:8080;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;

    location = /error/404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /error/50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

server {
    listen 80;
    server_name www.moyuyo.com moyuyo.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name www.moyuyo.com moyuyo.com;

    ssl_certificate /etc/nginx/ssl/www.moyuyo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/www.moyuyo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html index.htm;

    try_files $uri $uri/ /index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
