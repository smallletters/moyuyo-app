spring:
  datasource:
    url: jdbc:h2:mem:moyuyo_test;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.moyuyo.dao.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: TestSecretKeyForIntegrationTestsAtLeast32Chars!!
  expire-hours: 2

payment:
  stripe:
    secret-key: sk_test_mock
    webhook-secret: whsec_mock
    currency: usd
  paypal:
    client-id: mock_client_id
    client-secret: mock_client_secret
    webhook-id: mock_webhook_id
    mode: sandbox
