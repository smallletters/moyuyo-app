name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'moyuyo-server/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'moyuyo-server/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: moyuyo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven (skip tests)
        run: mvn clean compile -q -f moyuyo-server/pom.xml

      - name: Checkstyle validation
        run: mvn checkstyle:check -q -f moyuyo-server/pom.xml

      - name: Run unit & integration tests
        run: mvn test -f moyuyo-server/pom.xml
        env:
          MYSQL_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Package JAR
        run: mvn package -DskipTests -f moyuyo-server/pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: moyuyo-server-jar
          path: moyuyo-server/moyuyo-api/target/*.jar

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: moyuyo-server-jar
          path: moyuyo-server/moyuyo-api/target/

      - name: Build Docker image
        run: docker build -t moyuyo-server:latest -f moyuyo-server/Dockerfile moyuyo-server

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME
        run: |
          docker tag moyuyo-server:latest ${{ secrets.DOCKER_USERNAME }}/moyuyo-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/moyuyo-server:latest
