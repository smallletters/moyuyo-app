name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'moyuyo-app/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'moyuyo-app/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: moyuyo-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: moyuyo-app

      - name: Lint check
        run: npm run lint
        working-directory: moyuyo-app

      - name: Build (H5)
        run: npm run build:h5
        working-directory: moyuyo-app
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.moyuyo.com' }}

      - name: Upload H5 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moyuyo-h5-dist
          path: moyuyo-app/dist/build/h5/

  deploy-h5:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: moyuyo-h5-dist
          path: dist

      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/*"
          target: "/var/www/moyuyo/html"
          strip_components: 0
